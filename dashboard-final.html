    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);

  if (!quote) return null;
  const isExpired = quote.workflow_status === 'Expired';
  const isPO      = quote.workflow_status === 'PO Received';
  const isClosed  = quote.workflow_status === 'Closed';
  const diff = daysDiff(quote.expires_on);
  const nudge = nudgeLabel(quote.next_nudge_date);

  /* Build activity timeline from what we have */
  const events = [];
  if (quote.created_at) events.push({ t: 'Quote uploaded', s: fmtDateTime(quote.created_at) + ' · PDF parsed', cls: 'accent' });
  if ((quote.nudge_count || 0) > 0) {
    events.push({
      t: `${quote.nudge_count} nudge${quote.nudge_count > 1 ? 's' : ''} sent`,
      s: quote.last_nudge_sent ? `Last: ${fmtRelative(quote.last_nudge_sent)}` : 'via WhatsApp / Email',
      cls: '',
    });
  }
  if (quote.payment_received && quote.payment_received_date) events.push({ t: 'Payment received', s: fmtDateTime(quote.payment_received_date), cls: 'green' });
  if (['PO Received','Dispatched','Delivered'].includes(quote.workflow_status) && !quote.payment_received_date) {
    events.push({ t: 'PO Received', s: fmtDateTime(quote.updated_at), cls: 'green' });
  }
  if (quote.dispatched_date) {
    let dispatchDetail = fmtDate(quote.dispatched_date);
    if (quote.transport_type) dispatchDetail += ' · ' + quote.transport_type;
    if (quote.transport_name) dispatchDetail += ' — ' + quote.transport_name;
    if (quote.lr_number) dispatchDetail += ' (LR: ' + quote.lr_number + ')';
    events.push({ t: 'Order dispatched', s: dispatchDetail, cls: 'accent' });
  }
  if (quote.delivery_confirmed_date) events.push({ t: 'Delivery confirmed', s: fmtDate(quote.delivery_confirmed_date) + ' · Photo received', cls: 'green' });
  if (quote.feedback_sent) events.push({ t: 'Feedback form sent', s: '6-month follow-up', cls: '' });
  if (quote.feedback_score) events.push({ t: `Feedback: ${quote.feedback_score} ★`, s: quote.feedback_note || '—', cls: 'green' });
  if (isExpired) events.push({ t: 'Quote expired', s: fmtDate(quote.expires_on), cls: '' });
  if (nudge && !isPO && !isExpired && !isClosed) events.push({ t: `Next nudge ${nudge.label.toLowerCase()}`, s: fmtDate(quote.next_nudge_date), cls: 'accent' });

  return (
    <>
      <div className="over-bg" onClick={onClose} />
      <aside className="over-panel" role="dialog">
        <div className="over-h">
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="title">{quote.client_name}</div>
            <div className="qno">{quote.quote_number}</div>
            <div className="badges">
              <Badge status={quote.workflow_status} />
              {diff !== null && diff >= 0 && diff <= 5 && !isPO && (
                <span className="badge badge-follow">Expires in {diff}d</span>
              )}
              {(quote.nudge_count || 0) > 0 && (
                <span className="badge badge-open">
                  {quote.nudge_count} nudge{quote.nudge_count > 1 ? 's' : ''} sent
                </span>
              )}
            </div>
          </div>
          <button className="modal-x" onClick={onClose} title="Close (esc)"><I.X /></button>
        </div>

        <div className="over-body">

          <div className="section">Quote Details</div>
          <div className="kv-grid">
            <div className="kv" style={{ gridColumn: '1 / -1' }}>
              <div className="k">Product / Items</div>
              <div className="v muted" style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.45 }}>
                {quote.product_name || '—'}
              </div>
            </div>
            <div className="kv">
              <div className="k">Grand Total</div>
              <div className="v lg">{fmtINRFull(quote.amount_grand_total)}</div>
            </div>
            <div className="kv">
              <div className="k">Quote Number</div>
              <div className="v mono">{quote.quote_number || '—'}</div>
            </div>
            <div className="kv">
              <div className="k">Issued</div>
              <div className="v">{fmtDate(quote.created_at)}</div>
            </div>
            <div className="kv">
              <div className="k">Expires</div>
              <div className="v" style={{
                color: isExpired ? 'var(--st-danger-fg)' :
                       (diff !== null && diff <= 5 ? 'var(--st-follow-fg)' : undefined),
              }}>
                {fmtDate(quote.expires_on)}

                  <span style={{ marginLeft: 6, fontSize: 11, fontWeight: 500, color: 'var(--text-3)' }}>
                    ({diff < 0 ? `${Math.abs(diff)}d ago` : `${diff}d left`})
                  </span>
                )}
              </div>
            </div>
          </div>

          <div className="section">Contact</div>
          <div className="kv-grid">
            <div className="kv">
              <div className="k">Contact Person</div>
              <div className="v">{quote.contact_person || '—'}</div>
            </div>
            <div className="kv">
              <div className="k">Phone</div>
              <div className="v mono">{quote.phone_number ? `+91 ${quote.phone_number}` : '—'}</div>
            </div>
            <div className="kv" style={{ gridColumn: '1 / -1' }}>
              <div className="k">Email</div>
              <div className="v" style={{ fontSize: 13, wordBreak: 'break-all' }}>{quote.email || '—'}</div>
            </div>
          </div>

          <div className="section">Follow-up Settings</div>
          <div className="tog-block">
            <div className="row">
              <div>
                <div className="lbl"><I.Phone /> WhatsApp</div>
                <div className="sub">Auto-nudge via WhatsApp</div>
              </div>
              <Toggle value={!!quote.whatsapp_enabled}
                      onChange={async v => { await updateQuotation(quote.id, { whatsapp_enabled: v }); onEdit && onEdit('refresh'); }}
                      size="lg" />
            </div>
            <div className="row">
              <div>
                <div className="lbl"><I.Mail /> Email</div>
                <div className="sub">Auto-nudge via email</div>
              </div>
              <Toggle value={!!quote.email_enabled}
                      onChange={async v => { await updateQuotation(quote.id, { email_enabled: v }); onEdit && onEdit('refresh'); }}
                      size="lg" />
            </div>
            <div className="row">
              <div>
                <div className="lbl"><I.Paperclip /> Attach PDF</div>
                <div className="sub">Send PDF on every nudge</div>
              </div>
              <Toggle value={!!quote.attach_pdf}
                      onChange={async v => { await updateQuotation(quote.id, { attach_pdf: v }); onEdit && onEdit('refresh'); }}
                      size="lg" />
            </div>
            <div className="row" style={{ paddingTop: 8, borderTop: '1px solid var(--border)' }}>
              <div>
                <div className="lbl" style={{ display: 'block' }}>Nudge Cadence</div>
                <div className="sub">Repeats every {quote.nudge_interval_days || 3} days</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 12.5, color: 'var(--text)', fontWeight: 500 }}>
                  {nudge ? nudge.label : '—'}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>
                  {fmtDate(quote.next_nudge_date)}
                </div>
              </div>
            </div>
          </div>

          {['PO Received','Dispatched','Delivered'].includes(quote.workflow_status) && (
            <>
              <div className="section">Order Details</div>
              <div className="kv-grid">
                <div className="kv">
                  <div className="k">Payment Received</div>
                  <div className="v" style={{ color: quote.payment_received ? 'oklch(0.50 0.15 150)' : 'var(--st-danger-fg)', fontWeight: 600 }}>
                    {quote.payment_received ? '✓ Confirmed' : '⚠ Pending'}
                  </div>
                </div>
                <div className="kv">
                  <div className="k">Payment Date</div>
                  <div className="v">{fmtDate(quote.payment_received_date)}</div>
                </div>
                <div className="kv">
                  <div className="k">Expected Dispatch</div>
                  <div className="v" style={{
                    color: quote.expected_dispatch_date && daysDiff(quote.expected_dispatch_date) < 0 && quote.workflow_status === 'PO Received'
                      ? 'var(--st-danger-fg)' : undefined
                  }}>
                    {fmtDate(quote.expected_dispatch_date)}
                    {quote.expected_dispatch_date && daysDiff(quote.expected_dispatch_date) < 0 && quote.workflow_status === 'PO Received' && (
                      <span style={{ marginLeft: 6, fontSize: 11, fontWeight: 600 }}>OVERDUE</span>
                    )}
                  </div>
                </div>
                <div className="kv">
                  <div className="k">Lead Time</div>
                  <div className="v">{quote.delivery_days ? `${quote.delivery_days} days` : '—'}</div>
                </div>
                {quote.dispatched_date && <>
                  <div className="kv">
                    <div className="k">Dispatched On</div>
                    <div className="v">{fmtDate(quote.dispatched_date)}</div>
                  </div>
                  <div className="kv">
                    <div className="k">Transport</div>
                    <div className="v">{[quote.transport_type, quote.transport_name].filter(Boolean).join(' — ') || '—'}</div>
                  </div>
                  {quote.lr_number && <div className="kv" style={{ gridColumn: '1 / -1' }}>
                    <div className="k">LR / Docket No.</div>
                    <div className="v mono">{quote.lr_number}</div>
                  </div>}
                </>}
                {quote.delivery_confirmed_date && <div className="kv" style={{ gridColumn: '1 / -1' }}>
                  <div className="k">Delivery Confirmed</div>
                  <div className="v" style={{ color: 'oklch(0.50 0.15 150)', fontWeight: 600 }}>
                    ✓ {fmtDate(quote.delivery_confirmed_date)} · Photo received
                  </div>
                </div>}
              </div>
            </>
          )}

          <div className="section">Activity</div>
          <div className="timeline">
            {events.length === 0 ? (
              <div style={{ fontSize: 12.5, color: 'var(--text-3)' }}>No activity yet.</div>
            ) : events.map((e, i) => (
              <div key={i} className={`tl-item ${e.cls}`}>
                <div className="tl-t">{e.t}</div>
                <div className="tl-s">{e.s}</div>
              </div>
            ))}
          </div>

          {quote.pdf_storage_path && (
            <>
              <div className="section">Original Quote</div>
              <a href={quote.pdf_storage_path} target="_blank" rel="noopener noreferrer"
                 className="btn btn-ghost btn-sm" style={{ width: '100%' }}>
                <I.ExternalLink /> Open PDF in new tab
              </a>
            </>
          )}
        </div>

        <div className="over-actions">
          <button className="btn btn-ghost" onClick={() => onEdit(quote)}>
            <I.Edit /> Edit
          </button>
          {!isPO && !isExpired && (
            <button className="btn btn-ghost" disabled={sending} onClick={() => onSend(quote)}>
              {sending ? <><I.Loader className="spin" /> Sending…</> : <><I.Send /> Send Nudge</>}
            </button>
          )}
          {!isPO && !isExpired && (
            <button className="btn btn-primary" onClick={() => onMarkPO(quote.id)}>
              <I.Check2 /> Mark PO
            </button>
          )}
        </div>
      </aside>
    </>
  );
};

/* ── Dispatch Modal ───────────────────────────────────────── */
const DispatchModal = ({ quote, onClose, onDispatch }) => {
  const [transportType, setTransportType] = React.useState('Courier');
  const [transportName, setTransportName] = React.useState('');
  const [lrNumber, setLrNumber] = React.useState('');
  const [notes, setNotes] = React.useState('');
  const [dispatching, setDispatching] = React.useState(false);

  const handleSubmit = async () => {
    if (!transportType) return alert('Select a transport type.');
    setDispatching(true);
    await onDispatch(quote, transportType, transportName, lrNumber, notes);
    setDispatching(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-h">
          <div className="modal-t" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <I.Truck size={16} /> Dispatch Order
          </div>
          <button className="modal-x" onClick={onClose}><I.X /></button>
        </div>
        <div className="modal-body">
          <div className="modal-quote-card">
            <div className="cn">{quote.client_name}</div>
            <div className="qno">{quote.internal_id || quote.quote_number} · {quote.product_name}</div>
          </div>
          <div className="section">Transport Details</div>
          <div className="modal-row">
            <div className="field">
              <label className="field-label">Transport Type *</label>
              <select className="input" value={transportType} onChange={e => setTransportType(e.target.value)}>
                <option>Courier</option>
                <option>Lorry</option>
                <option>Bus Parcel</option>
                <option>Hand Delivery</option>
                <option>Other</option>
              </select>
            </div>
            <div className="field">
              <label className="field-label">Transport Name</label>
              <input className="input" value={transportName} onChange={e => setTransportName(e.target.value)}
                     placeholder="e.g. Praveen Travels" />
            </div>
          </div>
          <div className="modal-row">
            <div className="field">
              <label className="field-label">LR / Docket Number</label>
              <input className="input" value={lrNumber} onChange={e => setLrNumber(e.target.value)}
                     placeholder="e.g. PR123456" />
            </div>
            <div className="field">
              <label className="field-label">Notes (optional)</label>
              <input className="input" value={notes} onChange={e => setNotes(e.target.value)}
                     placeholder="Handle with care, etc." />
            </div>
          </div>
          <div className="info-note">
            <I.Bell />
            <span>Client will receive a WhatsApp dispatch notification. GOD copy sent to Manikandan.</span>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={dispatching}>
            {dispatching ? <><I.Loader className="spin" /> Dispatching…</> : <><I.Truck /> Confirm Dispatch</>}
          </button>
        </div>
      </div>
    </div>
  );
};

window.DetailPanel = DetailPanel;

</script>

<script type="text/babel" data-name="pages">
/* ── Area chart ────────────────────────────────────────────────── */
const AreaChart = ({ data, currentMonth }) => {
  const W = 720, H = 220, PAD_L = 48, PAD_R = 16, PAD_T = 12, PAD_B = 32;
  const max = Math.max(...data.map(d => d.value), 1);
  const stepX = (W - PAD_L - PAD_R) / Math.max(data.length - 1, 1);
  const sy = (v) => PAD_T + (H - PAD_T - PAD_B) * (1 - v / max);
  const sx = (i) => PAD_L + i * stepX;

  const points = data.map((d, i) => [sx(i), sy(d.value)]);
  const linePath = points.map(([x, y], i) => `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L ${points.at(-1)[0].toFixed(1)} ${(H - PAD_B).toFixed(1)} L ${points[0][0].toFixed(1)} ${(H - PAD_B).toFixed(1)} Z`;

  const ticks = 4;
  const tickVals = Array.from({ length: ticks + 1 }, (_, i) => (max * i) / ticks);
  const fmtAxis = (n) => {
    if (n === 0) return '0';
    if (n >= 10000000) return `${(n / 10000000).toFixed(1)}Cr`;
    if (n >= 100000)   return `${(n / 100000).toFixed(0)}L`;
    if (n >= 1000)     return `${(n / 1000).toFixed(0)}k`;
    return `${n}`;
  };

  return (
    <svg className="chart" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      {/* gridlines */}
      <g className="axis-y">
        {tickVals.map((v, i) => (
          <g key={i}>
            <line className="grid"
                  x1={PAD_L} x2={W - PAD_R}
                  y1={sy(v)} y2={sy(v)} />
            <text x={PAD_L - 8} y={sy(v) + 3} textAnchor="end">{fmtAxis(v)}</text>
          </g>
        ))}
      </g>
      {/* area */}
      <path className="area-fill" d={areaPath} />
      <path className="area-stroke" d={linePath} />
      {/* dots */}
      {points.map(([x, y], i) => (
        <circle key={i} className="dot" cx={x} cy={y} r={data[i].value > 0 ? 3.5 : 2} />
      ))}
      {/* current month marker */}
      {currentMonth >= 0 && currentMonth < data.length && (
        <line className="grid"
              x1={sx(currentMonth)} x2={sx(currentMonth)}
              y1={PAD_T} y2={H - PAD_B}
              stroke="var(--accent)" strokeWidth="1" strokeDasharray="3 3" opacity="0.5" />
      )}
      {/* x axis */}
      <g className="axis-x">
        {data.map((d, i) => (
          <text key={d.month} x={sx(i)} y={H - PAD_B + 18} textAnchor="middle"
                style={{ fontWeight: i === currentMonth ? 600 : 400, fill: i === currentMonth ? 'var(--accent)' : undefined }}>
            {d.month}
          </text>
        ))}
      </g>
    </svg>
  );
};

/* ── Metric card helper ────────────────────────────────────────── */
const Metric = ({ label, value, sub, accent = 'slate', icon, sm }) => (
  <div className={`metric accent-${accent}`}>
    <span className="accent-bar" />
    <div className="l">{icon}{label}</div>
    <div className={`v ${sm ? 'sm' : ''}`}>{value}</div>
    {sub && <div className="s">{sub}</div>}
  </div>
);

/* ══════════════════════════════════════════════════════════════════
   QUOTATIONS / TRACKER PAGE
   ══════════════════════════════════════════════════════════════════ */
const TrackerPage = (props) => {
  const {
    quotes, loading, filter, setFilter, search, setSearch,
    openQuotes, pipelineVal, dueToday, poThisMonth, expiringSoon,
    filtered: filteredBase, selectedId, setSelectedId, sendingId,
    setEditQuote, markPO, handleManualSend, handleDelete,
    load,
    /* upload */
    uploadFile, setUploadFile, uploadPhone, setUploadPhone,
    uploadEmail, setUploadEmail,
    uploadCompanyId, setUploadCompanyId,
    uploadStatus, uploading, handleUpload,
    setDispatchQuote,
    overdueDispatch, creditPending, dispatchedOrders,
  } = props;

  const [monthFilter, setMonthFilter] = React.useState('All');
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const currentMonthIdx = new Date().getMonth();
  const currentYear = new Date().getFullYear();

  // Apply month filter on top of the base filter
  const filtered = React.useMemo(() => {
    if (monthFilter === 'All') return filteredBase;
    const mIdx = parseInt(monthFilter, 10);
    return filteredBase.filter(q => {
      const d = new Date(q.created_at || q.quote_date);
      return d.getMonth() === mIdx && d.getFullYear() === currentYear;
    });
  }, [filteredBase, monthFilter, currentYear]);

  // Only show month tabs for months that have quotes in the CURRENT filtered set (before month filter)
  const monthsWithData = React.useMemo(() => MONTHS_SHORT.map((m, i) => ({
    label: m,
    idx: i,
    count: filteredBase.filter(q => {
      const d = new Date(q.created_at);
      return d.getMonth() === i && d.getFullYear() === currentYear;
    }).length,
  })).filter(m => m.count > 0), [filteredBase, currentYear]);

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Quotations</div>
          <div className="page-sub">Track every outstanding quote and keep follow-ups on schedule.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label="Open Quotes" value={openQuotes.length}
                sub="Active follow-ups" accent="blue"
                icon={<I.Inbox />} />
        <Metric label="Pipeline Value" value={fmtINR(pipelineVal)} sm
                sub="Across open quotes" accent="violet"
                icon={<I.TrendUp />} />
        <Metric label="Due Today" value={dueToday}
                sub={dueToday ? 'Follow-ups to send' : 'All caught up'}
                accent={dueToday ? 'red' : 'slate'}
                icon={<I.Bell />} />
        <Metric label="In Transit" value={dispatchedOrders.length}
                sub={dispatchedOrders.length ? 'Awaiting delivery photo' : 'No orders dispatched'}
                accent={dispatchedOrders.length ? 'green' : 'slate'}
                icon={<I.Truck />} />
      </div>

      {creditPending.length > 0 && (
        <div className="alert" style={{ background: 'var(--st-follow-bg)', borderColor: 'var(--st-follow-bd)', color: 'var(--st-follow-fg)' }}>
          <I.AlertTriangle />
          <span>
            <strong>{creditPending.length}</strong> order{creditPending.length > 1 ? 's' : ''} with payment pending —{' '}
            {creditPending.map(q => q.internal_id || q.quote_number).join(', ')}
          </span>
          <button className="alert-action" onClick={() => props.setFilter('PO Received')}>View →</button>
        </div>
      )}

      {overdueDispatch.length > 0 && (
        <div className="alert">
          <I.AlertTriangle />
          <span>
            <strong>{overdueDispatch.length}</strong> order{overdueDispatch.length > 1 ? 's' : ''} overdue for dispatch —{' '}
            {overdueDispatch.map(q => q.internal_id || q.quote_number).join(', ')}
          </span>
          <button className="alert-action" onClick={() => props.setFilter('PO Received')}>View →</button>
        </div>
      )}

      {expiringSoon.length > 0 && (
        <div className="alert">
          <I.AlertTriangle />
          <span>
            <strong>{expiringSoon.length}</strong> quote{expiringSoon.length > 1 ? 's' : ''} expiring within 5 days — follow up now.
          </span>
          <button className="alert-action" onClick={() => props.setPage('expiry')}>View →</button>
        </div>
      )}

      <TopUpload
        file={uploadFile} onSelect={setUploadFile}
        phone={uploadPhone} setPhone={setUploadPhone}
        email={uploadEmail} setEmail={setUploadEmail}
        companyId={uploadCompanyId} setCompanyId={setUploadCompanyId}
        onUpload={handleUpload} uploading={uploading} status={uploadStatus}
      />

      <div className="panel">
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">All Quotations</div>
            <span className="panel-tag">{filtered.length} record{filtered.length !== 1 ? 's' : ''}</span>
          </div>
          <div className="tbl-controls">
            <div className="search-sm">
              <I.Search />
              <input className="input-sm" placeholder="Search client, quote no, product…"
                     value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <select className="input-sm" value={filter} onChange={e => { setFilter(e.target.value); setMonthFilter('All'); }}>
              <option value="All">Active Quotes</option>
              <option value="AllQuotes">All Quotations</option>
              <option value="Open">Open</option>
              <option value="Following Up">Following Up</option>
              <option value="PO Received">PO Received</option>
              <option value="Expired">Expired / Closed</option>
            </select>
            <button className="btn btn-ghost btn-sm" onClick={load}>
              <I.Refresh /> Refresh
            </button>
          </div>
        </div>
        {/* Month filter tabs */}
        {monthsWithData.length > 1 && (
          <div style={{ display: 'flex', gap: 4, padding: '8px 18px', borderBottom: '1px solid var(--border)', flexWrap: 'wrap' }}>
            <button className={`month-tab ${monthFilter === 'All' ? 'active' : ''}`}
                    onClick={() => setMonthFilter('All')}>
              All {currentYear}
            </button>
            {monthsWithData.map(m => (
              <button key={m.idx}
                      className={`month-tab ${monthFilter === String(m.idx) ? 'active' : ''}`}
                      onClick={() => setMonthFilter(String(m.idx))}>
                {m.label} <span style={{ opacity: 0.65, fontSize: 10.5 }}>{m.count}</span>
              </button>
            ))}
          </div>
        )}
        <div className="tbl-wrap">
          <table className="q-table">
            <thead>
              <tr>
                <th>Client / Quote</th>
                <th>Product</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Channels</th>
                <th>Next Follow-up</th>
                <th>Expiry / Dispatch</th>
                <th style={{ textAlign: 'right' }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {loading ? (
                Array.from({ length: 4 }).map((_, i) => (
                  <tr key={i}>
                    <td colSpan={8} style={{ padding: 12 }}>
                      <div className="skel" style={{ height: 28 }} />
                    </td>
                  </tr>
                ))
              ) : filtered.length === 0 ? (
                <tr>
                  <td colSpan={8}>
                    <div className="empty">
                      <I.Inbox />
                      <div className="et">No quotes match your filters</div>
                      <div className="es">Try clearing the search or status filter.</div>
                    </div>
                  </td>
                </tr>
              ) : filtered.map(q => {
                const nudge = ['Open','Following Up'].includes(q.workflow_status) ? nudgeLabel(q.next_nudge_date) : null;
                const isExpired = q.workflow_status === 'Expired';
                const isPO = q.workflow_status === 'PO Received';
                const isSending = sendingId === q.id;
                const openDetail = (e) => { e.stopPropagation(); setSelectedId(q.id); };
                const stop = (fn) => (e) => { e.stopPropagation(); e.preventDefault(); fn(); };
                return (
                  <tr key={q.id}
                      className={`${isExpired ? 'expired' : ''} ${selectedId === q.id ? 'selected' : ''}`}>
                    <td className="cell-client cell-clickable" onClick={openDetail}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <Avatar name={q.client_name} />
                        <div>
                          <div className="name">{q.client_name}</div>
                          <div className="qno">{q.quote_number}</div>
                          {q.contact_person && <div className="contact">{q.contact_person}</div>}
                        </div>
                      </div>
                    </td>
                    <td className="cell-clickable" onClick={openDetail}><div className="cell-product">{q.product_name || '—'}</div></td>
                    <td className="cell-clickable" onClick={openDetail}><div className="amt">{fmtINR(q.amount_grand_total)}</div></td>
                    <td className="cell-clickable" onClick={openDetail}><Badge status={q.workflow_status} /></td>
                    <td>
                      <div className="tog-stack">
                        <ToggleRow value={!!q.whatsapp_enabled} label="WhatsApp"
                                   onChange={async v => { await updateQuotation(q.id, { whatsapp_enabled: v }); load(); }} />
                        <ToggleRow value={!!q.email_enabled} label="Email"
                                   onChange={async v => { await updateQuotation(q.id, { email_enabled: v }); load(); }} />
                        <ToggleRow value={!!q.attach_pdf} label="PDF"
                                   onChange={async v => { await updateQuotation(q.id, { attach_pdf: v }); load(); }} />
                      </div>
                    </td>
                    <td className="cell-clickable" onClick={openDetail}>{nudge ? <span className={`nudge ${nudge.cls}`}>{nudge.label}</span>
                                : <span className="nudge">—</span>}</td>
                    <td className="cell-clickable" onClick={openDetail}>
                      {q.workflow_status === 'Dispatched' ? (
                        <div>
                          <span style={{ fontSize: 12.5, color: 'var(--st-dispatched-fg)', fontWeight: 500 }}>
                            {fmtDate(q.dispatched_date)}
                          </span>
                          {q.transport_name && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{q.transport_name}</div>}
                          {q.lr_number && <div style={{ fontSize: 11, color: 'var(--text-3)' }}>LR: {q.lr_number}</div>}
                        </div>
                      ) : q.workflow_status === 'Delivered' ? (
                        <span style={{ fontSize: 12.5, color: 'var(--st-delivered-fg)', fontWeight: 500 }}>
                          {fmtDate(q.delivery_confirmed_date || q.updated_at)}
                        </span>
                      ) : q.workflow_status === 'PO Received' ? (
                        <div>
                          <span style={{ fontSize: 12.5, color: 'var(--text-2)', fontVariantNumeric: 'tabular-nums' }}>
                            {q.expected_dispatch_date ? fmtDate(q.expected_dispatch_date) : '—'}
                          </span>
                          {q.expected_dispatch_date && daysDiff(q.expected_dispatch_date) < 0 && (
                            <div style={{ fontSize: 11, color: 'var(--st-danger-fg)', fontWeight: 600, marginTop: 2 }}>
                              {Math.abs(daysDiff(q.expected_dispatch_date))}d overdue
                            </div>
                          )}
                          {q.delivery_days && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{q.delivery_days}d lead time</div>}
                        </div>
                      ) : isExpired ? (
                        <span style={{ fontSize: 12.5, color: 'var(--text-4)', fontStyle: 'italic' }}>Expired</span>
                      ) : q.workflow_status === 'Delivered' ? (
                        <span style={{ fontSize: 12.5, color: 'var(--text-4)' }}>—</span>
                      ) : (
                        <span style={{
                          fontSize: 12.5,
                          color: isExpired ? 'var(--st-danger-fg)' : 'var(--text-2)',
                          fontVariantNumeric: 'tabular-nums',
                        }}>{fmtDate(q.expires_on)}</span>
                      )}
                    </td>
                    <td>
                      <div className="row-actions">
                        <button type="button" className="ra-btn ra-edit" title="Edit"
                                onClick={stop(() => setEditQuote(q))}>
                          <I.Edit /> <span>Edit</span>
                        </button>
                        {!isPO && !isExpired && q.workflow_status !== 'Dispatched' && q.workflow_status !== 'Delivered' && (
                          <button type="button" className="ra-btn ra-send" title="Send Nudge"
                                  disabled={isSending} onClick={stop(() => handleManualSend(q))}>
                            {isSending ? <I.Loader className="spin" /> : <I.Send />}
                            <span>{isSending ? 'Sending…' : 'Send'}</span>
                          </button>
                        )}
                        {!isPO && !isExpired && q.workflow_status !== 'Dispatched' && q.workflow_status !== 'Delivered' && (
                          <button type="button" className="ra-btn ra-po" title="Mark PO Received"
                                  onClick={stop(() => markPO(q.id))}>
                            <I.CheckCircle /> <span>Mark PO</span>
                          </button>
                        )}
                        {isPO && (
                          <button type="button" className="ra-btn ra-dispatch" title="Dispatch Order"
                                  onClick={stop(() => setDispatchQuote(q))}>
                            <I.Truck /> <span>Dispatch</span>
                          </button>
                        )}
                        <button type="button" className="ra-btn ra-danger" title="Delete"
                                onClick={stop(() => handleDelete(q))}>
                          <I.Trash /> <span>Delete</span>
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      <div className="footer">
        <span>Auto-refreshes every 10s · Think Galactic × Sakthi Electricals</span>
        <span>{quotes.length} total records</span>
      </div>
    </>
  );
};

/* ══════════════════════════════════════════════════════════════════
   BUSINESS SUMMARY PAGE
   ══════════════════════════════════════════════════════════════════ */
const SummaryPage = (props) => {
  const {
    quotes, poQuotes, monthlyData, yearTotal, yearCount, thisMonth,
    avgFeedback, conversionRate, avgQuoteVal, totalNudges, pipelineVal,
    topClients, currentYear, openQuotes, enquiries = [],
  } = props;
  const now2 = new Date();
  const lastMonth = monthlyData[now2.getMonth() - 1] || { value: 0, count: 0 };
  const mom = lastMonth.value > 0 ? Math.round(((thisMonth.value - lastMonth.value) / lastMonth.value) * 100) : null;

  // ROI metrics
  const lostRevenue = quotes.filter(q => q.workflow_status === 'Expired')
    .reduce((s, q) => s + (parseFloat(q.amount_grand_total) || 0), 0);

  const avgDaysToPayment = (() => {
    const paid = poQuotes.filter(q => q.payment_received_date && q.created_at);
    if (!paid.length) return null;
    const total = paid.reduce((s, q) => {
      const days = Math.floor((new Date(q.payment_received_date) - new Date(q.created_at)) / 86400000);
      return s + Math.max(0, days);
    }, 0);
    return Math.round(total / paid.length);
  })();

  const repeatClients = (() => {
    const counts = {};
    poQuotes.forEach(q => { counts[q.client_name] = (counts[q.client_name] || 0) + 1; });
    return Object.entries(counts).filter(([, c]) => c > 1).length;
  })();

  const nudgeEffectiveness = (() => {
    // Which nudge count most often leads to payment
    const nudgeDist = {};
    poQuotes.filter(q => q.nudge_count > 0).forEach(q => {
      const n = Math.min(q.nudge_count, 10);
      nudgeDist[n] = (nudgeDist[n] || 0) + 1;
    });
    const best = Object.entries(nudgeDist).sort((a,b) => b[1]-a[1])[0];
    return best ? `After ${best[0]} nudge${best[0] !== '1' ? 's' : ''}` : null;
  })();

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Business Summary</div>
          <div className="page-sub">Revenue, conversion, and performance insights for {currentYear}.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label={`Year Total ${currentYear}`} value={fmtINR(yearTotal)} sm
                sub={`${yearCount} POs converted`} accent="green"
                icon={<I.TrendUp />} />
        <Metric label="This Month" value={fmtINR(thisMonth.value)} sm
                sub={mom !== null
                  ? <span className={`trend ${mom >= 0 ? 'up' : 'down'}`}>
                      {mom >= 0 ? <I.TrendUp size={11} /> : <I.TrendDown size={11} />}
                      {Math.abs(mom)}% vs last month
                    </span>
                  : `${thisMonth.count} PO${thisMonth.count !== 1 ? 's' : ''}`}
                accent="blue"
                icon={<I.Calendar />} />
        <Metric label="Conversion Rate" value={`${conversionRate}%`}
                sub="Quotes → PO Received" accent="violet"
                icon={<I.Activity />} />
        <Metric label="Lost Revenue" value={fmtINR(lostRevenue)} sm
                sub="From expired quotes" accent={lostRevenue > 0 ? 'red' : 'slate'}
                icon={<I.TrendDown />} />
      </div>

      <div className="summary-grid">
        <div className="panel">
          <div className="panel-h">
            <div className="panel-h-l">
              <div className="panel-title">Monthly Revenue</div>
              <span className="panel-tag">{currentYear}</span>
            </div>
            <div className="amt tnum" style={{ fontSize: 13 }}>Total: {fmtINR(yearTotal)}</div>
          </div>
          <div className="chart-wrap">
            <AreaChart data={monthlyData} currentMonth={now2.getMonth()} />
          </div>
          <div className="chart-legend">
            <span><span className="swatch" style={{ background: 'var(--accent)' }} /> PO Revenue</span>
            <span><span className="swatch" style={{ background: 'var(--accent-soft-2)' }} /> Current month</span>
          </div>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div className="panel">
            <div className="panel-h">
              <div className="panel-title">Performance Metrics</div>
            </div>
            <div className="stat-list">
              <div className="row"><span className="l">Total Quotes</span><span className="v">{quotes.length}</span></div>
              <div className="row"><span className="l">Total POs</span><span className="v" style={{ color: 'var(--st-po-fg)' }}>{poQuotes.length}</span></div>
              <div className="row"><span className="l">Conversion Rate</span><span className="v">{conversionRate}%</span></div>
              <div className="row"><span className="l">Avg Days to Payment</span>
                <span className="v">{avgDaysToPayment !== null ? `${avgDaysToPayment} days` : '—'}</span></div>
              <div className="row"><span className="l">Repeat Clients</span>
                <span className="v" style={{ color: 'var(--st-po-fg)' }}>{repeatClients}</span></div>
              <div className="row"><span className="l">Most Paid After</span>
                <span className="v">{nudgeEffectiveness || '—'}</span></div>
              <div className="row"><span className="l">Lost Revenue (expired)</span>
                <span className="v" style={{ color: lostRevenue > 0 ? 'var(--st-danger-fg)' : undefined }}>{fmtINR(lostRevenue)}</span></div>
              <div className="row"><span className="l">Avg Quote Value</span><span className="v">{fmtINR(avgQuoteVal)}</span></div>
              <div className="row"><span className="l">Total Nudges Sent</span><span className="v">{totalNudges}</span></div>
            </div>
          </div>

          <div className="panel">
            <div className="panel-h">
              <div className="panel-title">Top Clients</div>
              <span className="panel-tag">by revenue</span>
            </div>
            {topClients.length === 0 ? (
              <div className="empty" style={{ padding: 28 }}>
                <I.Building />
                <div className="et">No POs yet</div>
              </div>
            ) : (
              <div className="stat-list">
                {topClients.map(([name, val], i) => (
                  <div key={name} className="client-row">
                    <div className={`client-rank ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}`}>{i + 1}</div>
                    <div className="client-name">{name}</div>
                    <div className="client-amt">{fmtINR(val)}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="footer">
        <span>Think Galactic × Sakthi Electricals · {currentYear}</span>
        <span>Refreshes every 30s</span>
      </div>
    </>
  );
};

/* ══════════════════════════════════════════════════════════════════
   EXPIRING SOON PAGE
   ══════════════════════════════════════════════════════════════════ */
const ExpiryPage = (props) => {
  const { expiringSoon, sendingId, handleManualSend, setSelectedId } = props;
  const critical = expiringSoon.filter(q => { const d = daysDiff(q.expires_on); return d !== null && d <= 1; }).length;
  const week     = expiringSoon.filter(q => { const d = daysDiff(q.expires_on); return d !== null && d >= 2 && d <= 5; }).length;
  const atRisk   = expiringSoon.reduce((s, q) => s + (parseFloat(q.amount_grand_total) || 0), 0);

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Expiring Soon</div>
          <div className="page-sub">Quotes nearing their validity window — send a nudge before they lapse.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label="Expiring 0–1 Days" value={critical}
                sub="Critical — act today" accent="red" icon={<I.AlertTriangle />} />
        <Metric label="Expiring 2–5 Days" value={week}
                sub="Follow up this week" accent="amber" icon={<I.Clock />} />
        <Metric label="Value at Risk" value={fmtINR(atRisk)} sm
                sub="Total expiring pipeline" accent="violet" icon={<I.TrendDown />} />
        <Metric label="Total Expiring" value={expiringSoon.length}
                sub="Quotes need attention" accent="slate" icon={<I.Inbox />} />
      </div>

      <div className="panel">
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">Quotes Expiring Within 5 Days</div>
            <span className="panel-tag">{expiringSoon.length} record{expiringSoon.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        {expiringSoon.length === 0 ? (
          <div className="empty">
            <I.CheckCircle />
            <div className="et">All clear</div>
            <div className="es">No quotes expiring in the next 5 days.</div>
          </div>
        ) : (
          <div style={{ padding: '6px 22px' }}>
            {[...expiringSoon].sort((a, b) => new Date(a.expires_on) - new Date(b.expires_on)).map(q => {
              const diff = daysDiff(q.expires_on);
              const cls = diff === 0 ? 'today' : diff <= 1 ? 'urgent' : 'soon';
              return (
                <div key={q.id} className="expiry-row">
                  <div className={`expiry-days ${cls}`}
                       onClick={() => setSelectedId(q.id)} style={{ cursor: 'pointer' }}>
                    {diff === 0 ? 'TODAY' : `${diff}d left`}
                  </div>
                  <div className="expiry-info"
                       onClick={() => setSelectedId(q.id)} style={{ cursor: 'pointer' }}>
                    <div className="ctitle">{q.client_name}</div>
                    <div className="cqno">{q.quote_number}</div>
                    <div className="cprod">{q.product_name}</div>
                  </div>
                  <div onClick={() => setSelectedId(q.id)} style={{ cursor: 'pointer' }}>
                    <div className="expiry-amt">{fmtINR(q.amount_grand_total)}</div>
                    <div className="expiry-date">Expires {fmtDate(q.expires_on)}</div>
                  </div>
                  <button type="button" className="btn btn-ghost btn-sm"
                          disabled={sendingId === q.id}
                          onClick={(e) => { e.stopPropagation(); e.preventDefault(); handleManualSend(q); }}>
                    {sendingId === q.id ? <><I.Loader className="spin" /> Sending…</> : <><I.Send /> Send Nudge</>}
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>
      <div className="footer">
        <span>Think Galactic × Sakthi Electricals</span>
      </div>
    </>
  );
};

/* ══════════════════════════════════════════════════════════════════
   CONVERTED POs PAGE
   ══════════════════════════════════════════════════════════════════ */
const ConvertedPage = (props) => {
  const { poQuotes, yearTotal, yearCount, thisMonth, avgFeedback, currentYear, setSelectedId, quotes = [], enquiries = [] } = props;
  const awaiting = poQuotes.filter(q => !q.feedback_score).length;
  const dispatched = poQuotes.filter(q => q.workflow_status === 'Dispatched');
  const delivered = poQuotes.filter(q => q.workflow_status === 'Delivered');
  const creditPending = poQuotes.filter(q => q.payment_received === false);

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Converted POs</div>
          <div className="page-sub">Quotes that turned into purchase orders — payment, dispatch, and delivery.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label={`Year Total ${currentYear}`} value={fmtINR(yearTotal)} sm
                sub={`${yearCount} POs this year`} accent="green" icon={<I.TrendUp />} />
        <Metric label="This Month" value={fmtINR(thisMonth.value)} sm
                sub={`${thisMonth.count} PO${thisMonth.count !== 1 ? 's' : ''}`} accent="blue"
                icon={<I.Calendar />} />
        <Metric label="In Transit" value={dispatched.length}
                sub={dispatched.length ? 'Awaiting delivery photo' : 'None dispatched'}
