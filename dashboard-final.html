<!DOCTYPE html>
<html lang="en" data-theme="light" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakthi Electricals — Operations Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ──────────────────────────────────────────────────────────────
   Sakthi · Quotation Tracker — Modern SaaS theme
   Type: Inter (UI) + JetBrains Mono (numerics, quote nos)
   Accent: configurable via --accent (oklch)
   Light / Dark via [data-theme]
   ────────────────────────────────────────────────────────────── */

:root {
  /* layout */
  --sidebar-w: 232px;
  --topbar-h: 56px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --row-pad-y: 18px;

  /* fonts */
  --font: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* light mode (default) */
  --bg:           #FAFAF9;
  --surface:      #FFFFFF;
  --surface-2:    #F6F6F4;
  --surface-3:    #EFEFEC;
  --hover:        rgba(15, 15, 20, 0.035);
  --border:       rgba(15, 15, 20, 0.07);
  --border-strong:rgba(15, 15, 20, 0.13);
  --text:         #18181B;
  --text-2:       #54545B;
  --text-3:       #8B8B92;
  --text-4:       #B4B4BA;

  /* accent — overridden by JS tweaks */
  --accent:        oklch(0.56 0.18 252);
  --accent-hover:  oklch(0.50 0.18 252);
  --accent-fg:     #FFFFFF;
  --accent-soft:   oklch(0.96 0.025 252);
  --accent-soft-2: oklch(0.92 0.05 252);
  --accent-border: oklch(0.86 0.07 252);

  --st-dispatched-bg:  oklch(0.96 0.04 200);
  --st-dispatched-fg:  oklch(0.42 0.15 200);
  --st-dispatched-bd:  oklch(0.85 0.08 200);

  --st-delivered-bg:   oklch(0.96 0.04 145);
  --st-delivered-fg:   oklch(0.40 0.16 145);
  --st-delivered-bd:   oklch(0.84 0.09 145);

  /* semantic status colors */
  --st-open-bg:        oklch(0.96 0.025 252);
  --st-open-fg:        oklch(0.44 0.16 252);
  --st-open-bd:        oklch(0.88 0.05 252);

  --st-follow-bg:      oklch(0.97 0.04 75);
  --st-follow-fg:      oklch(0.50 0.14 65);
  --st-follow-bd:      oklch(0.88 0.07 75);

  --st-po-bg:          oklch(0.96 0.045 150);
  --st-po-fg:          oklch(0.42 0.15 150);
  --st-po-bd:          oklch(0.85 0.08 150);

  --st-expired-bg:     oklch(0.96 0.005 30);
  --st-expired-fg:     oklch(0.50 0.005 30);
  --st-expired-bd:     oklch(0.90 0.005 30);

  --st-danger-bg:      oklch(0.96 0.03 25);
  --st-danger-fg:      oklch(0.50 0.18 25);
  --st-danger-bd:      oklch(0.87 0.08 25);

  /* shadows — soft, layered */
  --shadow-xs: 0 1px 0 rgba(15, 15, 20, 0.04);
  --shadow-sm: 0 1px 2px rgba(15, 15, 20, 0.04), 0 1px 0 rgba(15, 15, 20, 0.03);
  --shadow-md: 0 4px 14px -4px rgba(15, 15, 20, 0.10), 0 2px 4px -2px rgba(15, 15, 20, 0.06);
  --shadow-lg: 0 12px 32px -8px rgba(15, 15, 20, 0.18), 0 4px 8px -4px rgba(15, 15, 20, 0.08);

  --transition: 140ms cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg:           #0A0A0C;
  --surface:      #131316;
  --surface-2:    #18181C;
  --surface-3:    #1F1F24;
  --hover:        rgba(255, 255, 255, 0.04);
  --border:       rgba(255, 255, 255, 0.07);
  --border-strong:rgba(255, 255, 255, 0.13);
  --text:         #ECECEE;
  --text-2:       #9C9CA4;
  --text-3:       #6C6C74;
  --text-4:       #45454C;

  --accent-soft:   color-mix(in oklab, var(--accent) 14%, var(--surface));
  --accent-soft-2: color-mix(in oklab, var(--accent) 22%, var(--surface));
  --accent-border: color-mix(in oklab, var(--accent) 30%, transparent);

  --st-open-bg:        color-mix(in oklab, oklch(0.62 0.16 252) 14%, var(--surface));
  --st-open-fg:        oklch(0.78 0.12 252);
  --st-open-bd:        color-mix(in oklab, oklch(0.62 0.16 252) 28%, transparent);

  --st-follow-bg:      color-mix(in oklab, oklch(0.68 0.14 75) 14%, var(--surface));
  --st-follow-fg:      oklch(0.80 0.12 75);
  --st-follow-bd:      color-mix(in oklab, oklch(0.68 0.14 75) 28%, transparent);

  --st-po-bg:          color-mix(in oklab, oklch(0.60 0.16 150) 14%, var(--surface));
  --st-po-fg:          oklch(0.78 0.14 150);
  --st-po-bd:          color-mix(in oklab, oklch(0.60 0.16 150) 28%, transparent);

  --st-expired-bg:     var(--surface-2);
  --st-expired-fg:     var(--text-3);
  --st-expired-bd:     var(--border);

  --st-danger-bg:      color-mix(in oklab, oklch(0.62 0.20 25) 14%, var(--surface));
  --st-danger-fg:      oklch(0.78 0.15 25);
  --st-danger-bd:      color-mix(in oklab, oklch(0.62 0.20 25) 28%, transparent);

  --st-dispatched-bg:  color-mix(in oklab, oklch(0.60 0.16 200) 14%, var(--surface));
  --st-dispatched-fg:  oklch(0.78 0.14 200);
  --st-dispatched-bd:  color-mix(in oklab, oklch(0.60 0.16 200) 28%, transparent);

  --st-delivered-bg:   color-mix(in oklab, oklch(0.60 0.16 145) 14%, var(--surface));
  --st-delivered-fg:   oklch(0.78 0.14 145);
  --st-delivered-bd:   color-mix(in oklab, oklch(0.60 0.16 145) 28%, transparent);

  --shadow-xs: 0 1px 0 rgba(0, 0, 0, 0.4);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 0 rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 14px -4px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 12px 32px -8px rgba(0, 0, 0, 0.6), 0 4px 8px -4px rgba(0, 0, 0, 0.4);
}

/* density tweak */
[data-density="compact"] { --row-pad-y: 9px; }
[data-density="comfy"]   { --row-pad-y: 18px; }

/* ── base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  font-size: 14px;
  font-feature-settings: "cv11", "ss01", "ss03";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#root { height: 100%; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
input::placeholder { color: var(--text-3); }

.mono { font-family: var(--mono); font-feature-settings: "tnum"; }
.tnum { font-variant-numeric: tabular-nums; }

/* ── sidebar ──────────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 30;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.sb-brand {
  height: 48px;
  padding: 0 12px;
  display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
}
.sb-mark {
  --sakthi-red: oklch(0.58 0.20 25);
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--sakthi-red);
  color: #FFFFFF;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 2px 6px -1px color-mix(in oklab, var(--sakthi-red) 50%, transparent);
}
.sb-mark svg { width: 16px; height: 16px; }
.sb-name {
  font-size: 12.5px; font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sb-name .sub {
  display: block;
  font-size: 10.5px; font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0;
  margin-top: 1px;
  line-height: 1.1;
}

.sb-nav { padding: 8px 10px; flex: 1; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; min-height: 0; }
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sb-section {
  font-size: 9.5px; font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 6px 8px 2px;
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
  color: var(--text-2);
  transition: background var(--transition), color var(--transition);
  font-size: 13px; font-weight: 500;
  letter-spacing: -0.005em;
}
.sb-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }
.sb-item:hover { background: var(--hover); color: var(--text); }
.sb-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}
.sb-item.active svg { opacity: 1; }
.sb-item .count {
  margin-left: auto;
  font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  background: var(--surface-2);
  color: var(--text-2);
  padding: 1px 7px;
  border-radius: 20px;
  min-width: 22px;
  text-align: center;
}
.sb-item.active .count {
  background: color-mix(in oklab, var(--accent) 18%, transparent);
  color: var(--accent);
}

.sb-foot {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: row; gap: 0; flex-wrap: wrap;
  flex-shrink: 0;
}
.sb-stat {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 1px; flex: 1; padding: 4px 6px;
  border-right: 1px solid var(--border);
}
.sb-stat:last-child { border-right: none; }
.sb-stat-l {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 500;
}
.sb-stat-v {
  font-size: 12px; font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.sb-stat-v.green { color: oklch(0.55 0.15 150); }
.sb-stat-v.red   { color: oklch(0.55 0.18 25); }
[data-theme="dark"] .sb-stat-v.green { color: oklch(0.78 0.14 150); }
[data-theme="dark"] .sb-stat-v.red   { color: oklch(0.78 0.15 25); }

/* ── topbar ───────────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: var(--sidebar-w); right: 0; z-index: 20;
  height: var(--topbar-h);
  background: color-mix(in oklab, var(--surface) 80%, transparent);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  gap: 16px;
  transition: left var(--transition);
}
.tb-crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-2);
}
.tb-page {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.012em;
}
.tb-date {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  letter-spacing: -0.005em;
}
.tb-date svg { color: var(--text-3); }
.tb-cta {
  font-weight: 500;
}
@media (max-width: 900px) {
  .tb-date { display: none; }
  .tb-cta span { display: none; }
}

/* ── MOBILE RESPONSIVE ────────────────────────────────────── */
@media (max-width: 768px) {

  /* Sidebar becomes bottom nav on mobile */
  :root { --sidebar-w: 0px; --topbar-h: 52px; }

  .sidebar {
    position: fixed;
    bottom: 0; left: 0; right: 0; top: auto;
    width: 100% !important;
    height: auto;
    flex-direction: row;
    border-right: none;
    border-top: 1px solid var(--border);
    z-index: 200;
    padding: 0;
    overflow-x: auto;
    overflow-y: hidden;
  }

  .sb-head { display: none; }
  .sb-foot { display: none; }

  .sb-nav {
    display: flex;
    flex-direction: row;
    padding: 0;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex: 1;
  }
  .sb-nav::-webkit-scrollbar { display: none; }

  .sb-section-header { display: none; }

  .sb-item {
    flex-direction: column;
    gap: 3px;
    padding: 8px 12px;
    border-radius: 0;
    font-size: 10px;
    min-width: 64px;
    flex-shrink: 0;
    height: 56px;
    justify-content: center;
    border-left: none;
    border-bottom: 2px solid transparent;
  }
  .sb-item.active {
    border-left: none;
    border-bottom: 2px solid var(--accent);
    background: var(--accent-soft);
  }
  .sb-item svg { width: 18px; height: 18px; }
  .sb-item .count {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 9px;
    padding: 1px 4px;
    min-width: 14px;
  }
  .sb-item span { font-size: 9.5px; line-height: 1; }

  /* Main layout */
  .main-wrap {
    margin-left: 0 !important;
    padding-bottom: 70px; /* space for bottom nav */
  }

  .topbar {
    left: 0 !important;
  }

  .content {
    padding: 14px 14px 80px;
  }

  /* Page header */
  .page-head {
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .page-head .btn { width: 100%; justify-content: center; }

  /* Metrics grid */
  .metrics {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
  }

  /* Command center grids */
  .cmd-grid { grid-template-columns: 1fr !important; }

  /* Bottom row grids */
  div[style*="gridTemplateColumns: '1fr 1fr'"],
  div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }

  /* Quick stats 3-col */
  div[style*="repeat(3, 1fr)"],
  div[style*="repeat(5,1fr)"],
  div[style*="repeat(4,1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* Table — hide less important columns, make it scroll */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { min-width: 500px; }

  /* Hide columns on mobile */
  th:nth-child(5),
  td:nth-child(5),
  th:nth-child(6),
  td:nth-child(6) { display: none; }

  /* Row actions stack */
  .row-actions { flex-direction: column; gap: 4px; }
  .ra-btn span { display: none; }
  .ra-btn { padding: 6px; min-width: 32px; justify-content: center; }

  /* Modals full screen */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal {
    width: 100% !important;
    max-width: 100% !important;
    border-radius: var(--radius) var(--radius) 0 0;
    max-height: 90vh;
    overflow-y: auto;
  }

  /* Detail panel full screen */
  .over-panel {
    width: 100vw !important;
    right: 0 !important;
    top: var(--topbar-h) !important;
    bottom: 56px !important;
    border-radius: 0 !important;
  }

  /* Proof grid */
  .proof-grid { grid-template-columns: repeat(2, 1fr) !important; }

  /* Upload section */
  .upload-grid { grid-template-columns: 1fr !important; }

  /* Search bar */
  .tb-search { width: 160px; }

  /* Topbar breadcrumb */
  .tb-crumbs { display: none; }

  /* Panel tag wrapping */
  .panel-h { flex-wrap: wrap; gap: 6px; }

  /* Funnel bars */
  .funnel-wrap { padding: 10px 14px 14px; }
  .funnel-label { font-size: 9px; }
  .funnel-val { font-size: 10px; }

  /* Cert rows */
  .cert-row { grid-template-columns: auto 1fr; gap: 8px; }
  .cert-row > div:last-child { grid-column: 2; }

  /* Orders table */
  .ops-grid { grid-template-columns: 1fr !important; }
}
.tb-crumbs .sep { color: var(--text-4); }
.tb-crumbs .cur { color: var(--text); font-weight: 600; }
.tb-right {
  display: flex; align-items: center; gap: 10px;
}
.live-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: color-mix(in oklab, oklch(0.62 0.16 150) 12%, var(--surface));
  border: 1px solid color-mix(in oklab, oklch(0.62 0.16 150) 30%, transparent);
  color: oklch(0.45 0.14 150);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11.5px; font-weight: 600;
}
[data-theme="dark"] .live-pill { color: oklch(0.80 0.14 150); }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: oklch(0.62 0.18 150);
  box-shadow: 0 0 0 0 color-mix(in oklab, oklch(0.62 0.18 150) 70%, transparent);
  animation: live-pulse 2.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 color-mix(in oklab, oklch(0.62 0.18 150) 70%, transparent); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
}
.tb-iconbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.tb-iconbtn:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
.tb-iconbtn svg { width: 15px; height: 15px; }

.tb-search {
  position: relative;
  width: 280px;
}
.tb-search input {
  width: 100%;
  height: 32px;
  padding: 0 12px 0 32px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: all var(--transition);
}
.tb-search input:focus {
  background: var(--surface);
  border-color: var(--accent-border);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 14%, transparent);
}
.tb-search svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--text-3);
  pointer-events: none;
}
.tb-kbd {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 4px;
  pointer-events: none;
}

/* ── layout ───────────────────────────────────────────────── */
.layout {
  padding-top: var(--topbar-h);
  padding-left: var(--sidebar-w);
  min-height: 100vh;
  transition: padding-left var(--transition);
}
.main {
  padding: 22px 24px 60px;
  width: 100%;
}
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 22px;
  gap: 16px;
}
.page-title {
  font-size: 24px; font-weight: 600;
  letter-spacing: -0.022em;
  color: var(--text);
  line-height: 1.1;
}
.page-sub {
  margin-top: 4px;
  font-size: 13.5px;
  color: var(--text-2);
}

/* ── metric cards ─────────────────────────────────────────── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-xs);
  position: relative;
  transition: box-shadow var(--transition), border-color var(--transition);
}
.metric:hover { box-shadow: var(--shadow-sm); }
.metric .l {
  font-size: 11.5px; font-weight: 500;
  color: var(--text-2);
  letter-spacing: 0;
  display: flex; align-items: center; gap: 7px;
}
.metric .l svg { width: 13px; height: 13px; opacity: 0.8; }
.metric .v {
  margin-top: 8px;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.022em;
  line-height: 1.1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.metric .v.sm { font-size: 22px; }
.metric .s {
  margin-top: 5px;
  font-size: 12px;
  color: var(--text-3);
}
.metric .trend {
  margin-top: 5px;
  font-size: 12px;
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 500;
}
.trend.up { color: oklch(0.50 0.15 150); }
.trend.down { color: oklch(0.55 0.18 25); }
[data-theme="dark"] .trend.up { color: oklch(0.78 0.14 150); }
[data-theme="dark"] .trend.down { color: oklch(0.78 0.15 25); }
.metric .accent-bar {
  position: absolute;
  inset: 0 auto 0 0;
  width: 3px;
  border-radius: var(--radius) 0 0 var(--radius);
}
.metric.accent-blue   .accent-bar { background: oklch(0.55 0.17 252); }
.metric.accent-green  .accent-bar { background: oklch(0.55 0.15 150); }
.metric.accent-red    .accent-bar { background: oklch(0.55 0.18 25); }
.metric.accent-amber  .accent-bar { background: oklch(0.65 0.14 70); }
.metric.accent-violet .accent-bar { background: oklch(0.55 0.18 290); }
.metric.accent-slate  .accent-bar { background: var(--text-2); }

/* ── alert banner ─────────────────────────────────────────── */
.alert {
  background: var(--st-danger-bg);
  border: 1px solid var(--st-danger-bd);
  color: var(--st-danger-fg);
  border-radius: var(--radius);
  padding: 11px 16px;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 11px;
  font-size: 13.5px; font-weight: 500;
}
.alert svg { width: 16px; height: 16px; flex-shrink: 0; }
.alert .alert-action {
  margin-left: auto;
  font-size: 12px; font-weight: 600;
  color: inherit;
  background: transparent;
  border: 1px solid currentColor;
  padding: 4px 10px;
  border-radius: 6px;
  opacity: 0.9;
  transition: opacity var(--transition);
}
.alert .alert-action:hover { opacity: 1; }

/* ── panel / card ─────────────────────────────────────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-xs);
  margin-bottom: 18px;
  overflow: hidden;
}
.panel-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.panel-h-l {
  display: flex; align-items: center; gap: 10px;
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
}
.panel-tag {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-2);
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 4px;
}
.panel-body { padding: 18px; }
.panel-body.tight { padding: 4px 18px; }

/* ── upload form ──────────────────────────────────────────── */
.upload-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr auto;
  gap: 14px;
  align-items: end;
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 11.5px; font-weight: 500;
  color: var(--text-2);
}
.input {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  height: 36px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: all var(--transition);
  width: 100%;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 14%, transparent);
}
.input.textarea { height: auto; padding: 9px 12px; resize: vertical; min-height: 60px; }

.file-drop {
  position: relative;
  background: var(--surface-2);
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius-sm);
  height: 36px;
  padding: 0 12px;
  display: flex; align-items: center; gap: 9px;
  color: var(--text-3);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
}
.file-drop:hover { border-color: var(--accent); color: var(--text); background: var(--surface); }
.file-drop.has-file {
  border-style: solid;
  border-color: color-mix(in oklab, oklch(0.55 0.15 150) 40%, transparent);
  background: color-mix(in oklab, oklch(0.55 0.15 150) 8%, var(--surface));
  color: oklch(0.45 0.14 150);
}
[data-theme="dark"] .file-drop.has-file { color: oklch(0.80 0.14 150); }
.file-drop svg { width: 15px; height: 15px; flex-shrink: 0; }
.file-drop .fname {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.file-drop input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}

/* ── buttons ──────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 0 14px;
  height: 36px;
  font-size: 13px; font-weight: 500;
  white-space: nowrap;
  transition: all var(--transition);
  letter-spacing: -0.005em;
}
.btn svg { width: 14px; height: 14px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--accent);
  color: var(--accent-fg);
  box-shadow: 0 1px 2px color-mix(in oklab, var(--accent) 30%, transparent);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 2px 8px -1px color-mix(in oklab, var(--accent) 45%, transparent);
}
.btn-ghost {
  background: var(--surface);
  border-color: var(--border-strong);
  color: var(--text);
}
.btn-ghost:hover:not(:disabled) {
  background: var(--surface-2);
  border-color: var(--text-3);
}
.btn-sm {
  height: 30px; font-size: 12.5px; padding: 0 11px; gap: 5px;
}
.btn-sm svg { width: 13px; height: 13px; }
.btn-xs {
  height: 26px; font-size: 12px; padding: 0 9px; gap: 5px;
  border-radius: 5px;
}
.btn-xs svg { width: 12px; height: 12px; }
.btn-danger {
  background: var(--surface);
  border-color: var(--st-danger-bd);
  color: var(--st-danger-fg);
}
.btn-danger:hover:not(:disabled) {
  background: var(--st-danger-bg);
}

/* ── upload status ────────────────────────────────────────── */
.upload-status {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  display: flex; align-items: center; gap: 9px;
  border: 1px solid;
}
.upload-status svg { width: 15px; height: 15px; flex-shrink: 0; }
.upload-status.success {
  background: var(--st-po-bg); border-color: var(--st-po-bd); color: var(--st-po-fg);
}
.upload-status.error {
  background: var(--st-danger-bg); border-color: var(--st-danger-bd); color: var(--st-danger-fg);
}
.upload-status.loading {
  background: var(--surface-2); border-color: var(--border); color: var(--text-2);
}
.spin { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── table ────────────────────────────────────────────────── */
.tbl-controls {
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
}
.input-sm {
  height: 32px; font-size: 13px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 11px;
  color: var(--text);
  outline: none;
}
.input-sm:focus {
  background: var(--surface);
  border-color: var(--accent-border);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 12%, transparent);
}
.search-sm {
  position: relative;
  min-width: 240px;
}
.search-sm input { width: 100%; padding-left: 32px; }
.search-sm svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--text-3);
  pointer-events: none;
}

.tbl-wrap { overflow-x: auto; }
table.q-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.q-table thead th {
  position: sticky; top: 0;
  background: var(--surface-2);
  padding: 12px 14px;
  text-align: left;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.q-table tbody td {
  padding: var(--row-pad-y) 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  color: var(--text);
}
.q-table tbody tr {
  transition: background var(--transition);
}
.q-table tbody td.cell-clickable {
  cursor: pointer;
}
.q-table tbody tr:hover { background: var(--hover); }
.q-table tbody tr.expired { opacity: 0.5; }
.q-table tbody tr.selected {
  background: var(--accent-soft);
}
.q-table tbody tr:last-child td { border-bottom: none; }

.cell-client .name {
  font-weight: 700; font-size: 15px;
  letter-spacing: -0.005em;
  color: var(--text);
}
.cell-client .qno {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  margin-top: 3px;
}
.cell-client .contact {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 2px;
}
.cell-product {
  font-size: 12.5px;
  color: var(--text-2);
  max-width: 220px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.amt {
  font-size: 15.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  letter-spacing: -0.005em;
}

/* ── badges ───────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 11.5px; font-weight: 700;
  border: 1px solid;
  letter-spacing: 0;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.badge-open      { background: var(--st-open-bg);        color: var(--st-open-fg);        border-color: var(--st-open-bd); }
.badge-follow    { background: var(--st-follow-bg);      color: var(--st-follow-fg);      border-color: var(--st-follow-bd); }
.badge-po        { background: var(--st-po-bg);          color: var(--st-po-fg);          border-color: var(--st-po-bd); }
.badge-expired   { background: var(--st-expired-bg);     color: var(--st-expired-fg);     border-color: var(--st-expired-bd); }
.badge-closed    { background: var(--st-expired-bg);     color: var(--st-expired-fg);     border-color: var(--st-expired-bd); }
.badge-dispatched{ background: var(--st-dispatched-bg);  color: var(--st-dispatched-fg);  border-color: var(--st-dispatched-bd); }
.badge-delivered { background: var(--st-delivered-bg);   color: var(--st-delivered-fg);   border-color: var(--st-delivered-bd); }

/* ── nudge date ───────────────────────────────────────────── */
.nudge {
  font-size: 12.5px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.nudge.today {
  background: var(--st-danger-bg);
  color: var(--st-danger-fg);
  border: 1px solid var(--st-danger-bd);
  padding: 2px 8px;
  border-radius: 5px;
  font-weight: 600;
}
.nudge.urgent {
  color: var(--st-danger-fg);
  font-weight: 600;
}

/* ── toggles ──────────────────────────────────────────────── */
.tog-stack { display: flex; flex-direction: column; gap: 6px; }
.tog-row { display: inline-flex; align-items: center; gap: 8px; }
.tog {
  width: 32px; height: 18px;
  border-radius: 10px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  flex-shrink: 0;
  padding: 0;
}
.tog::after {
  content: '';
  position: absolute;
  top: 1.5px; left: 1.5px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--surface);
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  transition: transform var(--transition);
}
.tog.on {
  background: var(--accent);
  border-color: transparent;
}
.tog.on::after {
  transform: translateX(14px);
  background: #fff;
}
.tog-lbl {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-2);
  min-width: 30px;
}
.tog.lg { width: 40px; height: 22px; }
.tog.lg::after { width: 17px; height: 17px; top: 1.5px; left: 1.5px; }
.tog.lg.on::after { transform: translateX(18px); }

/* ── action buttons in row (2x2 grid of labeled mini-buttons) ── */
.row-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  width: 220px;
  margin-left: auto;
}
.ra-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  height: 38px;
  padding: 0 12px;
  border-radius: 7px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text-2);
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.005em;
  transition: all var(--transition);
  white-space: nowrap;
  width: 100%;
}
.ra-btn svg { width: 15px; height: 15px; }
.ra-btn:hover:not(:disabled) {
  background: var(--surface-2);
  color: var(--text);
  border-color: var(--text-3);
}
.ra-btn:disabled { opacity: 0.5; pointer-events: none; }

.ra-btn.ra-send:hover {
  background: var(--accent-soft);
  border-color: var(--accent-border);
  color: var(--accent);
}
.ra-btn.ra-po {
  background: var(--st-po-bg);
  border-color: var(--st-po-bd);
  color: var(--st-po-fg);
}
.ra-btn.ra-po:hover {
  background: color-mix(in oklab, var(--st-po-fg) 12%, var(--surface));
}
.ra-btn.ra-dispatch {
  background: var(--st-dispatched-bg);
  border-color: var(--st-dispatched-bd);
  color: var(--st-dispatched-fg);
}
.ra-btn.ra-dispatch:hover {
  background: color-mix(in oklab, var(--st-dispatched-fg) 12%, var(--surface));
}
.ra-btn.ra-danger:hover {
  background: var(--st-danger-bg);
  border-color: var(--st-danger-bd);
  color: var(--st-danger-fg);
}

/* ── empty / loading state ───────────────────────────────── */
.empty {
  padding: 56px 20px;
  text-align: center;
  color: var(--text-3);
}
.empty svg {
  width: 38px; height: 38px;
  opacity: 0.4;
  margin-bottom: 14px;
}
.empty .et { font-size: 14px; font-weight: 500; color: var(--text-2); }
.empty .es { font-size: 12.5px; margin-top: 4px; color: var(--text-3); }

/* ── modal ────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: color-mix(in oklab, var(--bg) 60%, rgba(0,0,0,0.4));
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fade-in 160ms ease-out;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 540px;
  max-width: 100%;
  max-height: 92vh;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: pop-in 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes pop-in {
  from { transform: scale(0.96) translateY(8px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-h {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-t {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.modal-x {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-2);
  width: 30px; height: 30px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.modal-x:hover { background: var(--surface-2); border-color: var(--border); color: var(--text); }
.modal-x svg { width: 14px; height: 14px; }
.modal-body {
  padding: 20px 22px;
  overflow-y: auto;
}
.modal-body .section {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 4px 0 12px;
  display: flex; align-items: center; gap: 10px;
}
.modal-body .section::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.modal-body .section:not(:first-child) { margin-top: 20px; }
.modal-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 4px;
}
.modal-quote-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 6px;
}
.modal-quote-card .cn { font-size: 14px; font-weight: 600; color: var(--text); }
.modal-quote-card .qn { font-family: var(--mono); font-size: 11.5px; color: var(--text-3); margin-top: 3px; }
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  flex-shrink: 0;
}
.modal-header {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.modal-close {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-2);
  width: 30px; height: 30px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.modal-close:hover { background: var(--surface-2); border-color: var(--border); color: var(--text); }
.modal-close svg { width: 14px; height: 14px; }
.tog-block {
  display: flex; flex-direction: column; gap: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.tog-block .row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.tog-block .row .lbl {
  font-size: 13px; font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 9px;
}
.tog-block .row .lbl svg { width: 15px; height: 15px; color: var(--text-2); }
.tog-block .row .sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.info-note {
  font-size: 12px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-border);
  color: var(--accent);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-top: 8px;
  display: flex; align-items: flex-start; gap: 8px;
}
.info-note svg { width: 14px; height: 14px; margin-top: 1px; flex-shrink: 0; }

/* ── slide-over detail panel ─────────────────────────────── */
.over-bg {
  position: fixed; inset: 0; z-index: 45;
  background: rgba(0,0,0,0.25);
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
  animation: fade-in 160ms ease-out;
}
.over-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 46;
  width: 520px;
  max-width: 100vw;
  background: var(--bg);
  border-left: 1px solid var(--border);
  box-shadow: -20px 0 40px -10px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  animation: slide-in 220ms cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slide-in {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.over-h {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 14px;
}
.over-h .title {
  font-size: 18px; font-weight: 600;
  color: var(--text);
  letter-spacing: -0.014em;
  line-height: 1.2;
}
.over-h .qno {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  margin-top: 4px;
}
.over-h .badges {
  display: flex; gap: 8px; align-items: center;
  margin-top: 10px;
}
.over-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px 40px;
}
.over-body .section {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 24px 0 12px;
}
.over-body .section:first-child { margin-top: 0; }

.kv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.kv {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
}
.kv .k {
  font-size: 11.5px;
  color: var(--text-3);
  font-weight: 500;
}
.kv .v {
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: -0.005em;
}
.kv .v.lg { font-size: 18px; font-variant-numeric: tabular-nums; letter-spacing: -0.014em; }
.kv .v.mono { font-family: var(--mono); font-size: 12.5px; }
.kv .v.muted { color: var(--text-2); font-weight: 500; }

.timeline {
  position: relative;
  padding-left: 24px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 6px; top: 6px; bottom: 6px;
  width: 1px;
  background: var(--border-strong);
}
.tl-item {
  position: relative;
  padding-bottom: 16px;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: -23px; top: 5px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--text-3);
}
.tl-item.accent::before {
  border-color: var(--accent);
  background: var(--accent);
}
.tl-item.green::before {
  border-color: oklch(0.55 0.15 150);
  background: oklch(0.55 0.15 150);
}
.tl-item .tl-t {
  font-size: 13px; font-weight: 500; color: var(--text);
}
.tl-item .tl-s {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 2px;
}

.over-actions {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex; gap: 8px;
}
.over-actions .btn { flex: 1; }

/* ── chart (summary) ──────────────────────────────────────── */
.chart-wrap {
  padding: 18px 22px 8px;
}
.chart {
  width: 100%;
  height: 240px;
  display: block;
}
.chart .axis-y text, .chart .axis-x text {
  font-family: var(--mono);
  font-size: 10.5px;
  fill: var(--text-3);
}
.chart .grid { stroke: var(--border); stroke-dasharray: 2 3; }
.chart .area-fill {
  fill: var(--accent);
  opacity: 0.10;
}
.chart .area-stroke {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  stroke-linejoin: round;
}
.chart .dot {
  fill: var(--surface);
  stroke: var(--accent);
  stroke-width: 2;
}
.chart .bar {
  fill: var(--accent-soft-2);
}
.chart .bar:hover { fill: var(--accent); }
.chart-legend {
  padding: 4px 22px 16px;
  font-size: 11.5px;
  color: var(--text-3);
  display: flex; gap: 16px;
  flex-wrap: wrap;
}
.chart-legend .swatch {
  display: inline-block; width: 9px; height: 9px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

/* summary grid */
.summary-grid {
  display: grid;
  grid-template-columns: 1.7fr 1fr;
  gap: 18px;
}
@media (max-width: 1000px) { .summary-grid { grid-template-columns: 1fr; } }

/* stat list */
.stat-list { padding: 4px 18px; }
.stat-list .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.stat-list .row:last-child { border-bottom: none; }
.stat-list .row .l {
  font-size: 13px;
  color: var(--text-2);
}
.stat-list .row .v {
  font-size: 14px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  letter-spacing: -0.005em;
}

/* top clients */
.client-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.client-row:last-child { border-bottom: none; }
.client-rank {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface-2);
  color: var(--text-2);
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.client-rank.gold   { background: oklch(0.92 0.08 80); color: oklch(0.40 0.14 70); border-color: oklch(0.80 0.12 80); }
.client-rank.silver { background: var(--surface-3); color: var(--text-2); }
.client-rank.bronze { background: oklch(0.92 0.06 50); color: oklch(0.40 0.12 50); border-color: oklch(0.80 0.10 50); }
.client-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.client-amt { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; color: oklch(0.50 0.14 150); }
[data-theme="dark"] .client-amt { color: oklch(0.78 0.14 150); }

/* po card */
.po-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: start;
  transition: box-shadow var(--transition);
}
.po-card:hover { box-shadow: var(--shadow-sm); }
.po-card .ctitle { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.005em; }
.po-card .cqno { font-family: var(--mono); font-size: 11.5px; color: var(--text-3); margin-top: 3px; }
.po-card .cprod { font-size: 12.5px; color: var(--text-2); margin-top: 6px; }
.po-card .cmeta { font-size: 11.5px; color: var(--text-3); margin-top: 6px; }
.po-card .camt { font-size: 18px; font-weight: 600; color: oklch(0.50 0.14 150); font-variant-numeric: tabular-nums; letter-spacing: -0.014em; }
[data-theme="dark"] .po-card .camt { color: oklch(0.78 0.14 150); }
.po-card .awaiting {
  margin-top: 8px;
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-3);
}

.stars { display: inline-flex; align-items: center; gap: 1px; margin-top: 6px; }
.stars svg { width: 14px; height: 14px; color: oklch(0.65 0.14 70); }
.stars svg.off { color: var(--text-4); }
.stars-note {
  font-size: 12px; color: var(--text-2); margin-left: 8px;
}

/* expiry list */
.expiry-row {
  display: grid;
  grid-template-columns: 76px 1fr auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.expiry-row:last-child { border-bottom: none; }
.expiry-days {
  text-align: center;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
  border: 1px solid;
}
.expiry-days.today  { background: var(--st-danger-fg); color: var(--surface); border-color: transparent; }
.expiry-days.urgent { background: var(--st-danger-bg); color: var(--st-danger-fg); border-color: var(--st-danger-bd); }
.expiry-days.soon   { background: var(--st-follow-bg); color: var(--st-follow-fg); border-color: var(--st-follow-bd); }

.expiry-info .ctitle { font-size: 13.5px; font-weight: 600; color: var(--text); }
.expiry-info .cqno { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 2px; }
.expiry-info .cprod { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.expiry-amt { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); text-align: right; }
.expiry-date { font-size: 11px; color: var(--text-3); margin-top: 2px; text-align: right; }

/* footer */
/* ── month tabs ───────────────────────────────────────────── */
.month-tab {
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid transparent;
  font-size: 12px; font-weight: 500;
  color: var(--text-3); background: transparent;
  transition: all var(--transition); font-family: var(--font); cursor: pointer;
}
.month-tab:hover { background: var(--hover); color: var(--text); }
.month-tab.active {
  background: var(--accent-soft); color: var(--accent);
  border-color: var(--accent-border); font-weight: 600;
}

.footer {
  margin-top: 28px;
  padding: 14px 0;
  font-size: 11.5px;
  color: var(--text-3);
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}

/* ── Pipeline Funnel ──────────────────────────────────────── */
.funnel-wrap { padding: 18px 22px 22px; }
.funnel-stage {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.funnel-label { font-size: 12.5px; font-weight: 500; color: var(--text-2); text-align: right; }
.funnel-bar-wrap { height: 36px; background: var(--surface-2); border-radius: 6px; overflow: hidden; }
.funnel-bar {
  height: 100%; border-radius: 6px;
  display: flex; align-items: center; padding: 0 10px;
  font-size: 12px; font-weight: 600; color: #fff;
  transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
  min-width: 36px; white-space: nowrap;
}
.funnel-val { font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; text-align: right; min-width: 80px; }

/* ── Proof vault gallery ──────────────────────────────────── */
.proof-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 18px; }
.proof-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: box-shadow var(--transition); }
.proof-card:hover { box-shadow: var(--shadow-md); }
.proof-img { width: 100%; aspect-ratio: 4/3; background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--text-3); cursor: pointer; position: relative; overflow: hidden; }
.proof-img img { width: 100%; height: 100%; object-fit: cover; }
.proof-img svg { width: 32px; height: 32px; opacity: 0.4; }
.proof-meta { padding: 10px 14px 12px; }
.proof-meta .client { font-size: 13px; font-weight: 600; color: var(--text); }
.proof-meta .order { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 2px; }
.proof-meta .date { font-size: 11.5px; color: var(--text-2); margin-top: 4px; }
.proof-type-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; border: 1px solid; }
.proof-type-tag.payment { background: var(--st-po-bg); color: var(--st-po-fg); border-color: var(--st-po-bd); }
.proof-type-tag.delivery { background: var(--st-delivered-bg); color: var(--st-delivered-fg); border-color: var(--st-delivered-bd); }

/* ── Lightbox ─────────────────────────────────────────────── */
.lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; padding: 20px; animation: fade-in 160ms ease-out; cursor: pointer; }
.lightbox img { max-width: 90vw; max-height: 88vh; border-radius: var(--radius); box-shadow: 0 24px 60px rgba(0,0,0,0.5); cursor: default; }
.lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
.lightbox-meta { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; }

/* ── Command center ───────────────────────────────────────── */
.cmd-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; margin-bottom: 18px; }
@media (max-width: 1100px) { .cmd-grid { grid-template-columns: 1fr; } }
.action-row { display: flex; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.action-row:last-child { border-bottom: none; }
.action-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.action-dot.red { background: oklch(0.55 0.18 25); }
.action-dot.amber { background: oklch(0.65 0.14 70); }
.action-dot.blue { background: oklch(0.55 0.17 252); }
.action-dot.green { background: oklch(0.55 0.15 150); }
.action-content { flex: 1; min-width: 0; }
.action-title { font-size: 13px; font-weight: 500; color: var(--text); }
.action-sub { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }

/* ── Credit aging ─────────────────────────────────────────── */
.aging-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 5px; font-size: 11.5px; font-weight: 600; border: 1px solid; white-space: nowrap; }
.aging-badge.fresh { background: var(--st-po-bg); color: var(--st-po-fg); border-color: var(--st-po-bd); }
.aging-badge.warn  { background: var(--st-follow-bg); color: var(--st-follow-fg); border-color: var(--st-follow-bd); }
.aging-badge.danger{ background: var(--st-danger-bg); color: var(--st-danger-fg); border-color: var(--st-danger-bd); }

/* ── Tender pack ──────────────────────────────────────────── */
.tender-row { display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 14px; align-items: center; padding: 13px 18px; border-bottom: 1px solid var(--border); transition: background var(--transition); }
.tender-row:hover { background: var(--hover); }
.tender-row:last-child { border-bottom: none; }
.tender-num { font-family: var(--mono); font-size: 11px; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }

/* ── Satisfaction ─────────────────────────────────────────── */
.rating-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rating-bar .star-label { font-size: 12px; font-weight: 500; color: var(--text-2); width: 40px; text-align: right; flex-shrink: 0; }
.rating-bar .bar-track { flex: 1; height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
.rating-bar .bar-fill { height: 100%; background: oklch(0.65 0.14 70); border-radius: 4px; transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1); }
.rating-bar .bar-count { font-size: 11.5px; color: var(--text-3); width: 24px; flex-shrink: 0; }

/* ── Sidebar sections ─────────────────────────────────────── */
.sb-section-header { font-size: 10px; font-weight: 700; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 10px 4px; }
</style>
</head>

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-name="lib">
const SUPABASE_URL     = 'https://ddolhasfuiprrlorfpkk.supabase.co';
const SUPABASE_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkb2xoYXNmdWlwcnJsb3JmcGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTIyMTgsImV4cCI6MjA5Mzk2ODIxOH0._dmMKnfthUQ3PQg9L_ONGravm5S_7RWidAiLkMIG8Os';
const N8N_WEBHOOK      = 'https://n8n-production-b18ce.up.railway.app/webhook/ingest-quote';
const N8N_MANUAL_NUDGE = 'https://n8n-production-b18ce.up.railway.app/webhook/manual-nudge';
const N8N_DISPATCH     = 'https://n8n-production-b18ce.up.railway.app/webhook/dispatch-order';

const sbFetch = async (path, opts = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : [];
};

const fetchQuotations  = () => sbFetch('quotations?select=*&order=created_at.desc');
const updateQuotation  = (id, u) => sbFetch(`quotations?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(u) });
const deleteQuotation  = (id) => fetch(`${SUPABASE_URL}/rest/v1/quotations?id=eq.${id}`, {
  method: 'DELETE',
  headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer: 'return=minimal' },
});

/* ── formatters ───────────────────────────────────────────── */
const fmtINR = (v) => {
  if (!v && v !== 0) return '—';
  const n = parseFloat(v);
  if (!n) return '—';
  if (n >= 10000000) return `₹${(n / 10000000).toFixed(2)} Cr`;
  if (n >= 100000)   return `₹${(n / 100000).toFixed(2)} L`;
  return `₹${n.toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
};
const fmtINRFull = (v) => {
  if (!v && v !== 0) return '—';
  const n = parseFloat(v);
  if (!n) return '—';
  return `₹${n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};
const fmtDate = (d) => {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
};
const fmtDateTime = (d) => {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
};
const fmtRelative = (d) => {
  if (!d) return '—';
  const diff = (new Date() - new Date(d)) / 1000;
  if (diff < 60)        return 'just now';
  if (diff < 3600)      return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400)     return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}d ago`;
  return fmtDate(d);
};
const daysDiff = (d) => d ? Math.floor((new Date(d) - new Date()) / 86400000) : null;

const nudgeLabel = (ds) => {
  if (!ds) return null;
  const diff = daysDiff(ds);
  if (diff === 0)  return { label: 'Today',         cls: 'today' };
  if (diff === 1)  return { label: 'Tomorrow',      cls: 'urgent' };
  if (diff < 0)    return { label: `${Math.abs(diff)}d overdue`, cls: 'urgent' };
  if (diff <= 7)   return { label: `In ${diff}d`,   cls: 'urgent' };
  return { label: `In ${diff}d`, cls: '' };
};

const initials = (name = '') => name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '?';

/* ── primitives ───────────────────────────────────────────── */
const Badge = ({ status }) => {
  const map = {
    'Open':         { cls: 'badge-open',       label: 'Open' },
    'Following Up': { cls: 'badge-follow',     label: 'Following Up' },
    'PO Received':  { cls: 'badge-po',         label: 'PO Received' },
    'Expired':      { cls: 'badge-expired',    label: 'Expired' },
    'Closed':       { cls: 'badge-closed',     label: 'Closed' },
    'Dispatched':   { cls: 'badge-dispatched', label: 'Dispatched' },
    'Delivered':    { cls: 'badge-delivered',  label: 'Delivered' },
  };
  const { cls, label } = map[status] || { cls: 'badge-open', label: status };
  return <span className={`badge ${cls}`}>{label}</span>;
};

const Toggle = ({ value, onChange, size = 'sm' }) => (
  <button
    type="button"
    className={`tog ${size === 'lg' ? 'lg' : ''} ${value ? 'on' : ''}`}
    onClick={(e) => { e.stopPropagation(); onChange(!value); }}
    aria-pressed={value}
  />
);

const ToggleRow = ({ value, onChange, label }) => (
  <div className="tog-row" onClick={(e) => e.stopPropagation()}>
    <Toggle value={value} onChange={onChange} />
    <span className="tog-lbl">{label}</span>
  </div>
);

const Stars = ({ score, size = 14 }) => {
  if (!score) return <span style={{ fontSize: 11, color: 'var(--text-3)' }}>No rating</span>;
  return (
    <span className="stars">
      {[1, 2, 3, 4, 5].map(i => (
        <I.Star key={i} size={size} stroke={1.4}
                fill={i <= score ? 'currentColor' : 'none'}
                className={i <= score ? '' : 'off'} />
      ))}
    </span>
  );
};

const Avatar = ({ name }) => <div className="avatar">{initials(name)}</div>;

const TopUpload = ({ onSelect, file, phone, setPhone, email, setEmail, companyId, setCompanyId, onUpload, uploading, status }) => {
  const fileRef = React.useRef();
  return (
    <div className="panel">
      <div className="panel-h">
        <div className="panel-h-l">
          <div className="panel-title">Upload New Quote</div>
          <span className="panel-tag">PDF · auto-parsed</span>
        </div>
      </div>
      <div className="panel-body">
        <div className="upload-grid">
          <div className="field">
            <label className="field-label">PDF Quote File</label>
            <div className={`file-drop ${file ? 'has-file' : ''}`}>
              <I.File />
              <span className="fname">{file ? file.name : 'Click to select PDF…'}</span>
              <input ref={fileRef} type="file" accept=".pdf"
                     onChange={e => onSelect(e.target.files[0] || null)} />
            </div>
          </div>
          <div className="field">
            <label className="field-label">Phone Number</label>
            <input className="input" value={phone} onChange={e => setPhone(e.target.value)}
                   placeholder="10-digit mobile" />
          </div>
          <div className="field">
            <label className="field-label">Link to Company <span style={{ fontSize:11, color:'var(--text-3)', fontWeight:400 }}>(optional override)</span></label>
            <select className="input" value={companyId} onChange={e => setCompanyId(e.target.value)}>
              <option value="">— Auto-match by phone —</option>
              {(window._companies || []).map(c => (
                <option key={c.id} value={c.id}>{c.company_name}{c.city ? ` · ${c.city}` : ''}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label className="field-label">Email Address (optional)</label>
            <input className="input" value={email} onChange={e => setEmail(e.target.value)}
                   placeholder="client@company.com" />
          </div>
          <div className="field">
            <button className="btn btn-primary" onClick={onUpload}
                    disabled={uploading || !file}>
              {uploading ? <><I.Loader className="spin" /> Uploading…</> : <><I.Upload /> Add Quote</>}
            </button>
          </div>
        </div>
        {status && (
          <div className={`upload-status ${status.type}`}>
            {status.type === 'success' && <I.CheckCircle />}
            {status.type === 'error' && <I.AlertCircle />}
            {status.type === 'loading' && <I.Loader className="spin" />}
            <span>{status.msg}</span>
          </div>
        )}
      </div>
    </div>
  );
};

Object.assign(window, {
  SUPABASE_URL, SUPABASE_KEY, N8N_WEBHOOK, N8N_MANUAL_NUDGE, N8N_DISPATCH,
  sbFetch, fetchQuotations, updateQuotation, deleteQuotation,
  fmtINR, fmtINRFull, fmtDate, fmtDateTime, fmtRelative, daysDiff,
  nudgeLabel, initials,
  Badge, Toggle, ToggleRow, Stars, Avatar, TopUpload,
});

</script>
