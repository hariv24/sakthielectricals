        <Metric label="Credit Pending" value={creditPending.length}
                sub={creditPending.length ? 'Gov / EB / credit customers' : 'All payments received'}
                accent={creditPending.length ? 'red' : 'slate'} icon={<I.AlertTriangle />} />
      </div>

      {creditPending.length > 0 && (
        <div className="panel" style={{ marginBottom: 18 }}>
          <div className="panel-h">
            <div className="panel-h-l">
              <div className="panel-title">Credit / Gov / EB — Payment Pending</div>
              <span className="panel-tag">{creditPending.length} order{creditPending.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="amt tnum" style={{ fontSize: 13, color: 'var(--st-danger-fg)' }}>
              Outstanding: {fmtINR(creditPending.reduce((s, q) => s + (parseFloat(q.amount_grand_total) || 0), 0))}
            </div>
          </div>
          <div style={{ padding: '6px 18px 14px' }}>
            {creditPending.map(q => (
              <div key={q.id} className="po-card" onClick={() => setSelectedId(q.id)} style={{ cursor: 'pointer', borderColor: 'var(--st-danger-bd)' }}>
                <div>
                  <div className="ctitle">{q.client_name}</div>
                  <div className="cqno">{q.internal_id || q.quote_number}</div>
                  <div className="cprod">{q.product_name}</div>
                  <div className="cmeta">
                    Status: {q.workflow_status}
                    {q.dispatched_date && ` · Dispatched ${fmtDate(q.dispatched_date)}`}
                    {q.transport_name && ` · ${q.transport_name}`}
                  </div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="camt" style={{ color: 'var(--st-danger-fg)' }}>{fmtINR(q.amount_grand_total)}</div>
                  <div className="awaiting" style={{ color: 'var(--st-danger-fg)' }}>PAYMENT PENDING</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="panel">
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">All Converted Orders</div>
            <span className="panel-tag">{poQuotes.length} total</span>
          </div>
        </div>
        {poQuotes.length === 0 ? (
          <div className="empty">
            <I.Package />
            <div className="et">No POs yet</div>
            <div className="es">Mark quotes as PO Received on the Quotations page.</div>
          </div>
        ) : (
          <div style={{ padding: '14px 18px' }}>
            {[...poQuotes].sort((a, b) => new Date(b.payment_received_date || b.updated_at) - new Date(a.payment_received_date || a.updated_at)).map(q => (
              <div key={q.id} className="po-card" onClick={() => setSelectedId(q.id)} style={{ cursor: 'pointer' }}>
                <div>
                  <div className="ctitle">{q.client_name}</div>
                  <div className="cqno">{q.internal_id || q.quote_number}</div>
                  <div className="cprod">{q.product_name}</div>
                  <div className="cmeta">
                    {q.payment_received_date ? `Payment: ${fmtDate(q.payment_received_date)}` : 'Payment pending'}
                    {q.dispatched_date && ` · Dispatched: ${fmtDate(q.dispatched_date)}`}
                    {q.delivery_confirmed_date && ` · Delivered: ${fmtDate(q.delivery_confirmed_date)}`}
                    {q.contact_person && ` · ${q.contact_person}`}
                  </div>
                  {q.feedback_score && (
                    <div style={{ display: 'flex', alignItems: 'center' }}>
                      <Stars score={q.feedback_score} />
                      {q.feedback_note && <span className="stars-note">{q.feedback_note}</span>}
                    </div>
                  )}
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="camt">{fmtINR(q.amount_grand_total)}</div>
                  <div style={{ marginTop: 6 }}><Badge status={q.workflow_status} /></div>
                  {!q.feedback_score && q.workflow_status === 'Delivered' && (
                    <div className="awaiting">Awaiting feedback</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* ── Performance / Accountability section ─────────────── */}
      <div className="panel" style={{ marginTop: 18 }}>
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">Response Performance</div>
            <span className="panel-tag">Enquiry → Quotation speed</span>
          </div>
        </div>
        <div className="panel-body">
          {(() => {
            /* Enquiries that have a response time recorded */
            const responded = enquiries.filter(e => e.response_time_hours != null);
            const avgR = responded.length
              ? (responded.reduce((s,e) => s + Number(e.response_time_hours), 0) / responded.length)
              : null;
            const under1h  = responded.filter(e => Number(e.response_time_hours) < 1).length;
            const under4h  = responded.filter(e => Number(e.response_time_hours) >= 1 && Number(e.response_time_hours) < 4).length;
            const under24h = responded.filter(e => Number(e.response_time_hours) >= 4 && Number(e.response_time_hours) < 24).length;
            const over24h  = responded.filter(e => Number(e.response_time_hours) >= 24).length;
            const total    = responded.length || 1;
            /* Slowest 5 */
            const slowest  = [...enquiries]
              .filter(e => e.response_time_hours != null)
              .sort((a,b) => Number(b.response_time_hours) - Number(a.response_time_hours))
              .slice(0, 5);
            /* Pending stale */
            const nowMs = Date.now();
            const stale = enquiries.filter(e =>
              e.status === 'Pending' &&
              (nowMs - new Date(e.created_at).getTime()) / 3600000 > 24
            );
            return (
              <div>
                {/* Top KPIs */}
                <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:22 }}>
                  {[
                    { label:'Avg Response Time', value: avgR ? `${avgR.toFixed(1)}h` : '—',
                      sub: avgR && avgR < 2 ? '✅ Excellent' : avgR && avgR < 8 ? '⚠️ Can improve' : avgR ? '❌ Too slow' : 'No data yet',
                      accent: avgR ? (avgR < 2 ? 'green' : avgR < 8 ? 'amber' : 'red') : 'slate' },
                    { label:'Responded < 1 hour', value: under1h,
                      sub: `${Math.round(under1h/total*100)}% of total`,
                      accent: under1h > 0 ? 'green' : 'slate' },
                    { label:'Responded < 4 hours', value: under4h,
                      sub: `${Math.round(under4h/total*100)}% of total`,
                      accent: 'blue' },
                    { label:'Still Pending >24h', value: stale.length,
                      sub: stale.length ? 'Needs immediate action' : 'All on time',
                      accent: stale.length ? 'red' : 'slate' },
                  ].map((m,i) => (
                    <div key={i} className={`metric accent-${m.accent}`}>
                      <span className="accent-bar" />
                      <div className="l">{m.label}</div>
                      <div className="v">{m.value}</div>
                      <div className="s">{m.sub}</div>
                    </div>
                  ))}
                </div>

                {/* Response time distribution bar */}
                <div style={{ marginBottom:20 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:'var(--text-2)', marginBottom:10 }}>
                    Response Time Distribution ({responded.length} quotes)
                  </div>
                  {[
                    { label:'Under 1 hour ⚡', count:under1h, color:'oklch(0.55 0.15 150)' },
                    { label:'1–4 hours ✅', count:under4h, color:'var(--accent)' },
                    { label:'4–24 hours ⚠️', count:under24h, color:'oklch(0.65 0.14 70)' },
                    { label:'Over 24 hours ❌', count:over24h, color:'oklch(0.55 0.18 25)' },
                  ].map((bar,i) => (
                    <div key={i} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:8 }}>
                      <span style={{ width:120, fontSize:12, color:'var(--text-2)', flexShrink:0 }}>{bar.label}</span>
                      <div style={{ flex:1, height:20, background:'var(--surface-2)', borderRadius:4, overflow:'hidden' }}>
                        <div style={{
                          width: `${Math.round(bar.count / total * 100)}%`,
                          height:'100%', background:bar.color, borderRadius:4,
                          display:'flex', alignItems:'center', paddingLeft:8,
                          transition:'width 600ms ease',
                          minWidth: bar.count > 0 ? 32 : 0,
                        }}>
                          {bar.count > 0 && <span style={{ fontSize:11, fontWeight:700, color:'#fff' }}>{bar.count}</span>}
                        </div>
                      </div>
                      <span style={{ width:30, fontSize:12, color:'var(--text-3)', textAlign:'right' }}>
                        {Math.round(bar.count/total*100)}%
                      </span>
                    </div>
                  ))}
                </div>

                {/* Slowest responses — the accountability table */}
                {slowest.length > 0 && (
                  <div>
                    <div style={{ fontSize:12, fontWeight:600, color:'var(--text-2)', marginBottom:10 }}>
                      Slowest Responses — Longest Time from Enquiry to Quotation
                    </div>
                    <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
                      <thead>
                        <tr style={{ borderBottom:'2px solid var(--border)' }}>
                          {['Client','Source','Enquiry Time','Response Time','Internal ID'].map((h,i)=>(
                            <th key={i} style={{ padding:'8px 12px', textAlign:'left', fontSize:11,
                              fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em',
                              color:'var(--text-3)', background:'var(--surface-2)' }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {slowest.map(e => {
                          const hrs = Number(e.response_time_hours);
                          const color = hrs < 1 ? 'oklch(0.50 0.15 150)' : hrs < 4 ? 'var(--accent)' : hrs < 24 ? 'oklch(0.55 0.14 70)' : 'oklch(0.55 0.18 25)';
                          return (
                            <tr key={e.id} style={{ borderBottom:'1px solid var(--border)' }}>
                              <td style={{ padding:'10px 12px', fontWeight:600 }}>{e.client_name}</td>
                              <td style={{ padding:'10px 12px', color:'var(--text-2)' }}>{e.enquiry_source}</td>
                              <td style={{ padding:'10px 12px', color:'var(--text-3)', fontSize:12, fontFamily:'var(--mono)' }}>
                                {fmtDateTime(e.created_at)}
                              </td>
                              <td style={{ padding:'10px 12px' }}>
                                <span style={{ fontWeight:700, color, fontSize:14 }}>
                                  {hrs < 1 ? `${Math.round(hrs*60)}m` : `${hrs.toFixed(1)}h`}
                                </span>
                              </td>
                              <td style={{ padding:'10px 12px', fontFamily:'var(--mono)', fontSize:12, color:'var(--text-3)' }}>
                                {e.internal_id || '—'}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <div style={{ fontSize:12, color:'var(--text-3)', marginTop:10, fontStyle:'italic', padding:'0 2px' }}>
                      Manikandan's target: Every enquiry gets a quotation within 4 hours. Under 1 hour = excellent. 
                      This table shows where time was lost.
                    </div>
                  </div>
                )}

                {responded.length === 0 && (
                  <div style={{ textAlign:'center', padding:'32px 0', color:'var(--text-3)', fontSize:13 }}>
                    Response time data will appear here once enquiries are linked to quotations.
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      </div>

      <div className="footer">
        <span>Think Galactic × Sakthi Electricals · {currentYear}</span>
      </div>
    </>
  );
};

Object.assign(window, { TrackerPage, SummaryPage, ExpiryPage, ConvertedPage, Metric, AreaChart });

</script>

<script type="text/babel" data-name="newpages">

/* ══════════════════════════════════════════════════════════════════
   COMMAND CENTER PAGE
   ══════════════════════════════════════════════════════════════════ */
const CommandPage = (props) => {
  const { quotes, openQuotes, pipelineVal, dueToday, dispatchedOrders,
          overdueDispatch, creditPending, expiringSoon, poQuotes,
          yearTotal, conversionRate, setPage, setFilter, setSelectedId,
          staleEnquiries = 0, invoices = [], remarks = [], enquiries = [] } = props;

  const deliveredCount = quotes.filter(q => q.workflow_status === 'Delivered').length;
  const totalQuotes = quotes.length;

  const funnelStages = [
    { label: 'Open Quotes',   count: quotes.filter(q => ['Open','Following Up'].includes(q.workflow_status)).length,
      value: pipelineVal, color: 'oklch(0.55 0.17 252)', key: 'tracker' },
    { label: 'PO Received',   count: quotes.filter(q => q.workflow_status === 'PO Received').length,
      value: quotes.filter(q=>q.workflow_status==='PO Received').reduce((s,q)=>s+(parseFloat(q.amount_grand_total)||0),0),
      color: 'oklch(0.55 0.15 150)', key: 'orders' },
    { label: 'Dispatched',    count: dispatchedOrders.length,
      value: dispatchedOrders.reduce((s,q)=>s+(parseFloat(q.amount_grand_total)||0),0),
      color: 'oklch(0.50 0.15 200)', key: 'orders' },
    { label: 'Delivered',     count: deliveredCount,
      value: quotes.filter(q=>q.workflow_status==='Delivered').reduce((s,q)=>s+(parseFloat(q.amount_grand_total)||0),0),
      color: 'oklch(0.50 0.15 145)', key: 'orders' },
  ];
  const maxCount = Math.max(...funnelStages.map(s => s.count), 1);

  // Build action items
  const actions = [];
  if (overdueDispatch.length > 0) {
    overdueDispatch.forEach(q => actions.push({
      dot: 'red', title: `${q.internal_id || q.quote_number} — Dispatch Overdue`,
      sub: `${q.client_name} · Expected ${fmtDate(q.expected_dispatch_date)}`,
      page: 'orders', id: q.id
    }));
  }
  if (dueToday > 0) {
    const due = quotes.filter(q => q.next_nudge_date === new Date().toISOString().split('T')[0]
      && ['Open','Following Up'].includes(q.workflow_status));
    due.forEach(q => actions.push({
      dot: 'amber', title: `Follow-up due — ${q.client_name}`,
      sub: `${fmtINR(q.amount_grand_total)} · ${q.product_name?.substring(0,50)}`,
      page: 'tracker', id: q.id
    }));
  }
  if (expiringSoon.length > 0) {
    expiringSoon.slice(0,3).forEach(q => {
      const d = daysDiff(q.expires_on);
      actions.push({
        dot: d <= 1 ? 'red' : 'amber',
        title: `Quote expiring ${d === 0 ? 'today' : `in ${d} day${d !== 1 ? 's' : ''}`} — ${q.client_name}`,
        sub: `${fmtINR(q.amount_grand_total)} · Expiry: ${fmtDate(q.expires_on)}`,
        page: 'expiry', id: q.id
      });
    });
  }
  if (creditPending.length > 0) {
    creditPending.forEach(q => actions.push({
      dot: 'amber', title: `Payment pending — ${q.client_name}`,
      sub: `${fmtINR(q.amount_grand_total)} · Status: ${q.workflow_status}`,
      page: 'payments', id: q.id
    }));
  }
  if (staleEnquiries > 0) {
    actions.push({
      dot: 'red',
      title: `${staleEnquiries} enquir${staleEnquiries === 1 ? 'y' : 'ies'} pending over 24 hours`,
      sub: 'Customers waiting for quotation — respond today',
      page: 'enquiries',
      id: null,
    });
  }
  if (actions.length === 0) {
    actions.push({ dot: 'green', title: 'All clear — no urgent actions', sub: 'Everything is on track today.', page: null });
  }

  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  // Role-aware greeting — Manikandan sees his name, manager sees generic
  const userName = typeof window !== 'undefined' && window.SAKTHI_USER ? window.SAKTHI_USER : null;
  const greetingName = userName || 'Sakthi Electricals';

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">{greeting}{userName ? `, ${userName}` : ''} 👋</div>
          <div className="page-sub">{new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} · Here's what needs your attention today.</div>
        </div>
      </div>

      {(() => {
        const outstandingInv = invoices.filter(i => !['Paid','Cancelled'].includes(i.status));
        const outstandingAmt = outstandingInv.reduce((s,i)=>s+parseFloat(i.amount_total||0),0);
        const thisMonthRemarks = remarks.filter(r => r.month_year === new Date().toISOString().slice(0,7));
        const inProd = quotes.filter(q => q.workflow_status === 'In Production').length;
        return (
          <div className="metrics" style={{ gridTemplateColumns: 'repeat(6,1fr)' }}>
            <Metric label="Open Pipeline" value={fmtINR(pipelineVal)} sm sub={`${openQuotes.length} active quotes`} accent="blue" icon={<I.TrendUp />} />
            <Metric label="Due Today" value={dueToday} sub={dueToday ? 'Follow-ups waiting' : 'All caught up'} accent={dueToday ? 'red' : 'slate'} icon={<I.Bell />} />
            <Metric label="In Production" value={inProd} sub={inProd ? 'Orders being built' : 'None in production'} accent={inProd ? 'amber' : 'slate'} icon={<I.Package />} />
            <Metric label="In Transit" value={dispatchedOrders.length} sub="Awaiting delivery photo" accent={dispatchedOrders.length ? 'amber' : 'slate'} icon={<I.Truck />} />
            <Metric label="Invoices Due" value={outstandingInv.length} sub={outstandingInv.length ? fmtINR(outstandingAmt) : 'All paid'} accent={outstandingInv.length ? 'red' : 'slate'} icon={<I.ClipList />} />
            <Metric label="Year Revenue" value={fmtINR(yearTotal)} sm sub={`${conversionRate}% conversion`} accent="green" icon={<I.Award />} />
          </div>
        );
      })()}


      {/* Today's Work — consolidated action list */}
      {(() => {
        const todayItems = [];
        const staleEnqs = enquiries.filter(e => e.status === 'Pending');
        staleEnqs.forEach(e => {
          const hrs = Math.floor((Date.now() - new Date(e.created_at).getTime()) / 3600000);
          todayItems.push({
            dot: hrs >= 4 ? 'red' : 'amber', priority: 1,
            title: `${e.client_name} — Enquiry pending quote`,
            sub: `${hrs}h ago · ${e.enquiry_source||'WhatsApp'} · Assigned: ${e.assigned_to||'Vijay'}`,
            page: 'enquiries',
          });
        });
        invoices.filter(i=>!['Paid','Cancelled'].includes(i.status)&&i.due_date&&new Date(i.due_date)<new Date()).forEach(i=>{
          const days=Math.floor((new Date()-new Date(i.due_date))/86400000);
          todayItems.push({ dot:'red', priority:2, title:`Invoice overdue — ${(i.companies||{}).company_name||i.invoice_number}`, sub:`${fmtINR(i.amount_total)} · ${days}d overdue`, page:'invoices' });
        });
        quotes.filter(q=>q.workflow_status==='PO Received'&&!q.po_confirmation_sent).forEach(q=>todayItems.push({
          dot:'amber', priority:3, title:`Send T&C confirmation — ${q.client_name}`, sub:`${fmtINR(q.amount_grand_total)} · PO received`, page:'poconfirm',
        }));
        // T&C sent but not yet accepted by client
        quotes.filter(q=>q.workflow_status==='PO Received'&&q.po_confirmation_sent&&!q.po_confirmation_date).forEach(q=>{
          const sentDays = q.updated_at ? Math.floor((new Date() - new Date(q.updated_at)) / 86400000) : 0;
          todayItems.push({
            dot: sentDays >= 3 ? 'red' : 'amber', priority: sentDays >= 3 ? 2 : 4,
            title:`T&C awaiting acceptance — ${q.client_name}`,
            sub:`${fmtINR(q.amount_grand_total)} · Sent ${sentDays}d ago · No reply yet`,
            page:'poconfirm',
          });
        });
        const today2 = new Date().toISOString().split('T')[0];
        quotes.filter(q=>q.workflow_status==='Following Up'&&q.next_nudge_date===today2).forEach(q=>todayItems.push({
          dot:'amber', priority:4, title:`Follow-up due — ${q.client_name}`, sub:`${fmtINR(q.amount_grand_total)} · ${(q.product_name||'').substring(0,50)}`, page:'tracker',
        }));
        overdueDispatch.forEach(q=>todayItems.push({
          dot:'red', priority:1, title:`Dispatch overdue — ${q.client_name}`, sub:`${q.internal_id||q.quote_number} · Expected ${fmtDate(q.expected_dispatch_date)}`, page:'orders',
        }));
        expiringSoon.slice(0,2).forEach(q=>{
          const d=daysDiff(q.expires_on);
          todayItems.push({ dot:d<=1?'red':'amber', priority:3, title:`Quote expiring ${d===0?'today':`in ${d}d`} — ${q.client_name}`, sub:`${fmtINR(q.amount_grand_total)}`, page:'expiry' });
        });
        if (todayItems.length === 0) return null;
        todayItems.sort((a,b)=>a.priority-b.priority);
        return (
          <div className="panel" style={{ marginBottom:18, borderColor:'var(--accent-border)', background:'color-mix(in oklab, var(--accent-soft) 60%, var(--surface))' }}>
            <div className="panel-h" style={{ background:'transparent' }}>
              <div className="panel-h-l">
                <I.Zap size={16} style={{ color:'var(--accent)' }} />
                <div className="panel-title" style={{ color:'var(--accent)' }}>Today's Work</div>
                <span className="panel-tag" style={{ background:'var(--accent-soft-2)', color:'var(--accent)', borderColor:'var(--accent-border)', fontWeight:700 }}>
                  {todayItems.length} item{todayItems.length!==1?'s':''}
                </span>
              </div>
            </div>
            <div style={{ padding:'4px 18px 10px' }}>
              {todayItems.slice(0,8).map((a,i)=>(
                <div key={i} className="action-row" style={{ cursor:'pointer' }}
                     onClick={()=>{ if(a.page) props.setPage(a.page); }}>
                  <div className={`action-dot ${a.dot}`} />
                  <div className="action-content">
                    <div className="action-title">{a.title}</div>
                    <div className="action-sub">{a.sub}</div>
                  </div>
                  <I.ArrowDown size={14} style={{ color:'var(--text-3)',transform:'rotate(-90deg)',flexShrink:0 }} />
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <div className="cmd-grid">
        <div className="panel">
          <div className="panel-h">
            <div className="panel-title">Order Pipeline</div>
            <span className="panel-tag">{quotes.length} quotes</span>
          </div>
          <div className="funnel-wrap">
            {funnelStages.map((s, i) => (
              <div key={i} className="funnel-stage">
                <div className="funnel-label">{s.label}</div>
                <div className="funnel-bar-wrap">
                  <div className="funnel-bar" style={{
                    width: `${Math.max(s.count / maxCount * 100, s.count > 0 ? 10 : 0)}%`,
                    background: s.color,
                    cursor: s.count > 0 ? 'pointer' : 'default',
                    minWidth: s.count > 0 ? '44px' : '0',
                    fontSize: 13, fontWeight: 700,
                  }} onClick={() => { if (s.count > 0 && props.setPage) props.setPage(s.key); }}>
                    {s.count > 0 && s.count}
                  </div>
                </div>
                <div className="funnel-val" style={{ color: s.count > 0 ? 'var(--text)' : 'var(--text-4)' }}>
                  {s.count > 0 ? fmtINR(s.value) : '—'}
                </div>
              </div>
            ))}
            <div style={{ marginTop: 14, padding: '12px 0 0', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 12, color: 'var(--text-3)' }}>Lifetime delivered</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: 'oklch(0.50 0.15 145)' }}>
                {fmtINR(quotes.filter(q=>q.workflow_status==='Delivered').reduce((s,q)=>s+(parseFloat(q.amount_grand_total)||0),0))}
              </span>
            </div>
          </div>
        </div>

        {/* Action Required */}
        <div className="panel">
          <div className="panel-h">
            <div className="panel-h-l">
              <div className="panel-title">Action Required</div>
            </div>
            {actions.filter(a => a.dot !== 'green').length === 0 ? (
              <span className="panel-tag" style={{ background: 'var(--st-delivered-bg)', color: 'var(--st-delivered-fg)', borderColor: 'var(--st-delivered-bd)' }}>All clear</span>
            ) : (
              <span className="panel-tag" style={{ background: 'var(--st-danger-bg)', color: 'var(--st-danger-fg)', borderColor: 'var(--st-danger-bd)', fontWeight: 700 }}>
                {actions.filter(a => a.dot !== 'green').length} item{actions.filter(a => a.dot !== 'green').length !== 1 ? 's' : ''}
              </span>
            )}
          </div>
          <div style={{ padding: '4px 18px 8px' }}>
            {actions.length === 0 ? (
              <div className="empty" style={{ padding: 24 }}>
                <I.CheckCircle style={{ color: 'var(--st-delivered-fg)' }} />
                <div className="et" style={{ color: 'var(--st-delivered-fg)' }}>All systems go</div>
                <div className="es">No actions needed right now.</div>
              </div>
            ) : actions.slice(0, 8).map((a, i) => (
              <div key={i} className="action-row"
                   style={{ cursor: a.page ? 'pointer' : 'default' }}
                   onClick={() => { if (a.page) { props.setPage(a.page); if (a.id) props.setSelectedId(a.id); } }}>
                <div className={`action-dot ${a.dot}`} />
                <div className="action-content">
                  <div className="action-title">{a.title}</div>
                  <div className="action-sub">{a.sub}</div>
                </div>
                {a.page && <I.ArrowDown size={14} style={{ color: 'var(--text-3)', transform: 'rotate(-90deg)', flexShrink: 0 }} />}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Quick stats row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18 }}>
        <div className="panel">
          <div className="panel-h"><div className="panel-title">Expiring Soon</div><span className="panel-tag">{expiringSoon.length}</span></div>
          {expiringSoon.length === 0 ? (
            <div className="empty" style={{ padding: 24 }}><I.CheckCircle /><div className="et">All clear</div></div>
          ) : (
            <div style={{ padding: '4px 18px 8px' }}>
              {expiringSoon.slice(0,4).map(q => {
                const d = daysDiff(q.expires_on);
                return (
                  <div key={q.id} className="action-row" style={{ cursor: 'pointer' }}
                       onClick={() => { props.setPage('tracker'); props.setSelectedId(q.id); }}>
                    <div className={`action-dot ${d <= 1 ? 'red' : 'amber'}`} />
                    <div className="action-content">
                      <div className="action-title">{q.client_name}</div>
                      <div className="action-sub">{fmtINR(q.amount_grand_total)} · {d === 0 ? 'Today' : `${d}d left`}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div className="panel">
          <div className="panel-h"><div className="panel-title">In Transit</div><span className="panel-tag">{dispatchedOrders.length}</span></div>
          {dispatchedOrders.length === 0 ? (
            <div className="empty" style={{ padding: 24 }}><I.Truck /><div className="et">No orders in transit</div></div>
          ) : (
            <div style={{ padding: '4px 18px 8px' }}>
              {dispatchedOrders.slice(0,4).map(q => (
                <div key={q.id} className="action-row" style={{ cursor: 'pointer' }}
                     onClick={() => { props.setPage('orders'); props.setSelectedId(q.id); }}>
                  <div className="action-dot blue" />
                  <div className="action-content">
                    <div className="action-title">{q.client_name}</div>
                    <div className="action-sub">{q.transport_name || q.transport_type || 'Transport'} · {fmtDate(q.dispatched_date)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="panel">
          <div className="panel-h"><div className="panel-title">Recent Deliveries</div><span className="panel-tag">Last 30 days</span></div>
          {(() => {
            const recent = quotes.filter(q => q.workflow_status === 'Delivered' && q.delivery_confirmed_date &&
              (new Date() - new Date(q.delivery_confirmed_date)) / 86400000 <= 30);
            return recent.length === 0 ? (
              <div className="empty" style={{ padding: 24 }}><I.Package /><div className="et">No recent deliveries</div></div>
            ) : (
              <div style={{ padding: '4px 18px 8px' }}>
                {recent.slice(0,4).map(q => (
                  <div key={q.id} className="action-row" style={{ cursor: 'pointer' }}
                       onClick={() => { props.setPage('orders'); props.setSelectedId(q.id); }}>
                    <div className="action-dot green" />
                    <div className="action-content">
                      <div className="action-title">{q.client_name}</div>
                      <div className="action-sub">{fmtINR(q.amount_grand_total)} · {fmtDate(q.delivery_confirmed_date)}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      </div>

      {/* Bottom row — Top Clients + This Month */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, marginTop: 18 }}>
        {/* Top clients by revenue */}
        <div className="panel">
          <div className="panel-h">
            <div className="panel-h-l">
              <div className="panel-title">Top Clients</div>
              <span className="panel-tag">by revenue</span>
            </div>
          </div>
          {(() => {
            const clientMap = {};
            quotes.filter(q => ['PO Received','Dispatched','Delivered'].includes(q.workflow_status))
              .forEach(q => {
                const name = q.client_name || 'Unknown';
                if (!clientMap[name]) clientMap[name] = { revenue: 0, orders: 0 };
                clientMap[name].revenue += parseFloat(q.amount_grand_total) || 0;
                clientMap[name].orders += 1;
              });
            const ranked = Object.entries(clientMap).sort((a,b) => b[1].revenue - a[1].revenue).slice(0, 5);
            if (ranked.length === 0) return (
              <div className="empty" style={{ padding: 24 }}><I.Building /><div className="et">No POs yet</div></div>
            );
            const maxRev = ranked[0][1].revenue;
            return (
              <div style={{ padding: '10px 18px 14px' }}>
                {ranked.map(([name, data], i) => (
                  <div key={name} style={{ display: 'grid', gridTemplateColumns: '18px 1fr auto', gap: 10, alignItems: 'center', marginBottom: 12 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: i === 0 ? 'oklch(0.65 0.14 70)' : 'var(--text-4)', fontVariantNumeric: 'tabular-nums' }}>
                      {String(i+1).padStart(2,'0')}
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 160 }}>{name}</div>
                      <div style={{ height: 3, background: 'var(--surface-2)', borderRadius: 2, marginTop: 4, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: `${data.revenue/maxRev*100}%`, background: i === 0 ? 'oklch(0.62 0.16 252)' : 'var(--border-strong)', borderRadius: 2, transition: 'width 0.6s ease' }} />
                      </div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 13, fontWeight: 600, fontVariantNumeric: 'tabular-nums', color: 'var(--text)' }}>{fmtINR(data.revenue)}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{data.orders} order{data.orders !== 1 ? 's' : ''}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>

        {/* This Month */}
        <div className="panel">
          <div className="panel-h">
            <div className="panel-title">This Month</div>
            <span className="panel-tag">{new Date().toLocaleString('en-IN', { month: 'long', year: 'numeric' })}</span>
          </div>
          {(() => {
            const now = new Date();
            const thisMonthQ = quotes.filter(q => { const d = new Date(q.created_at); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
            const thisMonthPO = quotes.filter(q => { if (!['PO Received','Dispatched','Delivered'].includes(q.workflow_status)) return false; const d = new Date(q.payment_received_date || q.updated_at); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
            const thisMonthRev = thisMonthPO.reduce((s, q) => s + (parseFloat(q.amount_grand_total)||0), 0);
            const thisMonthExpired = quotes.filter(q => { if (q.workflow_status !== 'Expired') return false; const d = new Date(q.updated_at); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
            const lostRev = thisMonthExpired.reduce((s, q) => s + (parseFloat(q.amount_grand_total)||0), 0);
            return (
              <div className="stat-list" style={{ padding: '4px 18px' }}>
                <div className="row"><span className="l">Quotes uploaded</span><span className="v">{thisMonthQ.length}</span></div>
                <div className="row"><span className="l">POs received</span><span className="v" style={{ color: 'oklch(0.50 0.14 150)' }}>{thisMonthPO.length}</span></div>
                <div className="row"><span className="l">Revenue confirmed</span><span className="v" style={{ color: 'oklch(0.50 0.14 150)', fontVariantNumeric: 'tabular-nums' }}>{fmtINR(thisMonthRev)}</span></div>
                <div className="row"><span className="l">Quotes expired</span><span className="v" style={{ color: thisMonthExpired.length > 0 ? 'var(--st-danger-fg)' : undefined }}>{thisMonthExpired.length}</span></div>
                <div className="row"><span className="l">Revenue lost</span><span className="v" style={{ color: lostRev > 0 ? 'var(--st-danger-fg)' : undefined, fontVariantNumeric: 'tabular-nums' }}>{lostRev > 0 ? fmtINR(lostRev) : '—'}</span></div>
              </div>
            );
          })()}
        </div>
      </div>

      {/* Staff Remarks Summary */}
      {(() => {
        const tm = new Date().toISOString().slice(0,7);
        const mr = remarks.filter(r => r.month_year === tm);
        const byStaff = {};
        mr.forEach(r => { byStaff[r.staff_name] = (byStaff[r.staff_name]||0)+1; });
        if (Object.keys(byStaff).length === 0) return null;
        return (
          <div className="panel" style={{ marginTop:18 }}>
            <div className="panel-h">
              <div className="panel-h-l">
                <div className="panel-title">Staff Remarks This Month</div>
                <span className="panel-tag">{mr.length} total</span>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPage('staff')}>View Staff →</button>
            </div>
            <div style={{ padding:'8px 18px 14px',display:'flex',gap:10,flexWrap:'wrap' }}>
              {Object.entries(byStaff).map(([name,count])=>(
                <div key={name} style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 14px',
                  background:count>=3?'var(--st-danger-bg)':count>=2?'var(--st-follow-bg)':'var(--surface-2)',
                  border:`1px solid ${count>=3?'var(--st-danger-bd)':count>=2?'var(--st-follow-bd)':'var(--border)'}`,
                  borderRadius:'var(--radius-sm)',cursor:'pointer' }} onClick={()=>setPage('staff')}>
                  <div style={{ width:28,height:28,borderRadius:'50%',background:'var(--accent-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--accent)' }}>{name.charAt(0)}</div>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600 }}>{name}</div>
                    <div style={{ fontSize:11,fontWeight:600,color:count>=3?'var(--st-danger-fg)':count>=2?'var(--st-follow-fg)':'var(--text-3)' }}>
                      {count} remark{count!==1?'s':''}{count>=3?' — salary deduction':count>=2?' — incentive at risk':''}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Outstanding Invoices */}
      {invoices.filter(i=>!['Paid','Cancelled'].includes(i.status)).length > 0 && (
        <div className="panel" style={{ marginTop:18 }}>
          <div className="panel-h">
            <div className="panel-h-l">
              <div className="panel-title">Outstanding Invoices</div>
              <span className="panel-tag" style={{ background:'var(--st-danger-bg)',color:'var(--st-danger-fg)',borderColor:'var(--st-danger-bd)' }}>
                {fmtINR(invoices.filter(i=>!['Paid','Cancelled'].includes(i.status)).reduce((s,i)=>s+parseFloat(i.amount_total||0),0))} due
              </span>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPage('invoices')}>View Invoices →</button>
          </div>
          <div style={{ padding:'4px 18px 12px' }}>
            {invoices.filter(i=>!['Paid','Cancelled'].includes(i.status)).sort((a,b)=>{
              const ao = a.due_date && new Date(a.due_date)<new Date();
              const bo = b.due_date && new Date(b.due_date)<new Date();
              return (bo?1:0)-(ao?1:0);
            }).slice(0,5).map(inv=>{
              const co=inv.companies||{};
              const overdue=inv.due_date&&new Date(inv.due_date)<new Date();
              const daysOverdue=overdue?Math.floor((new Date()-new Date(inv.due_date))/86400000):null;
              const dueDate=inv.due_date?new Date(inv.due_date):null;
              const daysUntil=dueDate&&!overdue?Math.floor((dueDate-new Date())/86400000):null;
              return (
                <div key={inv.id} className="action-row" style={{ cursor:'pointer' }} onClick={()=>setPage('invoices')}>
                  <div className={`action-dot ${overdue?'red':daysUntil!==null&&daysUntil<=7?'amber':'blue'}`} />
                  <div className="action-content">
                    <div className="action-title">{co.company_name||'—'} — {inv.invoice_number}</div>
                    <div className="action-sub">
                      {fmtINR(inv.amount_total)}
                      {overdue && <span style={{ color:'var(--st-danger-fg)', fontWeight:700 }}> · 🔴 {daysOverdue}d OVERDUE</span>}
                      {daysUntil !== null && daysUntil <= 7 && <span style={{ color:'oklch(0.55 0.14 70)', fontWeight:600 }}> · Due in {daysUntil}d</span>}
                      {!overdue && daysUntil === null && inv.due_date && <span> · Due {fmtDate(inv.due_date)}</span>}
                      {!inv.due_date && <span style={{ color:'var(--text-3)' }}> · No due date</span>}
                    </div>
                  </div>
                  <I.ArrowDown size={14} style={{ color:'var(--text-3)',transform:'rotate(-90deg)',flexShrink:0 }} />
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="footer">
        <span>Auto-refreshes every 10s · Think Galactic × Sakthi Electricals</span>
        <span>{new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })} IST</span>
      </div>
    </>
  );
};

/* ══════════════════════════════════════════════════════════════════
   ORDERS PAGE — PO Received + Dispatched + Delivered pipeline
   ══════════════════════════════════════════════════════════════════ */
const OrdersPage = (props) => {
  const { quotes, setDispatchQuote, setSelectedId, load } = props;
  const [stageFilter, setStageFilter] = React.useState('All');
  const [search, setSearch] = React.useState('');
  const [orderDetail, setOrderDetail] = React.useState(null);
  const [toast, setToast] = React.useState(null);

  const showToast = (msg, err) => { setToast({msg,err}); setTimeout(()=>setToast(null),3000); };

  const markWorkOrder = async (q) => {
    if (q.work_order_created_at) {
      if (!confirm(`Work order was already logged on ${fmtDate(q.work_order_created_at)}. Mark again?`)) return;
    }
    try {
      await sbFetch(`quotations?id=eq.${q.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ work_order_created_at: new Date().toISOString(), workflow_status: 'In Production' }),
      });
      showToast('Work order logged ✓');
      load();
    } catch(e) { showToast('Failed: ' + e.message, true); }
  };

  const markBalancePaid = async (q) => {
    if (!confirm(`Mark balance payment received for ${q.client_name}? This cannot be undone.`)) return;
    try {
      await sbFetch(`quotations?id=eq.${q.id}`, {
        method: 'PATCH',
        body: JSON.stringify({
          balance_payment_received: true,
          balance_payment_date: new Date().toISOString(),
          payment_received: true,
          payment_received_date: new Date().toISOString(),
        }),
      });
      showToast('Balance payment recorded ✓');
      load();
    } catch(e) { showToast('Failed: ' + e.message, true); }
  };

  const orders = quotes.filter(q => ['PO Received','In Production','Dispatched','Delivered'].includes(q.workflow_status));
  const filtered = orders.filter(q => {
    if (stageFilter !== 'All' && q.workflow_status !== stageFilter) return false;
    if (search) {
      const s = search.toLowerCase();
      return (q.client_name||'').toLowerCase().includes(s) ||
             (q.quote_number||'').toLowerCase().includes(s) ||
             (q.internal_id||'').toLowerCase().includes(s);
    }
    return true;
  });

  const poCount = orders.filter(q => q.workflow_status === 'PO Received').length;
  const inProdCount = orders.filter(q => q.workflow_status === 'In Production').length;
  const dispCount = orders.filter(q => q.workflow_status === 'Dispatched').length;
  const delCount = orders.filter(q => q.workflow_status === 'Delivered').length;
  const overdueCount = orders.filter(q => q.workflow_status === 'PO Received' && q.expected_dispatch_date && daysDiff(q.expected_dispatch_date) < 0).length;

  return (
    <>
      {toast && <div style={{ position:'fixed',top:20,right:20,zIndex:9999,background:toast.err?'var(--st-danger-fg)':'oklch(0.50 0.15 150)',color:'#fff',padding:'10px 18px',borderRadius:'var(--radius-sm)',fontSize:13,fontWeight:600,boxShadow:'var(--shadow-lg)' }}>{toast.msg}</div>}
      <div className="page-head">
        <div>
          <div className="page-title">Orders</div>
          <div className="page-sub">Track every confirmed order from production through delivery.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label="PO Received" value={poCount} sub={overdueCount ? `${overdueCount} overdue` : 'Awaiting payment/WO'} accent={overdueCount ? 'red' : 'amber'} icon={<I.Zap />} />
        <Metric label="In Production" value={inProdCount} sub="Paid, being built" accent="blue" icon={<I.Package />} />
        <Metric label="In Transit" value={dispCount} sub="Dispatched, awaiting delivery" accent="violet" icon={<I.Truck />} />
        <Metric label="Delivered" value={delCount} sub="Confirmed by client photo" accent="green" icon={<I.CheckCircle />} />
      </div>

      <div className="panel">
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">All Orders</div>
            <span className="panel-tag">{filtered.length} records</span>
          </div>
          <div className="tbl-controls">
            <div className="search-sm">
              <I.Search />
              <input className="input-sm" placeholder="Search client, order…" value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <select className="input-sm" value={stageFilter} onChange={e => setStageFilter(e.target.value)}>
              <option value="All">All Stages</option>
              <option>PO Received</option>
              <option>In Production</option>
              <option>Dispatched</option>
              <option>Delivered</option>
            </select>
          </div>
        </div>
        {filtered.length === 0 ? (
          <div className="empty"><I.Package /><div className="et">No orders found</div></div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead><tr>
                <th>Client / Order</th>
                <th>Product</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Payment</th>
                <th>Dispatch / Delivery</th>
                <th>Transport</th>
                <th style={{ textAlign: 'right' }}>Actions</th>
              </tr></thead>
              <tbody>
                {[...filtered].sort((a,b) => new Date(b.payment_received_date||b.updated_at) - new Date(a.payment_received_date||a.updated_at)).map(q => {
                  const isOverdue = q.workflow_status === 'PO Received' && q.expected_dispatch_date && daysDiff(q.expected_dispatch_date) < 0;
                  return (
                    <tr key={q.id} style={{ cursor: 'pointer' }} onClick={() => setOrderDetail(q)}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <Avatar name={q.client_name} />
                          <div>
                            <div className="name">{q.client_name}</div>
                            <div className="qno">{q.internal_id || q.quote_number}</div>
                          </div>
                        </div>
                      </td>
                      <td><div className="cell-product">{q.product_name || '—'}</div></td>
                      <td><div className="amt">{fmtINR(q.amount_grand_total)}</div></td>
                      <td><Badge status={q.workflow_status} /></td>
                      <td>
                        <span style={{ fontSize: 12.5, fontWeight: 500,
                          color: q.payment_received ? 'oklch(0.50 0.15 150)' : 'var(--st-danger-fg)' }}>
                          {q.payment_received ? '✓ Paid' : '⚠ Pending'}
                        </span>
                        {q.payment_received_date && (
                          <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{fmtDate(q.payment_received_date)}</div>
                        )}
                      </td>
                      <td>
                        {q.workflow_status === 'PO Received' && (
                          <div>
                            <span style={{ fontSize: 12.5, color: isOverdue ? 'var(--st-danger-fg)' : 'var(--text-2)', fontWeight: isOverdue ? 600 : 400 }}>
                              {fmtDate(q.expected_dispatch_date)}
                            </span>
                            {isOverdue && <div style={{ fontSize: 11, color: 'var(--st-danger-fg)', fontWeight: 600 }}>OVERDUE</div>}
                          </div>
                        )}
                        {q.workflow_status === 'Dispatched' && (
                          <div>
                            <span style={{ fontSize: 12.5, color: 'var(--st-dispatched-fg)', fontWeight: 500 }}>{fmtDate(q.dispatched_date)}</span>
                            <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Dispatched</div>
                          </div>
                        )}
                        {q.workflow_status === 'Delivered' && (
                          <div>
                            <span style={{ fontSize: 12.5, color: 'var(--st-delivered-fg)', fontWeight: 500 }}>{fmtDate(q.delivery_confirmed_date)}</span>
                            <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Delivered ✓</div>
                          </div>
                        )}
                      </td>
                      <td style={{ fontSize: 12.5, color: 'var(--text-2)' }}>
                        {q.transport_type || '—'}
                        {q.transport_name && <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{q.transport_name}</div>}
                        {q.lr_number && <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-3)' }}>LR: {q.lr_number}</div>}
                      </td>
                      <td>
                        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
                          {q.workflow_status === 'PO Received' && (
                            <button className="ra-btn ra-dispatch" onClick={e => { e.stopPropagation(); setDispatchQuote(q); }}>
                              <I.Truck /> <span>Dispatch</span>
                            </button>
                          )}
                          {q.workflow_status === 'PO Received' && !q.work_order_created_at && (
                            <button className="ra-btn ra-po" onClick={e => { e.stopPropagation(); markWorkOrder(q); }} title="Log work order creation">
                              <I.Package /> <span>Work Order</span>
                            </button>
                          )}
                          {q.work_order_created_at && (
                            <span style={{ fontSize:11, color:'oklch(0.50 0.15 150)', fontWeight:600, padding:'4px 8px', background:'var(--st-po-bg)', border:'1px solid var(--st-po-bd)', borderRadius:'var(--radius-sm)', whiteSpace:'nowrap' }}>
                              WO: {fmtDate(q.work_order_created_at)}
                            </span>
                          )}
                          {['PO Received','Dispatched','Delivered'].includes(q.workflow_status) && !q.payment_received && q.credit_order && (
                            <button className="ra-btn" onClick={e => { e.stopPropagation(); markBalancePaid(q); }}
                                    style={{ background:'var(--st-po-bg)', borderColor:'var(--st-po-bd)', color:'var(--st-po-fg)' }}>
                              <I.CreditCard /> <span>Bal Paid</span>
                            </button>
                          )}
                          {q.payment_proof_url && (
                            <button className="ra-btn" onClick={e => { e.stopPropagation(); window.open(q.payment_proof_url, '_blank'); }}
                                    title="View payment proof" style={{ minWidth: 0, width: 32 }}>
                              <I.Image />
                            </button>
                          )}
                          {q.delivery_proof_url && (
                            <button className="ra-btn ra-po" onClick={e => { e.stopPropagation(); window.open(q.delivery_proof_url, '_blank'); }}
                                    title="View delivery proof" style={{ minWidth: 0, width: 32 }}>
                              <I.ShieldCheck />
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <div className="footer"><span>Think Galactic × Sakthi Electricals</span><span>{orders.length} total orders</span></div>

      {orderDetail && (
        <OrderDetailModal
          quote={orderDetail}
          onClose={() => setOrderDetail(null)}
          onDispatch={(q) => { setOrderDetail(null); setDispatchQuote(q); }}
          onRefresh={() => { load(); setOrderDetail(null); }}
          setPage={props.setPage}
        />
      )}
    </>
  );
};

/* ══════════════════════════════════════════════════════════════════
   PAYMENTS PAGE — Outstanding credit / Gov / EB view
   ══════════════════════════════════════════════════════════════════ */
const PaymentsPage = (props) => {
  const { quotes, setSelectedId } = props;

  const paid = quotes.filter(q => q.payment_received === true &&
    ['PO Received','Dispatched','Delivered'].includes(q.workflow_status));
  const pending = quotes.filter(q =>
    ['PO Received','Dispatched'].includes(q.workflow_status) && q.payment_received === false
  );

  const totalOutstanding = pending.reduce((s,q) => s + (parseFloat(q.amount_grand_total)||0), 0);
  const totalReceived = paid.reduce((s,q) => s + (parseFloat(q.amount_grand_total)||0), 0);

  const agingLabel = (date) => {
    if (!date) return { label: 'Unknown', cls: 'warn' };
    const days = Math.abs(daysDiff(date) || 0);
    if (days <= 7)  return { label: `${days}d`, cls: 'fresh' };
    if (days <= 30) return { label: `${days}d`, cls: 'warn' };
    return { label: `${days}d`, cls: 'danger' };
  };

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Payments</div>
          <div className="page-sub">Track outstanding payments and confirmed receipts.</div>
        </div>
      </div>

      <div className="metrics">
        <Metric label="Outstanding" value={fmtINR(totalOutstanding)} sm
                sub={`${pending.length} order${pending.length !== 1 ? 's' : ''} unpaid`}
                accent={pending.length ? 'red' : 'slate'} icon={<I.AlertTriangle />} />
        <Metric label="Received" value={fmtINR(totalReceived)} sm
                sub={`${paid.length} payments confirmed`} accent="green" icon={<I.CheckCircle />} />
        <Metric label="Credit Orders" value={pending.length}
                sub="Gov / EB / credit terms" accent={pending.length ? 'amber' : 'slate'} icon={<I.CreditCard />} />
        <Metric label="Collection Rate" value={paid.length + pending.length > 0 ? `${Math.round(paid.length/(paid.length+pending.length)*100)}%` : '—'}
                sub="Orders paid vs total" accent="blue" icon={<I.Target />} />
      </div>

      {pending.length > 0 && (
        <div className="panel" style={{ borderColor: 'var(--st-danger-bd)' }}>
          <div className="panel-h" style={{ background: 'var(--st-danger-bg)' }}>
            <div className="panel-h-l">
              <div className="panel-title" style={{ color: 'var(--st-danger-fg)' }}>⚠ Outstanding Payments</div>
              <span className="panel-tag">{pending.length} orders · {fmtINR(totalOutstanding)} total</span>
            </div>
          </div>
          <div className="tbl-wrap">
            <table className="q-table">
              <thead><tr>
                <th>Client</th>
                <th>Order</th>
                <th>Amount Due</th>
                <th>Status</th>
                <th>PO Date</th>
                <th>Aging</th>
              </tr></thead>
              <tbody>
                {[...pending].sort((a,b) => new Date(a.payment_received_date||a.updated_at) - new Date(b.payment_received_date||b.updated_at)).map(q => {
                  const aging = agingLabel(q.updated_at);
                  return (
                    <tr key={q.id} style={{ cursor: 'pointer' }} onClick={() => setOrderDetail(q)}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <Avatar name={q.client_name} />
                          <div>
                            <div className="name">{q.client_name}</div>
                            {q.contact_person && <div className="qno">{q.contact_person}</div>}
                          </div>
                        </div>
                      </td>
                      <td><div className="qno" style={{ fontSize: 12.5 }}>{q.internal_id || q.quote_number}</div></td>

const ProofVaultPage = (props) => {
  const { quotes } = props;
  const [lightbox, setLightbox] = React.useState(null);
  const [typeFilter, setTypeFilter] = React.useState('All');

  // Build proof items from all quotes
  const proofs = [];
  quotes.forEach(q => {
    if (q.payment_proof_url) {
      proofs.push({
        type: 'payment', url: q.payment_proof_url,
        client: q.client_name, order: q.internal_id || q.quote_number,
        date: q.payment_received_date || q.updated_at,
        amount: q.amount_grand_total, id: q.id
      });
    }
    if (q.delivery_proof_url) {
      proofs.push({
        type: 'delivery', url: q.delivery_proof_url,
        client: q.client_name, order: q.internal_id || q.quote_number,
        date: q.delivery_confirmed_date || q.updated_at,
        amount: q.amount_grand_total, id: q.id
      });
    }
  });

  const filtered = proofs.filter(p => typeFilter === 'All' || p.type === typeFilter);
  const paymentCount = proofs.filter(p => p.type === 'payment').length;
  const deliveryCount = proofs.filter(p => p.type === 'delivery').length;

  return (
    <>
      <div className="page-head">
        <div>
          <div className="page-title">Evidence Vault</div>
          <div className="page-sub">Every payment screenshot and delivery photo — timestamped, stored, protected.</div>

      <div className="metrics">
        <Metric label="Payment Proofs" value={paymentCount} sub="UPI screenshots stored" accent="green" icon={<I.ShieldCheck />} />
        <Metric label="Delivery Proofs" value={deliveryCount} sub="Delivery photos stored" accent="blue" icon={<I.Image />} />
        <Metric label="Total Evidence" value={proofs.length} sub="Dispute-proof records" accent="violet" icon={<I.Award />} />
        <Metric label="Auto-Capture" value="Active" sub="Saves every receipt automatically" accent="green" icon={<I.Zap />} />
      </div>

      <div className="panel">
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">Evidence Gallery</div>
            <span className="panel-tag">{filtered.length} files</span>
          </div>
          <div className="tbl-controls">
            <select className="input-sm" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
              <option value="All">All Types</option>
              <option value="payment">Payment Proofs</option>
              <option value="delivery">Delivery Proofs</option>
            </select>
          </div>
        </div>
        {filtered.length === 0 ? (
          <div className="empty">
            <I.ShieldCheck />
            <div className="et">No proofs captured yet</div>
            <div className="es">Payment screenshots and delivery photos will appear here automatically when customers send them via WhatsApp.</div>

              <div key={i} className="proof-card">
                <div className="proof-img" onClick={() => setLightbox(p)}>
                  <img src={p.url} alt={`${p.type} proof`}
                       onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                  />
                  <div style={{ display: 'none', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                    <I.Image />
                    <span style={{ fontSize: 11 }}>Click to open</span>

                </div>
                <div className="proof-meta">
                  <span className={`proof-type-tag ${p.type}`}>
                    {p.type === 'payment' ? <><I.CreditCard size={10} /> Payment</> : <><I.ShieldCheck size={10} /> Delivery</>}
                  </span>
                  <div className="client">{p.client}</div>
                  <div className="order">{p.order} · {fmtINR(p.amount)}</div>
                  <div className="date">{fmtDateTime(p.date)}</div>

/* ══════════════════════════════════════════════════════════════════
   ORDER DETAIL MODAL — Transport / Dispatch / Delivery editing
   ══════════════════════════════════════════════════════════════════ */
const OrderDetailModal = ({ quote, onClose, onDispatch, onRefresh, setPage }) => {
  if (!quote) return null;
  const [saving, setSaving] = React.useState(false);
  const [editingLR, setEditingLR] = React.useState(false);
  const [invoice, setInvoice] = React.useState(null);
  const [lrForm, setLrForm] = React.useState({ lr_number: quote.lr_number || '', transport_type: quote.transport_type || 'Courier', transport_name: quote.transport_name || '' });

  React.useEffect(() => {
    // Fetch linked invoice for timeline
    if (quote.id) {
      sbFetch(`invoices?quotation_id=eq.${quote.id}&order=created_at.desc&limit=1`)
        .then(rows => { if (Array.isArray(rows) && rows.length > 0) setInvoice(rows[0]); })
        .catch(() => {});
    }
  }, [quote.id]);

  const saveLR = async () => {
    setSaving(true);
    await updateQuotation(quote.id, lrForm);
    setSaving(false);
    setEditingLR(false);
    onRefresh();
  };

  const isOverdue = quote.workflow_status === 'PO Received' && quote.expected_dispatch_date && daysDiff(quote.expected_dispatch_date) < 0;

  // Build full activity timeline
  const events = [];
  if (quote.enquiry_created_at) events.push({ label: 'Enquiry Received', ts: quote.enquiry_created_at, cls: 'blue', icon: '📥' });
  if (quote.created_at) events.push({ label: 'Quotation Created', ts: quote.created_at, cls: 'blue', icon: '📄' });
  if (quote.quote_date) events.push({ label: 'Quote Sent to Client', ts: quote.quote_date + 'T00:00:00', cls: 'blue', icon: '📤' });
  if (quote.po_received_date) events.push({ label: 'PO Received', ts: quote.po_received_date, cls: 'green', icon: '✅' });
  if (quote.po_confirmation_date) events.push({ label: 'T&C Accepted by Client', ts: quote.po_confirmation_date, cls: 'green', icon: '🤝' });
  if (invoice?.created_at) events.push({ label: `Invoice Created (${invoice.invoice_number||''})`, ts: invoice.created_at, cls: 'green', icon: '🧾' });
  if (quote.payment_received_date) events.push({ label: `Payment Received${invoice?.amount_total ? ' · ₹'+parseFloat(invoice.amount_total).toLocaleString('en-IN') : ''}`, ts: quote.payment_received_date, cls: 'green', icon: '💰' });
  if (invoice?.paid_at) events.push({ label: 'Invoice Marked Paid', ts: invoice.paid_at, cls: 'green', icon: '✔️' });
  if (quote.work_order_created_at) events.push({ label: 'Work Order Created (Ramya)', ts: quote.work_order_created_at, cls: 'amber', icon: '🔧' });
  if (quote.dispatched_date) events.push({ label: `Dispatched${quote.lr_number ? ' · LR: ' + quote.lr_number : ''}`, ts: quote.dispatched_date, cls: 'amber', icon: '🚚' });
  if (quote.delivery_confirmed_date) events.push({ label: 'Delivery Confirmed by Client', ts: quote.delivery_confirmed_date, cls: 'delivered', icon: '📦' });
  events.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  if (quote.work_order_created_at) events.push({ label: 'Work Order Created (Ramya)', ts: quote.work_order_created_at, cls: 'amber', icon: '🔧' });
  if (quote.dispatched_date) events.push({ label: `Dispatched${quote.lr_number ? ' · LR: ' + quote.lr_number : ''}`, ts: quote.dispatched_date, cls: 'amber', icon: '🚚' });
  if (quote.delivery_confirmed_date) events.push({ label: 'Delivery Confirmed by Client', ts: quote.delivery_confirmed_date, cls: 'delivered', icon: '📦' });
  events.sort((a,b) => new Date(a.ts) - new Date(b.ts));

  const dotColor = { blue: 'var(--accent)', green: 'oklch(0.50 0.15 150)', amber: 'oklch(0.55 0.14 70)', delivered: 'oklch(0.50 0.15 150)', red: 'var(--st-danger-fg)' };

        <div>
          <div style={{ fontSize:16, fontWeight:700, marginBottom:4 }}>{quote.client_name}</div>
          <div style={{ fontSize:12, fontFamily:'var(--mono)', color:'var(--text-3)' }}>{quote.internal_id||quote.quote_number} · {quote.product_name?.substring(0,50)}</div>
        </div>
        <button className="modal-x" onClick={onClose}><I.X /></button>
      </div>

      <div style={{ padding:'16px 20px', flex:1, overflowY:'auto' }}>
        {/* Status + Amount */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 14px', marginBottom:14 }}>
          <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
            <Badge status={quote.workflow_status} />
            {isOverdue && <span style={{ fontSize:11, fontWeight:700, color:'var(--st-danger-fg)', textTransform:'uppercase' }}>DISPATCH OVERDUE</span>}
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:17, fontWeight:700, color:'oklch(0.50 0.14 150)' }}>{fmtINR(quote.amount_grand_total)}</div>
            <div style={{ fontSize:11, color: quote.payment_received ? 'oklch(0.50 0.15 150)' : 'var(--st-danger-fg)', fontWeight:600, marginTop:2 }}>
              {quote.payment_received ? `✓ Paid ${fmtDate(quote.payment_received_date)}` : '⚠ Payment Pending'}
            </div>
          </div>
        </div>

        {/* Activity Timeline */}
        <div style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-3)', marginBottom:10 }}>Activity Timeline</div>
        {events.length === 0 ? (
          <div style={{ fontSize:13, color:'var(--text-3)', marginBottom:14 }}>No activity recorded yet.</div>
        ) : (
          <div style={{ position:'relative', marginBottom:16 }}>
            <div style={{ position:'absolute', left:7, top:8, bottom:8, width:2, background:'var(--border)' }} />
            {events.map((ev, i) => (
              <div key={i} style={{ display:'flex', gap:12, marginBottom:10, position:'relative' }}>
                <div style={{ width:16, height:16, borderRadius:'50%', background:dotColor[ev.cls]||'var(--border)', flexShrink:0, marginTop:2, zIndex:1, display:'flex', alignItems:'center', justifyContent:'center', fontSize:8 }}>
                  {ev.icon}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>{ev.label}</div>
                  <div style={{ fontSize:11, color:'var(--text-3)', marginTop:1 }}>{fmtDateTime(ev.ts)}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Transport & LR */}
        <div style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-3)', marginBottom:8, marginTop:4 }}>Transport Details</div>
        {editingLR ? (
          <div style={{ background:'var(--surface-2)', borderRadius:'var(--radius-sm)', padding:'12px 14px', border:'1px solid var(--border)', marginBottom:12 }}>
            <div className="modal-row" style={{ marginBottom:8 }}>
              <div className="field" style={{ marginBottom:0 }}>
                <label className="field-label">Transport Type</label>
                <select className="input" value={lrForm.transport_type} onChange={e=>setLrForm(f=>({...f,transport_type:e.target.value}))}>
                  <option>Courier</option><option>Lorry</option><option>Bus Parcel</option><option>Hand Delivery</option><option>Other</option>
                </select>
              </div>
              <div className="field" style={{ marginBottom:0 }}>
                <label className="field-label">Transport Name</label>
                <input className="input" value={lrForm.transport_name} onChange={e=>setLrForm(f=>({...f,transport_name:e.target.value}))} placeholder="e.g. Praveen Travels" />
              </div>
            </div>
            <div className="field" style={{ marginBottom:8 }}>
              <label className="field-label">LR / Docket Number</label>
              <input className="input" value={lrForm.lr_number} onChange={e=>setLrForm(f=>({...f,lr_number:e.target.value}))} placeholder="e.g. PR123456" />
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button className="btn btn-primary btn-sm" onClick={saveLR} disabled={saving}>{saving?'Saving…':'Save'}</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditingLR(false)}>Cancel</button>
            </div>
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>
            <div className="kv"><div className="k">Transport</div><div className="v" style={{ fontSize:12 }}>{quote.transport_type||'—'} {quote.transport_name ? '· '+quote.transport_name : ''}</div></div>
            <div className="kv">
              <div className="k">LR / Docket</div>
              <div className="v mono" style={{ fontSize:12, display:'flex', alignItems:'center', gap:6 }}>
                {quote.lr_number||'—'}
                <button className="btn btn-ghost btn-xs" onClick={()=>setEditingLR(true)} title="Edit LR"><I.Edit /></button>
              </div>
            </div>
            <div className="kv"><div className="k">Dispatched</div><div className="v" style={{ fontSize:12 }}>{fmtDate(quote.dispatched_date)||'—'}</div></div>
            <div className="kv"><div className="k">Expected Dispatch</div><div className="v" style={{ fontSize:12, color:isOverdue?'var(--st-danger-fg)':undefined }}>{fmtDate(quote.expected_dispatch_date)||'—'}</div></div>
            {quote.delivery_confirmed_date && <div className="kv" style={{ gridColumn:'1/-1', background:'var(--st-delivered-bg)', borderColor:'var(--st-delivered-bd)' }}><div className="k" style={{ color:'var(--st-delivered-fg)' }}>Delivery Confirmed</div><div className="v" style={{ fontSize:12, color:'var(--st-delivered-fg)' }}>✓ {fmtDate(quote.delivery_confirmed_date)}</div></div>}
          </div>
        )}

        {/* Proof links */}
        {(quote.delivery_proof_url || quote.payment_proof_url) && (
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:14 }}>
            {quote.delivery_proof_url && <a href={quote.delivery_proof_url} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm"><I.ShieldCheck /> Delivery Photo</a>}
            {quote.payment_proof_url && <a href={quote.payment_proof_url} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm"><I.Image /> Payment Proof</a>}
          </div>
        )}

        {/* Action buttons */}
        {(quote.workflow_status === 'PO Received' || quote.workflow_status === 'In Production') && (
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {quote.po_confirmation_date && !invoice && (
              <button className="btn btn-primary btn-sm" onClick={() => { onClose(); if(setPage) setPage('invoices'); }}>
                <I.ClipList /> Create Invoice
              </button>
            )}
            <button className="btn btn-ghost btn-sm" onClick={() => { onClose(); onDispatch(quote); }}>
              <I.Truck /> Dispatch Order
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

Object.assign(window, { CommandPage, OrdersPage, PaymentsPage, ProofVaultPage, SatisfactionPage, TenderPage });
</script>

<script type="text/babel" data-name="app">
const { useState, useEffect, useCallback, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "blue",
  "dark": false,
  "density": "regular",
  "sidebarStyle": "minimal",
  "showLiveBadge": true
} /*EDITMODE-END*/;

const ACCENTS = {
  blue: { h: 252, c: 0.18, light: { fg: '#FFFFFF' } },
  violet: { h: 290, c: 0.20, light: { fg: '#FFFFFF' } },
  green: { h: 150, c: 0.16, light: { fg: '#FFFFFF' } },
  red: { h: 25, c: 0.20, light: { fg: '#FFFFFF' } }
};

const NAV = [
{ id: 'command',    label: 'Command Center',     icon: I.Bolt,        badge: 'alerts',    section: 'Overview' },
{ id: 'companies',  label: 'Clients',            icon: I.Building,    badge: null,        section: 'Overview' },
{ id: 'enquiries',  label: 'Enquiries',          icon: I.Inbox,       badge: 'enquiries', section: 'Manage' },
{ id: 'tracker',    label: 'Quotations',         icon: I.ClipList,    badge: 'open',      section: 'Manage' },
{ id: 'poconfirm',  label: 'PO Confirmation',    icon: I.CheckCircle, badge: 'poconfirm', section: 'Manage' },
{ id: 'invoices',   label: 'Invoices',           icon: I.ClipList,    badge: 'invpending',section: 'Operations' },
{ id: 'orders',     label: 'Orders',             icon: I.Package,     badge: 'orders',    section: 'Operations' },
{ id: 'summary',    label: 'Business Summary',   icon: I.Chart,       badge: null,        section: 'Insights' },
{ id: 'expiry',     label: 'Expiring Soon',      icon: I.Clock,       badge: 'expiring',  section: 'Insights' },
{ id: 'converted',  label: 'Converted POs',      icon: I.Check2,      badge: 'po',        section: 'Insights' },
{ id: 'staff',      label: 'Staff',              icon: I.User,        badge: null,        section: 'Team' },
{ id: 'remarks',    label: 'Remarks',            icon: I.AlertCircle, badge: 'remarks',   section: 'Team' },
{ id: 'proof',      label: 'Evidence Vault',     icon: I.Image,       badge: null,        section: 'Storage' },
];


const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  /* Apply theme + accent + density to <html> */
  useEffect(() => {
    const html = document.documentElement;
    html.dataset.theme = t.dark ? 'dark' : 'light';
    html.dataset.density = t.density || 'regular';
    const a = ACCENTS[t.accent] || ACCENTS.blue;
    html.style.setProperty('--accent', `oklch(0.56 ${a.c} ${a.h})`);
    html.style.setProperty('--accent-hover', `oklch(0.50 ${a.c} ${a.h})`);
    html.style.setProperty('--accent-soft', `oklch(${t.dark ? 0.22 : 0.96} ${a.c * 0.16} ${a.h})`);
    html.style.setProperty('--accent-soft-2', `oklch(${t.dark ? 0.30 : 0.92} ${a.c * 0.30} ${a.h})`);
    html.style.setProperty('--accent-border', `oklch(${t.dark ? 0.40 : 0.86} ${a.c * 0.40} ${a.h})`);
    html.style.setProperty('--accent-fg', '#FFFFFF');
  }, [t.dark, t.accent, t.density]);

  /* Update document.title to reflect current page */
  useEffect(() => {
    const label = NAV.find(n => n.id === page)?.label || 'Dashboard';
    document.title = `${label} · Sakthi Electricals`;
  }, [page]);

  /* ── App state ───────────────────────────────────────────── */
  const [quotes, setQuotes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('command');
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [editQuote, setEditQuote] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [uploadFile, setUploadFile] = useState(null);
  const [uploadPhone, setUploadPhone] = useState('');
  const [uploadEmail, setUploadEmail] = useState('');
  const [uploadCompanyId, setUploadCompanyId] = useState('');
  const [sendingId, setSendingId] = useState(null);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [dispatchQuote, setDispatchQuote] = useState(null);

  /* ── Enquiry state ───────────────────────────────────────── */
  const [enquiries, setEnquiries] = useState([]);
  const [staleEnquiries, setStaleEnquiries] = useState(0);

  /* ── Extended table state ────────────────────────────────── */
  const [companies, setCompanies] = useState([]);
  const [invoices,  setInvoices]  = useState([]);
  const [remarks,   setRemarks]   = useState([]);
  const [staff,     setStaff]     = useState([]);

  const loadCompanies = useCallback(async () => {
    try {
      const d = await sbFetch('companies?select=*,contacts(*)&order=company_name.asc');
      const arr = Array.isArray(d) ? d : [];
      setCompanies(arr);
      window._companies = arr; // make available to TopUpload modal
      window._reloadCompanies = loadCompanies; // expose for cross-component use
    } catch(e) {}
  }, []);

  const loadInvoices = useCallback(async () => {
    try {
      const d = await sbFetch('invoices?select=*,companies(company_name),quotations(product_name,phone_number,contact_person)&order=created_at.desc&limit=200');
      setInvoices(Array.isArray(d) ? d : []);
    } catch(e) {}
  }, []);

  const loadRemarks = useCallback(async () => {
    try {
      const d = await sbFetch('remarks?select=*&order=issued_at.desc&limit=200');
      setRemarks(Array.isArray(d) ? d : []);
    } catch(e) {}
  }, []);

  const loadStaff = useCallback(async () => {
    try {
      const d = await sbFetch('staff?select=*&order=name.asc');
      const arr = Array.isArray(d) ? d : [];
      setStaff(arr);
      window._staff = arr.filter(s => s.is_active !== false);
    } catch(e) {}
  }, []);

  useEffect(() => {
    loadCompanies(); loadInvoices(); loadRemarks(); loadStaff();
  }, [loadCompanies, loadInvoices, loadRemarks, loadStaff]);

  const loadEnquiries = useCallback(async () => {
    try {
      const data = await sbFetch('enquiries?select=*&order=created_at.desc&limit=500');
      const rows = Array.isArray(data) ? data : [];
      setEnquiries(rows);
      setStaleEnquiries(rows.filter(e =>
        e.status === 'Pending' &&
        (Date.now() - new Date(e.created_at).getTime()) / 3600000 > 24
      ).length);
    } catch(e) { console.error('enquiries load error:', e); }
  }, []);

  useEffect(() => { loadEnquiries(); }, [loadEnquiries]);
  useEffect(() => {
    const t = setInterval(loadEnquiries, 15000);
    return () => clearInterval(t);
  }, [loadEnquiries]);

  const load = useCallback(async () => {
    try {const data = await fetchQuotations();setQuotes(data);}
    catch (e) {console.error(e);} finally
    {setLoading(false);}
  }, []);
  useEffect(() => {load();}, [load]);
  useEffect(() => {const t = setInterval(load, 10000);return () => clearInterval(t);}, [load]);

  /* ── Upload handler ──────────────────────────────────────── */
  const handleUpload = async () => {
    if (!uploadFile) return setUploadStatus({ type: 'error', msg: 'Please select a PDF file.' });
