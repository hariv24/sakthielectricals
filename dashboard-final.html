    setUploading(true);setUploadStatus({ type: 'loading', msg: 'Step 1/2: Uploading PDF…' });
    try {
      const phone = String(uploadPhone || '').replace(/\D/g, '').replace(/^91/, '').slice(-10);
      const email = uploadEmail || '';
      const rawName = uploadFile.name.replace(/\.pdf$/i, '').replace(/[^\w\-]/g, '-');
      const sfn = `${rawName}-${Date.now()}.pdf`;
      const sRes = await fetch(`${SUPABASE_URL}/storage/v1/object/quote-pdfs/${sfn}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
        body: uploadFile
      });
      const sText = await sRes.text();
      let pdfUrl = '';
      if (sRes.status === 200 || sRes.status === 201) {
        pdfUrl = `${SUPABASE_URL}/storage/v1/object/public/quote-pdfs/${sfn}`;
        setUploadStatus({ type: 'loading', msg: 'Step 2/2: Parsing quote data…' });
      } else {
        setUploadStatus({ type: 'error', msg: `Storage failed (${sRes.status}): ${sText.slice(0, 200)}` });
        setUploading(false);return;
      }
      const p = new URLSearchParams();
      if (phone) p.set('phone_number', phone);
      if (email) p.set('email', email);
      if (pdfUrl) p.set('pdf_storage_path', pdfUrl);

      /* ── Blacklist guard ─────────────────────────────────── */
      if (phone) {
        try {
          const blRows = await sbFetch(`quotations?phone_number=eq.${phone}&select=client_flag,client_notes,client_name&limit=1`);
          if (Array.isArray(blRows) && blRows[0]?.client_flag === 'Blacklisted') {
            const nm = blRows[0].client_name || phone;
            const note = blRows[0].client_notes ? `\n\n"${blRows[0].client_notes}"` : '';
            const go = confirm(`⚠️ BLACKLISTED CLIENT\n\n${nm}${note}\n\nThis number is flagged. Proceed with this quote?`);
            if (!go) {
              setUploadStatus({ type: 'error', msg: 'Upload cancelled — blacklisted client.' });
              setUploading(false);
              return;
            }
          }
        } catch(_) {}
      }
      const fd = new FormData();fd.append('data', uploadFile);
      const res = await fetch(`${N8N_WEBHOOK}${p.toString() ? '?' + p.toString() : ''}`, { method: 'POST', body: fd });
      const rt = await res.text();
      let json = {};
      try { json = JSON.parse(rt); } catch (_) {}
      if (res.ok) {
        // Get the quote ID directly from Supabase — don't rely on WF-01 response
        let quoteId = json.id || null;
        if (!quoteId && phone) {
          try {
            const recentQ = await sbFetch(`quotations?phone_number=eq.${phone}&order=created_at.desc&limit=1&select=id,quote_number,client_name`);
            if (Array.isArray(recentQ) && recentQ.length > 0) quoteId = recentQ[0].id;
          } catch(_) {}
        }
        let successMsg = `${json.quote_number || ''} saved · Quote sent to client via WhatsApp`;
        /* ── Link company_id if manually selected ────────── */
        if (uploadCompanyId && quoteId) {
          try {
            await sbFetch(`quotations?id=eq.${quoteId}`, {
              method: 'PATCH',
              body: JSON.stringify({ company_id: uploadCompanyId }),
            });
          } catch(_) {}
        }
        /* ── Auto-link / auto-create company ─────────────── */
        if (!uploadCompanyId && quoteId) {
          try {
            let matched = null;
            // Try 1: match by phone in contacts (only if phone provided)
            if (phone) {
              const contactMatch = await sbFetch(`contacts?phone=eq.${phone}&select=company_id,companies(id,company_name)&limit=1`);
              if (Array.isArray(contactMatch) && contactMatch.length > 0 && contactMatch[0]?.company_id) {
                matched = contactMatch[0];
              }
            }
            // Try 2: match by phone on existing quotations
            if (!matched && phone) {
              const qMatch = await sbFetch(`quotations?phone_number=eq.${phone}&company_id=not.is.null&select=company_id,companies(id,company_name)&limit=1`);
              if (Array.isArray(qMatch) && qMatch.length > 0 && qMatch[0]?.company_id) {
                matched = qMatch[0];
              }
            }
            // Try 3: match by parsed company name (always runs)
            if (!matched && json.client_name && json.client_name !== 'Unknown') {
              const cleanName = json.client_name.replace(/^M\/s\.?\s*/i, '').trim();
              const nameMatch = await sbFetch(`companies?company_name=ilike.*${cleanName}*&select=id,company_name&limit=1`);
              if (Array.isArray(nameMatch) && nameMatch.length > 0) {
                matched = { company_id: nameMatch[0].id, companies: nameMatch[0] };
              }
            }
            if (matched?.company_id) {
              const companyName = matched.companies?.company_name;
              await sbFetch(`quotations?id=eq.${quoteId}`, {
                method: 'PATCH',
                body: JSON.stringify({ company_id: matched.company_id }),
              });
              successMsg += ` · Linked to ${companyName || 'company'} ✓`;
              // Update any pending enquiry client_name to use the real company name
              if (companyName && phone) {
                try {
                  await sbFetch(`enquiries?phone_number=eq.${phone}&status=in.(Pending,Quoted)`, {
                    method: 'PATCH',
                    body: JSON.stringify({ client_name: companyName }),
                  });
                } catch(_) {}
              }
              // Always add new phone as contact if not already in company
              if (phone) {
                try {
                  const existingContact = await sbFetch(`contacts?company_id=eq.${matched.company_id}&phone=eq.${phone}&limit=1`);
                  if (!Array.isArray(existingContact) || existingContact.length === 0) {
                    const contactName = json.contact_person || json.client_name || phone;
                    await sbFetch('contacts', {
                      method: 'POST',
                      body: JSON.stringify({ company_id: matched.company_id, name: contactName, phone, is_primary: false }),
                    });
                  }
                } catch(_) {}
              }
              setTimeout(loadCompanies, 400);
            } else {
              // No match anywhere — auto-create company from parsed name
              const clientName = (json.client_name && json.client_name !== 'Unknown') ? json.client_name : (phone ? `Client ${phone}` : 'Unknown Client');
              const newCoRes = await sbFetch('companies', {
                method: 'POST',
                body: JSON.stringify({ company_name: clientName, client_flag: 'Neutral', is_credit_customer: false, credit_days: 0, is_active: true }),
              });
              const newCo = Array.isArray(newCoRes) ? newCoRes[0] : newCoRes;
              if (newCo?.id) {
                if (phone || json.contact_person) {
                  await sbFetch('contacts', {
                    method: 'POST',
                    body: JSON.stringify({ company_id: newCo.id, name: json.contact_person || clientName, phone: phone || null, is_primary: true }),
                  });
                }
                await sbFetch(`quotations?id=eq.${quoteId}`, {
                  method: 'PATCH',
                  body: JSON.stringify({ company_id: newCo.id }),
                });
                successMsg += ` · New client "${clientName}" created`;
                setTimeout(loadCompanies, 400);
              }
            }
          } catch(linkErr) {
            successMsg += ` · (client link failed: ${linkErr.message})`;
          }
        }
        /* ── Auto-link pending enquiry ───────────────────── */
        if (phone && quoteId) {
          try {
            const enqRows = await sbFetch(`enquiries?phone_number=eq.${phone}&status=eq.Pending&order=created_at.desc&limit=1`);
            if (Array.isArray(enqRows) && enqRows.length > 0) {
              const hrs = (Date.now() - new Date(enqRows[0].created_at).getTime()) / 3600000;
              await sbFetch(`enquiries?id=eq.${enqRows[0].id}`, {
                method: 'PATCH',
                body: JSON.stringify({
                  status: 'Quoted',
                  quotation_id: json.id,
                  response_time_hours: Math.round(hrs * 10) / 10,
                }),
              });
              successMsg = `${json.quote_number || ''} saved · Linked to enquiry ${enqRows[0].internal_id || ''}`;
              loadEnquiries();
            }
          } catch(_) {}
        }
        setUploadStatus({ type: 'success', msg: successMsg });
        setUploadFile(null); setUploadPhone(''); setUploadEmail(''); setUploadCompanyId('');
        // Sequential: wait for DB to settle then reload quotes + companies
        setTimeout(async () => { await load(); setTimeout(loadCompanies, 400); }, 800);
      } else {
        setUploadStatus({ type: 'error', msg: `Parse failed (${res.status}): ${rt.slice(0, 120)}` });
        setTimeout(load, 2000);
      }
    } catch (e) {
      setUploadStatus({ type: 'error', msg: `Network error: ${e.message}` });
      setTimeout(load, 2000);
    } finally {
      setUploading(false);
    }
  };

  /* ── Other handlers ──────────────────────────────────────── */
  const handleSave = async (id, updates) => {
    try {
      if (updates.phone_number)
      updates.phone_number = String(updates.phone_number).replace(/\D/g, '').replace(/^91/, '').slice(-10) || null;
      if (updates.workflow_status === 'Following Up') {
        const d = new Date();d.setDate(d.getDate() + (updates.nudge_interval_days || 3));
        updates.next_nudge_date = d.toISOString().split('T')[0];
      }
      await updateQuotation(id, updates);
      setEditQuote(null);load();
    } catch (e) {alert('Save failed: ' + e.message);}
  };

  const markPO = async (id) => {
    if (!confirm('Mark as PO Received? Follow-ups will stop.')) return;
    await updateQuotation(id, { workflow_status: 'PO Received', whatsapp_enabled: false, email_enabled: false });
    load();
  };

  const handleDelete = async (q) => {
    if (!confirm(`Delete quote for ${q.client_name} (${q.quote_number})?\nCannot be undone.`)) return;
    try {await deleteQuotation(q.id);if (selectedId === q.id) setSelectedId(null);load();}
    catch (e) {alert('Delete failed: ' + e.message);}
  };

  const handleManualSend = async (q) => {
    if (!q.phone_number && !q.email_enabled) return alert('No phone or email configured. Edit the quote first.');
    if (!q.whatsapp_enabled && !q.email_enabled) return alert('Both channels are disabled. Enable at least one first.');
    const ch = [q.whatsapp_enabled && 'WhatsApp', q.email_enabled && 'Email'].filter(Boolean).join(' + ');
    if (!confirm(`Send nudge via ${ch} to ${q.contact_person || q.client_name}?`)) return;
    setSendingId(q.id);
    try {
      const res = await fetch(N8N_MANUAL_NUDGE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: {
          id: q.id, phone_number: q.phone_number, client_name: q.client_name,
          contact_person: q.contact_person, product_name: q.product_name,
          quote_number: q.quote_number, amount_grand_total: q.amount_grand_total,
          attach_pdf: q.attach_pdf, pdf_storage_path: q.pdf_storage_path,
          nudge_interval_days: q.nudge_interval_days || 3,
          nudge_count: q.nudge_count || 0,
          whatsapp_enabled: q.whatsapp_enabled ?? true,
          email: q.email || '',
          email_enabled: q.email_enabled ?? false
        }})
      });
      if (res.ok) {
        const next = new Date();next.setDate(next.getDate() + (q.nudge_interval_days || 3));
        await updateQuotation(q.id, {
          last_nudge_sent: new Date().toISOString(),
          next_nudge_date: next.toISOString().split('T')[0],
          nudge_count: (q.nudge_count || 0) + 1,
          workflow_status: q.workflow_status === 'Open' ? 'Following Up' : q.workflow_status
        });
        load();
      } else {
        alert('Send failed — check n8n logs.');
      }
    } catch (e) {
      alert('Network error: ' + e.message);
    } finally {
      setSendingId(null);
    }
  };

  const handleDispatch = async (q, transportType, transportName, lrNumber, notes) => {
    try {
      const res = await fetch(N8N_DISPATCH, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          quote_id: q.id,
          transport_type: transportType,
          transport_name: transportName,
          lr_number: lrNumber,
          notes: notes,
        })
      });
      if (res.ok) {
        setDispatchQuote(null);
        load();
      } else {
        alert('Dispatch failed — check n8n logs.');
      }
    } catch (e) {
      alert('Network error: ' + e.message);
    }
  };

  /* ── Computed ────────────────────────────────────────────── */
  const openQuotes = quotes.filter((q) => ['Open', 'Following Up'].includes(q.workflow_status));
  const pipelineVal = openQuotes.reduce((s, q) => s + (parseFloat(q.amount_grand_total) || 0), 0);
  const today = new Date().toISOString().split('T')[0];
  const dueToday = quotes.filter((q) => q.workflow_status === 'Following Up' && q.next_nudge_date === today).length;
  const poThisMonth = quotes.filter((q) => {
    if (!['PO Received', 'Dispatched', 'Delivered'].includes(q.workflow_status)) return false;
    const d = new Date(q.payment_received_date || q.updated_at), n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;
  const expiringSoon = quotes.filter((q) => {
    if (!['Open', 'Following Up'].includes(q.workflow_status)) return false;
    const diff = daysDiff(q.expires_on);return diff !== null && diff >= 0 && diff <= 5;
  });

  const dispatchedOrders = quotes.filter(q => q.workflow_status === 'Dispatched');
  const overdueDispatch = quotes.filter(q => {
    if (q.workflow_status !== 'PO Received') return false;
    if (!q.expected_dispatch_date) return false;
    return daysDiff(q.expected_dispatch_date) < 0;
  });
  const creditPending = quotes.filter(q =>
    ['PO Received', 'Dispatched'].includes(q.workflow_status) && q.payment_received === false
  );

  const ACTIVE_STATUSES = ['Open', 'Following Up'];
  const filtered = quotes.filter((q) => {
    // Status filter
    if (filter === 'All') {
      if (!ACTIVE_STATUSES.includes(q.workflow_status)) return false;
    } else if (filter === 'AllQuotes') {
      // show everything — no status filter
    } else if (filter === 'Expired') {
      if (!['Expired','Closed'].includes(q.workflow_status)) return false;
    } else {
      if (q.workflow_status !== filter) return false;
    }
    // Search filter
    if (search) {
      const s = search.toLowerCase();
      return (q.client_name || '').toLowerCase().includes(s) ||
        (q.quote_number || '').toLowerCase().includes(s) ||
        (q.product_name || '').toLowerCase().includes(s);
    }
    return true;
  });

  const poQuotes = quotes.filter((q) => ['PO Received', 'Dispatched', 'Delivered'].includes(q.workflow_status));
  const now2 = new Date();
  const currentYear = now2.getFullYear();
  const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const monthlyData = MONTHS.map((m, i) => {
    const mq = poQuotes.filter((q) => {
      const d = new Date(q.payment_received_date || q.updated_at);
      return d.getMonth() === i && d.getFullYear() === currentYear;
    });
    return { month: m, count: mq.length, value: mq.reduce((s, q) => s + (parseFloat(q.amount_grand_total) || 0), 0) };
  });
  const yearTotal = monthlyData.reduce((s, d) => s + d.value, 0);
  const yearCount = monthlyData.reduce((s, d) => s + d.count, 0);
  const thisMonth = monthlyData[now2.getMonth()];
  const avgFeedback = (() => {
    const sc = poQuotes.filter((q) => q.feedback_score);
    return sc.length ? (sc.reduce((s, q) => s + q.feedback_score, 0) / sc.length).toFixed(1) : null;
  })();
  const conversionRate = quotes.length ? Math.round(poQuotes.length / quotes.length * 100) : 0;
  const avgQuoteVal = openQuotes.length ? pipelineVal / openQuotes.length : 0;
  const totalNudges = quotes.reduce((s, q) => s + (q.nudge_count || 0), 0);

  const clientRevMap = {};
  poQuotes.forEach((q) => {
    const k = q.client_name || 'Unknown';
    clientRevMap[k] = (clientRevMap[k] || 0) + (parseFloat(q.amount_grand_total) || 0);
  });
  const topClients = Object.entries(clientRevMap).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const navCount = (slot) => {
    if (slot === 'open')       return openQuotes.length;
    if (slot === 'expiring')   return expiringSoon.length;
    if (slot === 'po')         return poQuotes.length;
    if (slot === 'alerts')     return overdueDispatch.length + (dueToday > 0 ? 1 : 0) + creditPending.length + (staleEnquiries > 0 ? 1 : 0);
    if (slot === 'orders')     return quotes.filter(q => ['In Production','Dispatched'].includes(q.workflow_status)).length;
    if (slot === 'credit')     return creditPending.length;
    if (slot === 'enquiries')  return staleEnquiries;
    if (slot === 'poconfirm')  return poQuotes.filter(q => !q.po_confirmation_sent && q.workflow_status === 'PO Received').length;
    if (slot === 'invpending') return invoices.filter(i => i.status === 'Sent' || i.status === 'Overdue').length;
    if (slot === 'remarks')    return remarks.filter(r => r.month_year === new Date().toISOString().slice(0,7)).length;
    return 0;
  };

  const selectedQuote = selectedId ? quotes.find((q) => q.id === selectedId) : null;
  const currentNav = NAV.find((n) => n.id === page);

  /* ── Render ──────────────────────────────────────────────── */
  return (
    <div data-screen-label={`Sakthi · ${currentNav?.label || ''}`}>

      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sb-brand">
          <div className="sb-mark" style={{ color: "rgb(255, 255, 255)" }}><I.Bolt /></div>
          <div className="sb-name">
            Sakthi
            <span className="sub">Electricals</span>
          </div>
        </div>
        <nav className="sb-nav">
          {['Overview','Manage','Operations','Insights','Team','Storage'].map(section => (
            <React.Fragment key={section}>
              <div className="sb-section-header">{section}</div>
              {NAV.filter(n => n.section === section).map((n) => {
                const c = navCount(n.badge);
                return (
                  <button key={n.id}
                    className={`sb-item ${page === n.id ? 'active' : ''}`}
                    onClick={() => setPage(n.id)}>
                    <n.icon />
                    <span>{n.label}</span>
                    {c > 0 && <span className="count">{c}</span>}
                  </button>
                );
              })}
            </React.Fragment>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-stat">
            <span className="sb-stat-l">Pipeline</span>
            <span className="sb-stat-v">{fmtINR(pipelineVal)}</span>
          </div>
          <div className="sb-stat">
            <span className="sb-stat-l">Revenue</span>
            <span className="sb-stat-v green">{fmtINR(yearTotal)}</span>
          </div>
        </div>
      </aside>

      {/* Topbar */}
      <header className="topbar">
        <div className="tb-crumbs">
          <span className="tb-date">
            <I.Calendar size={14} stroke={1.8} />
            {new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short' })}
          </span>
        </div>
        <div className="tb-right">
          <div className="tb-search">
            <I.Search />
            <input placeholder="Search quotes, clients…"
            value={search} onChange={(e) => {setSearch(e.target.value);setPage('tracker');}} />
          </div>
          {false &&
          <span className="live-pill"><span className="live-dot" />Live</span>
          }
          <button className="tb-iconbtn" title="Toggle theme"
          onClick={() => setTweak('dark', !t.dark)}>
            {t.dark ? <I.Sun /> : <I.Moon />}
          </button>
        </div>
      </header>

      {/* Main */}
      <div className="layout">
        <div className="main" data-screen-label={`${currentNav?.label || ''}`}>
          {page === 'command' &&
          <CommandPage
            quotes={quotes} poQuotes={poQuotes} pipelineVal={pipelineVal}
            openQuotes={openQuotes} expiringSoon={expiringSoon}
            overdueDispatch={overdueDispatch} creditPending={creditPending}
            dispatchedOrders={dispatchedOrders} dueToday={dueToday}
            monthlyData={monthlyData} thisMonth={thisMonth}
            yearTotal={yearTotal} conversionRate={conversionRate}
            currentYear={currentYear} setPage={setPage} setFilter={setFilter}
            staleEnquiries={staleEnquiries} setSelectedId={setSelectedId}
            invoices={invoices} remarks={remarks} enquiries={enquiries} />
          }
          {page === 'tracker' &&
          <TrackerPage
            quotes={quotes} loading={loading}
            filter={filter} setFilter={setFilter}
            search={search} setSearch={setSearch}
            openQuotes={openQuotes} pipelineVal={pipelineVal}
            dueToday={dueToday} poThisMonth={poThisMonth}
            expiringSoon={expiringSoon} filtered={filtered}
            selectedId={selectedId} setSelectedId={setSelectedId}
            sendingId={sendingId}
            setEditQuote={setEditQuote} markPO={markPO}
            handleManualSend={handleManualSend} handleDelete={handleDelete}
            load={load} setPage={setPage}
            uploadFile={uploadFile} setUploadFile={setUploadFile}
            uploadPhone={uploadPhone} setUploadPhone={setUploadPhone}
            uploadEmail={uploadEmail} setUploadEmail={setUploadEmail}
            uploadCompanyId={uploadCompanyId} setUploadCompanyId={setUploadCompanyId}
            uploadStatus={uploadStatus} uploading={uploading}
            handleUpload={handleUpload}
            setDispatchQuote={setDispatchQuote}
            overdueDispatch={overdueDispatch}
            creditPending={creditPending}
            dispatchedOrders={dispatchedOrders} />
          }
          {page === 'orders' &&
          <OrdersPage quotes={quotes} setDispatchQuote={setDispatchQuote}
            setSelectedId={setSelectedId} currentYear={currentYear} load={load} setPage={setPage} />
          }
          {page === 'payments' &&
          <PaymentsPage quotes={quotes} setSelectedId={setSelectedId} />
          }
          {page === 'proof' &&
          <ProofVaultPage quotes={quotes} />
          }
          {page === 'summary' &&
          <SummaryPage
            quotes={quotes} poQuotes={poQuotes}
            monthlyData={monthlyData} yearTotal={yearTotal}
            yearCount={yearCount} thisMonth={thisMonth}
            avgFeedback={avgFeedback} conversionRate={conversionRate}
            avgQuoteVal={avgQuoteVal} totalNudges={totalNudges}
            pipelineVal={pipelineVal} topClients={topClients}
            currentYear={currentYear} openQuotes={openQuotes}
            enquiries={enquiries} />
          }
          {page === 'clients' &&
          <CompaniesPage companies={companies} quotes={quotes} invoices={invoices} enquiries={enquiries} reload={loadCompanies} />
          }
          {page === 'tender' &&
          <TenderPage quotes={quotes} />
          }
          {page === 'expiry' &&
          <ExpiryPage expiringSoon={expiringSoon} sendingId={sendingId}
          handleManualSend={handleManualSend} setSelectedId={setSelectedId} />
          }
          {page === 'converted' &&
          <ConvertedPage poQuotes={poQuotes} yearTotal={yearTotal}
          yearCount={yearCount} thisMonth={thisMonth}
          avgFeedback={avgFeedback} currentYear={currentYear}
          setSelectedId={setSelectedId} quotes={quotes} enquiries={enquiries} />
          }
          {page === 'enquiries' &&
          <EnquiriesPage enquiries={enquiries} reload={loadEnquiries} setPage={setPage} />
          }
          {page === 'poconfirm' &&
          <POConfirmPage quotes={quotes} reload={load} setPage={setPage} />
          }
          {page === 'companies' &&
          <CompaniesPage companies={companies} quotes={quotes} invoices={invoices} enquiries={enquiries} reload={loadCompanies} />
          }
          {page === 'invoices' &&
          <InvoicesPage invoices={invoices} quotes={quotes} companies={companies} reload={loadInvoices} reloadQuotes={load} />
          }
          {page === 'staff' &&
          <StaffPage staff={staff} enquiries={enquiries} remarks={remarks} reload={loadStaff} reloadRemarks={loadRemarks} />
          }
          {page === 'remarks' &&
          <RemarksPage remarks={remarks} enquiries={enquiries} quotes={quotes} reload={loadRemarks} />
          }
        </div>
      </div>

      {/* Detail slide-over */}
      {selectedQuote &&
      <DetailPanel
        quote={selectedQuote}
        onClose={() => setSelectedId(null)}
        onEdit={(arg) => {
          if (arg === 'refresh') {load();return;}
          setEditQuote(arg);
        }}
        onMarkPO={(id) => {markPO(id);}}
        onSend={(q) => handleManualSend(q)}
        onDelete={(q) => handleDelete(q)}
        sending={sendingId === selectedQuote.id} />

      }

      {/* Edit modal */}
      {editQuote &&
      <EditModal quote={editQuote} onClose={() => setEditQuote(null)} onSave={handleSave} />
      }

      {/* Dispatch modal */}
      {dispatchQuote &&
      <DispatchModal quote={dispatchQuote} onClose={() => setDispatchQuote(null)} onDispatch={handleDispatch} />
      }

      {/* Tweaks Panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakRadio label="Accent" value={t.accent}
        options={['blue', 'violet', 'green', 'red']}
        onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Density" />
        <TweakRadio label="Row size" value={t.density}
        options={['compact', 'regular', 'comfy']}
        onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Chrome" />
        <TweakToggle label="Live badge in topbar" value={t.showLiveBadge}
        onChange={(v) => setTweak('showLiveBadge', v)} />
      </TweaksPanel>
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script type="text/babel" data-name="enquiriesPage">
/* ════════════════════════════════════════════════════════════════════
   ENQUIRIES PAGE
   All incoming leads from WF-09 (WhatsApp), WF-10 (Email), or manual.
   Key metric: response time — from enquiry logged to quote uploaded.
   ════════════════════════════════════════════════════════════════════ */
const EnquiriesPage = ({ enquiries, reload, setPage }) => {
  const { useState, useMemo } = React;

  const [filterStatus, setFilterStatus] = useState('All');
  const [filterSource, setFilterSource] = useState('All');
  const [search, setSearch]             = useState('');
  const [showModal, setShowModal]       = useState(false);
  const [editTarget, setEditTarget]     = useState(null);
  const [saving, setSaving]             = useState(false);
  const [toast, setToast]               = useState(null);

  const SOURCES  = ['WhatsApp','Phone','Email','Walk-in','Other'];
  const STATUSES = ['Pending','Quoted','Converted','Closed','Cancelled'];
  const SRC_ICON = { WhatsApp:'💬', Phone:'📞', Email:'✉️', 'Walk-in':'🚶', Other:'❓' };

  const ST_CLS = {
    Pending:   'badge-open',
    Quoted:    'badge-follow',
    Converted: 'badge-po',
    Closed:    'badge-expired',
    Cancelled: 'badge-expired',
  };

  const showToast = (msg, err) => {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3000);
  };

  const isStale = (e) =>
    e.status === 'Pending' &&
    (Date.now() - new Date(e.created_at).getTime()) / 3600000 > 24;

  const timeSince = (ts) => {
    const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  };

  const stats = useMemo(() => {
    const pending   = enquiries.filter(e => e.status === 'Pending');
    const stale     = pending.filter(isStale);
    const responded = enquiries.filter(e => e.response_time_hours != null);
    const avgR      = responded.length
      ? (responded.reduce((s, e) => s + Number(e.response_time_hours), 0) / responded.length).toFixed(1)
      : null;
    return {
      total:     enquiries.length,
      pending:   pending.length,
      stale:     stale.length,
      converted: enquiries.filter(e => e.status === 'Converted').length,
      avgR,
    };
  }, [enquiries]);

  const filtered = useMemo(() => enquiries.filter(e => {
    if (filterStatus !== 'All' && e.status !== filterStatus) return false;
    if (filterSource !== 'All' && e.enquiry_source !== filterSource) return false;
    if (search) {
      const q = search.toLowerCase();
      return (e.client_name || '').toLowerCase().includes(q)
          || (e.phone_number || '').includes(q)
          || (e.product_description || '').toLowerCase().includes(q);
    }
    return true;
  }), [enquiries, filterStatus, filterSource, search]);

  const saveEnquiry = async (form) => {
    setSaving(true);
    try {
      const payload = {
        client_name:         form.client_name,
        phone_number:        form.phone_number || null,
        email:               form.email        || null,
        enquiry_source:      form.enquiry_source,
        product_description: form.product_description || null,
        notes:               form.notes        || null,
        status:              form.status       || 'Pending',
        assigned_to:         form.assigned_to  || 'Vijay',
      };
      const res = await sbFetch(
        editTarget ? `enquiries?id=eq.${editTarget.id}` : 'enquiries',
        { method: editTarget ? 'PATCH' : 'POST', body: JSON.stringify(payload) }
      );
      // Auto-create company for new enquiry
      if (!editTarget && form.client_name) {
        try {
          const phone = form.phone_number
            ? String(form.phone_number).replace(/\D/g,'').replace(/^91/,'').slice(-10)
            : null;
          console.log('[saveEnquiry] Creating company:', form.client_name, 'phone:', phone);
          const newCoRes = await sbFetch('companies', {
            method: 'POST',
            body: JSON.stringify({
              company_name: form.client_name,
              client_flag: 'Neutral',
              is_credit_customer: false,
              credit_days: 0,
              is_active: true,
            }),
          });
          console.log('[saveEnquiry] Company result:', newCoRes);
          const co = Array.isArray(newCoRes) ? newCoRes[0] : newCoRes;
          if (co?.id) {
            await sbFetch('contacts', {
              method: 'POST',
              body: JSON.stringify({
                company_id: co.id,
                name: form.client_name,
                phone: phone || null,
                email: form.email || null,
                is_primary: true,
              }),
            });
            console.log('[saveEnquiry] Contact created for company', co.id);
            showToast(`Client "${form.client_name}" created ✓`);
            if (window._reloadCompanies) window._reloadCompanies();
          } else {
            console.log('[saveEnquiry] No id in response:', newCoRes);
          }
        } catch(coErr) {
          console.error('[saveEnquiry] Company creation error:', coErr.message);
          showToast('Client creation error: ' + coErr.message, true);
        }
      }
      showToast(editTarget ? 'Enquiry updated' : 'Enquiry logged ✓');
      setShowModal(false);
      setEditTarget(null);
      reload();
    } catch(e) { showToast('Save failed: ' + e.message, true); }
    setSaving(false);
  };

  const deleteEnq = async (id) => {
    if (!confirm('Delete this enquiry?')) return;
    await sbFetch(`enquiries?id=eq.${id}`, { method: 'DELETE' });
    showToast('Deleted');
    reload();
  };

  const updateStatus = async (id, status) => {
    await sbFetch(`enquiries?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status }),
    });
    reload();
  };

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{
          position: 'fixed', top: 20, right: 20, zIndex: 9999,
          background: toast.err ? 'var(--st-danger-fg)' : 'oklch(0.50 0.15 150)',
          color: '#fff', padding: '10px 18px',
          borderRadius: 'var(--radius-sm)', fontSize: 13, fontWeight: 600,
          boxShadow: 'var(--shadow-lg)',
        }}>
          {toast.msg}
        </div>
      )}

      {/* Page header */}
      <div className="page-head">
        <div>
          <div className="page-title">Enquiries</div>
          <div className="page-sub">
            All incoming leads — WhatsApp (auto) · Email (auto) · Phone &amp; Walk-in (manual) · Same-day response target
          </div>
        </div>
        <button className="btn btn-primary"
          onClick={() => { setEditTarget(null); setShowModal(true); }}>
          <I.Upload /> Log Enquiry
        </button>
      </div>

      {/* Metric cards */}
      <div className="metrics" style={{ gridTemplateColumns: 'repeat(5,1fr)' }}>
        <Metric label="Total" value={stats.total}
          sub="All time" accent="slate" icon={<I.Inbox />} />
        <Metric label="Pending" value={stats.pending}
          sub="Awaiting quote" accent={stats.pending ? 'amber' : 'slate'} icon={<I.Clock />} />
        <Metric label="Overdue >24h" value={stats.stale}
          sub={stats.stale ? 'Respond now' : 'All on time'}
          accent={stats.stale ? 'red' : 'slate'} icon={<I.Bell />} />
        <Metric label="Converted" value={stats.converted}
          sub="Got to PO" accent="green" icon={<I.Check2 />} />
        <Metric label="Avg Response" value={stats.avgR ? `${stats.avgR}h` : '—'}
          sub="Enquiry to quote" accent="blue" icon={<I.TrendUp />} />
      </div>

      {/* Stale banner */}
      {stats.stale > 0 && (
        <div className="alert" style={{ marginBottom: 16 }}>
          <I.AlertCircle />
          <span>
            {stats.stale} enquir{stats.stale === 1 ? 'y' : 'ies'} pending for more than 24 hours — send quotation now
          </span>
        </div>
      )}

      {/* Filters */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <div className="search-sm" style={{ flex: 1, minWidth: 180 }}>
          <I.Search />
          <input className="input-sm" placeholder="Search client, phone, product…"
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="input-sm" value={filterStatus}
          onChange={e => setFilterStatus(e.target.value)}>
          <option value="All">All Statuses</option>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select className="input-sm" value={filterSource}
          onChange={e => setFilterSource(e.target.value)}>
          <option value="All">All Sources</option>
          {SOURCES.map(s => <option key={s}>{s}</option>)}
        </select>
      </div>

      {/* Table */}
      <div className="panel" style={{ padding: 0 }}>
        {filtered.length === 0 ? (
          <div className="empty">
            <I.Inbox />
            <div className="et">No enquiries yet</div>
            <div className="es">
              WhatsApp messages from unknown numbers are captured automatically via WF-09.
              Log phone calls and walk-ins manually with the button above.
            </div>
          </div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead>
                <tr>
                  <th></th>
                  <th>Client</th>
                  <th>Phone</th>
                  <th>Requirement</th>
                  <th>Source</th>
                  <th>Assigned To</th>
                  <th>Status</th>
                  <th>Age</th>
                  <th>Response</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(e => {
                  const stale = isStale(e);
                  return (
                    <tr key={e.id}
                      style={{ background: stale ? 'var(--st-danger-bg)' : undefined }}>
                      <td style={{ width: 12, padding: '0 4px 0 14px' }}>
                        {stale && (
                          <I.AlertTriangle size={14}
                            style={{ color: 'var(--st-danger-fg)', display: 'block' }} />
                        )}
                      </td>
                      <td>
                        <div className="cell-client">
                          <div className="name">{e.client_name}</div>
                          {e.internal_id && (
                            <div className="qno">{e.internal_id}</div>
                          )}
                        </div>
                      </td>
                      <td>
                        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)' }}>
                          {e.phone_number || '—'}
                        </span>
                      </td>
                      <td>
                        <div className="cell-product">
                          {e.product_description || e.notes?.substring(0, 80) || '—'}
                        </div>
                      </td>
                      <td style={{ whiteSpace: 'nowrap' }}>
                        {SRC_ICON[e.enquiry_source]} {e.enquiry_source}
                      </td>
                      <td>
                        <select
                          value={e.assigned_to || 'Vijay'}
                          onChange={ev => { sbFetch(`enquiries?id=eq.${e.id}`, { method:'PATCH', body: JSON.stringify({ assigned_to: ev.target.value }) }); reload(); }}
                          className="input-sm"
                          style={{ height:28, fontSize:12, padding:'0 8px', minWidth:90 }}
                          onClick={ev => ev.stopPropagation()}>
                          {(window._staff || ['Vijay','Ramya','Manikandan']).map(s => (
                            <option key={s.id||s} value={s.name||s}>{s.name||s}</option>
                          ))}
                        </select>
                      </td>
                      <td>
                        <select
                          value={e.status}
                          onChange={ev => updateStatus(e.id, ev.target.value)}
                          className={`badge ${ST_CLS[e.status] || 'badge-open'}`}
                          style={{
                            border: 'none', cursor: 'pointer',
                            appearance: 'auto', fontWeight: 700,
                          }}>
                          {STATUSES.map(s => (
                            <option key={s} value={s}>{s.toUpperCase()}</option>
                          ))}
                        </select>
                      </td>
                      <td>
                        <span className={`nudge ${stale ? 'urgent' : ''}`}>
                          {timeSince(e.created_at)}
                        </span>
                      </td>
                      <td>
                        <span style={{ fontSize: 12, color: 'var(--text-3)', fontVariantNumeric: 'tabular-nums' }}>
                          {e.response_time_hours != null
                            ? `${Number(e.response_time_hours).toFixed(1)}h`
                            : '—'}
                        </span>
                      </td>
                      <td>
                        <div style={{ display: 'flex', gap: 5 }}>
                          <button className="ra-btn btn-sm"
                            onClick={() => { setEditTarget(e); setShowModal(true); }}>
                            <I.Edit /> Edit
                          </button>
                          <button className="ra-btn ra-danger btn-sm"
                            onClick={() => deleteEnq(e.id)}>
                            <I.Trash />
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Add / Edit modal */}
      {showModal && (
        <EnquiryModal
          initial={editTarget}
          onSave={saveEnquiry}
          onClose={() => { setShowModal(false); setEditTarget(null); }}
          saving={saving}
          sources={SOURCES}
          statuses={STATUSES}
        />
      )}
    </div>
  );
};

/* ── Enquiry add/edit modal ──────────────────────────────── */
const EnquiryModal = ({ initial, onSave, onClose, saving, sources, statuses }) => {
  const [form, setForm] = React.useState({
    client_name:         initial?.client_name         || '',
    phone_number:        initial?.phone_number        || '',
    email:               initial?.email               || '',
    enquiry_source:      initial?.enquiry_source      || 'Phone',
    product_description: initial?.product_description || '',
    notes:               initial?.notes               || '',
    status:              initial?.status              || 'Pending',
    assigned_to:         initial?.assigned_to         || 'Vijay',
  });
  const [clientMode, setClientMode] = React.useState(initial?.client_name ? 'existing' : 'existing');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const staffNames = (window._staff || []).map(s => s.name).filter(Boolean);
  const staffOpts = staffNames.length > 0 ? staffNames : ['Vijay', 'Ramya', 'Manikandan'];
  const companies = window._companies || [];

  const selectCompany = (companyId) => {
    const co = companies.find(c => c.id === companyId);
    if (!co) { set('client_name', ''); set('phone_number', ''); return; }
    set('client_name', co.company_name);
    // Auto-fill primary contact phone
    const contacts = Array.isArray(co.contacts) ? co.contacts : [];
    const primary = contacts.find(c => c.is_primary) || contacts[0];
    if (primary?.phone) set('phone_number', primary.phone);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 480 }}>
        <div className="modal-h">
          <div className="modal-t">{initial ? 'Edit Enquiry' : 'Log New Enquiry'}</div>
          <button className="modal-x" onClick={onClose}><I.X /></button>
        </div>
        <div className="modal-body">
          <div className="section">Client</div>
          {/* Client mode toggle */}
          <div style={{ display:'flex', gap:6, marginBottom:10 }}>
            <button className={`btn btn-sm ${clientMode==='existing'?'btn-primary':'btn-ghost'}`} onClick={()=>setClientMode('existing')}>Existing Client</button>
            <button className={`btn btn-sm ${clientMode==='new'?'btn-primary':'btn-ghost'}`} onClick={()=>setClientMode('new')}>New Client</button>
          </div>
          {clientMode === 'existing' ? (
            <div className="field" style={{ marginBottom:10 }}>
              <label className="field-label">Select Client</label>
              <select className="input" value={companies.find(c=>c.company_name===form.client_name)?.id||''}
                onChange={e => selectCompany(e.target.value)}>
                <option value="">— Select a client —</option>
                {companies.filter(c=>c.is_active!==false).map(c=>(
                  <option key={c.id} value={c.id}>{c.company_name}{c.city ? ` · ${c.city}` : ''}</option>
                ))}
              </select>
            </div>
          ) : (
            <div className="field" style={{ marginBottom:10 }}>
              <label className="field-label">Client Name *</label>
              <input className="input" value={form.client_name}
                onChange={e => set('client_name', e.target.value)}
                placeholder="M/s Example Industries" />
            </div>
          )}
          <div className="modal-row">
            <div className="field">
              <label className="field-label">Phone Number</label>
              {clientMode === 'existing' && (companies.find(c=>c.company_name===form.client_name)?.contacts||[]).length > 1 ? (
                <select className="input" value={form.phone_number} onChange={e=>set('phone_number', e.target.value)}>
                  <option value="">— Select contact —</option>
                  {(companies.find(c=>c.company_name===form.client_name)?.contacts||[]).map(ct=>(
                    <option key={ct.id} value={ct.phone||''}>{ct.name}{ct.phone ? ` · ${ct.phone}` : ''}</option>
                  ))}
                </select>
              ) : (
                <input className="input" value={form.phone_number}
                  onChange={e => set('phone_number', e.target.value)}
                  placeholder="9876543210" />
              )}
            </div>
            <div className="field">
              <label className="field-label">Source</label>
              <select className="input" value={form.enquiry_source}
                onChange={e => set('enquiry_source', e.target.value)}>
                {sources.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="field" style={{ marginBottom: 12 }}>
            <label className="field-label">Assign To</label>
            <select className="input" value={form.assigned_to}
              onChange={e => set('assigned_to', e.target.value)}>
              {staffOpts.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="section">Requirements</div>
          <div className="field" style={{ marginBottom: 12 }}>
            <label className="field-label">What They Want</label>
            <input className="input" value={form.product_description}
              onChange={e => set('product_description', e.target.value)}
              placeholder="LT Panel 400A 8 ways / CT Solar meter / Transformer…" />
          </div>
          <div className="field" style={{ marginBottom: 12 }}>
            <label className="field-label">Notes</label>
            <textarea className="input textarea" value={form.notes}
              onChange={e => set('notes', e.target.value)}
              style={{ minHeight: 64 }}
              placeholder="Urgency, referral source, any context…" />
          </div>
          {initial && (
            <>
              <div className="section">Status</div>
              <div className="field">
                <select className="input" value={form.status}
                  onChange={e => set('status', e.target.value)}>
                  {statuses.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
            </>
          )}
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={saving}
            onClick={() => {
              if (!form.client_name.trim()) return alert('Client name is required');
              onSave(form);
            }}>
            {saving
              ? <><I.Loader className="spin" /> Saving…</>
              : initial ? <><I.Check2 /> Update</> : <><I.Check2 /> Log Enquiry</>}
          </button>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { EnquiriesPage, EnquiryModal });
</script>

<script type="text/babel" data-name="clientRepPage">
/* ════════════════════════════════════════════════════════════════════
   CLIENT REPUTATION PAGE
   Groups all quotations by phone_number.
   Manikandan's mental blacklist — digitised.
   Flags: Good ✅ · Neutral ⚪ · Blacklisted ❌
   Notes: "only asks for rates", "M&M purchase dept — bad", etc.
   Blacklisted numbers trigger a warning in the upload flow.
   ════════════════════════════════════════════════════════════════════ */
const ClientRepPage = ({ quotes, reload }) => {
  const { useState, useMemo } = React;

  const [filterFlag, setFilterFlag] = useState('All');
  const [search, setSearch]         = useState('');
  const [editTarget, setEditTarget] = useState(null);
  const [saving, setSaving]         = useState(false);
  const [toast, setToast]           = useState(null);

  const FLAG = {
    Excellent:   { icon: '⭐', badgeCls: 'badge-delivered', label: 'EXCELLENT' },
    Good:        { icon: '✅', badgeCls: 'badge-po',        label: 'GOOD' },
    Neutral:     { icon: '⚪', badgeCls: 'badge-expired',   label: 'NEUTRAL' },
    Bad:         { icon: '⚠️', badgeCls: 'badge-follow',    label: 'BAD' },
    Blacklisted: { icon: '❌', badgeCls: 'badge-open',      label: 'BLACKLISTED' },
  };

  const showToast = (msg, err) => {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3000);
  };

  /* Group quotations by phone_number into unique client records */
  const clients = useMemo(() => {
    const map = {};
    quotes.forEach(q => {
      const phone = q.phone_number || 'unknown';
      if (!map[phone]) {
        map[phone] = {
          phone_number:  phone,
          client_name:   q.client_name,
          client_flag:   q.client_flag  || 'Neutral',
          client_notes:  q.client_notes || '',
          orders: 0, converted: 0, total_revenue: 0, last_order: null,
        };
      }
      const c = map[phone];
      c.orders++;
      c.total_revenue += parseFloat(q.amount_grand_total) || 0;
      if (!c.last_order || q.created_at > c.last_order) {
        c.last_order  = q.created_at;
        c.client_name = q.client_name;
        /* Most severe flag wins — precedence: Blacklisted > Bad > Neutral > Good > Excellent */
        const RANK = { Excellent:1, Good:2, Neutral:3, Bad:4, Blacklisted:5 };
        const newRank = RANK[q.client_flag] || 3;
        const curRank = RANK[c.client_flag] || 3;
        if (newRank > curRank) c.client_flag = q.client_flag;
        if (q.client_notes) c.client_notes = q.client_notes;
      }
      if (['PO Received','Dispatched','Delivered'].includes(q.workflow_status)) c.converted++;
    });
    return Object.values(map).sort((a, b) => b.total_revenue - a.total_revenue);
  }, [quotes]);

  const filtered = useMemo(() => clients.filter(c => {
    if (filterFlag !== 'All' && c.client_flag !== filterFlag) return false;
    if (search) {
      const q = search.toLowerCase();
      return (c.client_name || '').toLowerCase().includes(q)
          || (c.phone_number || '').includes(q);
    }
    return true;
  }), [clients, filterFlag, search]);

  const stats = useMemo(() => ({
    total: clients.length,
    good:  clients.filter(c => c.client_flag === 'Good').length,
    black: clients.filter(c => c.client_flag === 'Blacklisted').length,
  }), [clients]);

  const saveFlag = async (phone, flag, notes) => {
    setSaving(true);
    try {
      await sbFetch(`quotations?phone_number=eq.${phone}`, {
        method: 'PATCH',
        body: JSON.stringify({ client_flag: flag, client_notes: notes }),
      });
      showToast('Reputation updated ✓');
      setEditTarget(null);
      reload();
    } catch(e) { showToast('Save failed: ' + e.message, true); }
    setSaving(false);
  };

  return (
    <div>
      {toast && (
        <div style={{
          position: 'fixed', top: 20, right: 20, zIndex: 9999,
          background: toast.err ? 'var(--st-danger-fg)' : 'oklch(0.50 0.15 150)',
          color: '#fff', padding: '10px 18px',
          borderRadius: 'var(--radius-sm)', fontSize: 13, fontWeight: 600,
          boxShadow: 'var(--shadow-lg)',
        }}>
          {toast.msg}
        </div>
      )}

      <div className="page-head">
        <div>
          <div className="page-title">Clients</div>
          <div className="page-sub">
            Reputation flags — Good ✅ · Neutral ⚪ · Blacklisted ❌ · Warning shown on quote upload for blacklisted numbers
          </div>
        </div>
      </div>

      <div className="metrics" style={{ gridTemplateColumns: 'repeat(3,1fr)' }}>
        <Metric label="Total Clients" value={stats.total}
          sub="Unique phone numbers" accent="slate" icon={<I.Building />} />
        <Metric label="Good ✅" value={stats.good}
          sub="VIP customers" accent="green" icon={<I.Star />} />
        <Metric label="Blacklisted ❌" value={stats.black}
          sub={stats.black ? 'Warning on quote upload' : 'None flagged'}
          accent={stats.black ? 'red' : 'slate'} icon={<I.AlertCircle />} />
      </div>

      {stats.black > 0 && (
        <div className="alert" style={{ marginBottom: 16 }}>
          <I.AlertCircle />
          <span>
            {stats.black} blacklisted client{stats.black > 1 ? 's' : ''} — a warning will appear when uploading quotes for these numbers
          </span>
        </div>
      )}

      <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <div className="search-sm" style={{ flex: 1, minWidth: 180 }}>
          <I.Search />
          <input className="input-sm" placeholder="Search client name or phone…"
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {['All','Excellent','Good','Neutral','Bad','Blacklisted'].map(f => (
          <button key={f} className={`btn btn-sm ${filterFlag === f ? 'btn-primary' : 'btn-ghost'}`}
            onClick={() => setFilterFlag(f)}>
            {f}
          </button>
        ))}
      </div>

      <div className="panel" style={{ padding: 0 }}>
        {filtered.length === 0 ? (
          <div className="empty">
            <I.Building />
            <div className="et">No clients yet</div>
            <div className="es">
              Clients appear here once quotations with phone numbers are uploaded.
              Upload a PDF quote with a phone number to see them here.
            </div>
          </div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead>
                <tr>
                  <th>Flag</th>
                  <th>Client</th>
                  <th>Phone</th>
                  <th style={{ textAlign: 'center' }}>Quotes</th>
                  <th style={{ textAlign: 'center' }}>POs</th>
                  <th>Revenue</th>
                  <th>Last Quote</th>
                  <th>Notes</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(c => {
                  const fc = FLAG[c.client_flag] || FLAG.Neutral;
                  return (
                    <tr key={c.phone_number}
                      style={{ background: c.client_flag === 'Blacklisted' ? 'var(--st-danger-bg)' : undefined }}>
                      <td>
                        <span className={`badge ${fc.badgeCls}`}>
                          {fc.icon} {fc.label}
                        </span>
                      </td>
                      <td>
                        <div className="cell-client">
                          <div className="name">{c.client_name}</div>
                        </div>
                      </td>
                      <td>
                        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)' }}>
                          {c.phone_number}
                        </span>
                      </td>
                      <td style={{ textAlign: 'center' }}>{c.orders}</td>
                      <td style={{ textAlign: 'center', color: 'var(--st-po-fg)', fontWeight: 600 }}>
                        {c.converted}
                      </td>
                      <td><span className="amt">{fmtINR(c.total_revenue)}</span></td>
                      <td style={{ color: 'var(--text-2)', fontSize: 12 }}>
                        {c.last_order ? fmtDate(c.last_order) : '—'}
                      </td>
                      <td style={{
                        maxWidth: 180, overflow: 'hidden',
                        textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                        color: 'var(--text-2)', fontSize: 12,
                      }}>
                        {c.client_notes || '—'}
                      </td>
                      <td>
                        <button className="ra-btn btn-sm"
                          onClick={() => setEditTarget(c)}>
                          <I.Edit /> Edit
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {editTarget && (
        <ClientFlagModal
          client={editTarget}
          flagConfig={FLAG}
          onSave={saveFlag}
          onClose={() => setEditTarget(null)}
          saving={saving}
        />
      )}
    </div>
  );
};

/* ── Client flag edit modal ──────────────────────────────── */
const ClientFlagModal = ({ client, flagConfig, onSave, onClose, saving }) => {
  const [flag,  setFlag]  = React.useState(client.client_flag  || 'Neutral');
  const [notes, setNotes] = React.useState(client.client_notes || '');

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 420 }}>
        <div className="modal-h">
          <div>
            <div className="modal-t">{client.client_name}</div>
            <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 2, fontFamily: 'var(--mono)' }}>
              {client.phone_number}
            </div>
          </div>
          <button className="modal-x" onClick={onClose}><I.X /></button>
        </div>
        <div className="modal-body">
          <div className="section">Reputation Flag</div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
            {Object.entries(flagConfig).map(([k, fc]) => (
              <button key={k}
                onClick={() => setFlag(k)}
                style={{
                  flex: 1, padding: '10px 8px',
                  borderRadius: 'var(--radius-sm)',
                  fontSize: 12, fontWeight: 700, cursor: 'pointer',
                  border: `2px solid ${flag === k ? 'var(--accent)' : 'var(--border-strong)'}`,
                  background: flag === k ? 'var(--accent-soft)' : 'transparent',
                  color: flag === k ? 'var(--accent)' : 'var(--text-2)',
                  transition: 'var(--transition)',
                }}>
                {fc.icon} {k}
              </button>
            ))}
          </div>
          <div className="section">Notes / Reason</div>
          <div className="field">
            <textarea className="input textarea" value={notes}
              onChange={e => setNotes(e.target.value)}
              style={{ minHeight: 88 }}
              placeholder={`"Only asks for rates, never orders"\n"Aggressive negotiator — M&M purchase dept"\n"VIP — always pays 100% advance"`} />
          </div>
          {flag === 'Blacklisted' && (
            <div className="info-note" style={{
              background: 'var(--st-danger-bg)',
              borderColor: 'var(--st-danger-bd)',
              color: 'var(--st-danger-fg)',
              marginTop: 10,
            }}>
              <I.AlertCircle />
              <span>A red warning will appear when uploading future quotes for this number</span>
            </div>
          )}
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={saving}
            onClick={() => onSave(client.phone_number, flag, notes)}>
            {saving ? <><I.Loader className="spin" /> Saving…</> : <><I.Check2 /> Save</>}
          </button>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { ClientRepPage, ClientFlagModal });
</script>

<script type="text/babel" data-name="poConfirmPage">
/* ════════════════════════════════════════════════════════════════════
   PO CONFIRMATION PAGE
   Sits between Converted POs and Orders.
   
   What it does: After a client sends their PO, Sakthi sends back a
   signed acknowledgement with their own T&C (price, delivery, payment
   terms). The client confirms by making the advance payment.
   
   From Voice_140 (1:09:44): "PO confirmation is a must. Because
   customer PO அனுப்பிச்சல்ல customerகே தெரியாது — we are confirmed
   or not. அந்த POயே seal வச்சு sign பண்ணி அவங்களுக்கு அனுப்புவோம்."
   
   Status flow:
   PO Received → [Send Confirmation] → Awaiting Client Ack → [Client pays] → Confirmed
   ════════════════════════════════════════════════════════════════════ */
const POConfirmPage = ({ quotes, reload, setPage }) => {
  const { useState, useMemo } = React;
  const [sending, setSending] = useState(null);
  const [toast, setToast]     = useState(null);

  const showToast = (msg, err) => {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3500);
  };

  /* Only show PO Received quotes */
  const poQuotes = useMemo(() =>
    quotes.filter(q => q.workflow_status === 'PO Received')
          .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
  , [quotes]);

  const pendingCount = poQuotes.filter(q => !q.po_confirmation_sent).length;

  const buildConfirmMsg = (q) => {
    const ref   = q.internal_id || q.quote_number || '';
    const prod  = q.product_name || 'your order';
    const amt   = q.amount_grand_total ? `₹${parseFloat(q.amount_grand_total).toLocaleString('en-IN')}` : '(as per quotation)';
    const days  = q.delivery_days || 21;
    const name  = q.contact_person || q.client_name || 'Sir/Madam';
    return (
      `Dear ${name},\n\n` +
      `We confirm receipt of your Purchase Order. ✅\n\n` +
      `*Order Ref:* ${ref}\n` +
      `*Product:* ${prod}\n` +
      `*Amount:* ${amt} (+ 18% GST)\n\n` +
      `*Our Terms & Conditions:*\n` +
      `1️⃣ *Payment:* 100% Advance required before production begins.\n` +
      `   _(WITHOUT PAYMENT ORDER WILL NOT BE PROCESSED)_\n` +
      `2️⃣ *Delivery:* ${days} working days from date of payment receipt.\n` +
      `3️⃣ *Price:* Ex-Factory, Madurai. Freight at your scope.\n` +
      `4️⃣ *Validity:* Subject to availability of raw materials.\n\n` +
      `*Bank Details for Payment:*\n` +
      `Bank: State Bank of India, K.K Nagar, Trichy\n` +
      `A/c No: *39432294728*\n` +
      `IFSC: *SBIN0012801*\n` +
      `Name: Sakthi Electricals\n\n` +
      `Please confirm acceptance by making the advance payment at your earliest.\n\n` +
      `For queries: 97152 11788 / 70101 70008\n\n` +
      `Warm Regards,\nR. Manikandan, B.E.,\nManaging Director\n*Sakthi Electricals* (ISO 9001 Certified)`
    );
  };

  const sendConfirmation = async (q) => {
    if (!q.phone_number) {
      return showToast('No phone number on this quote — edit the quote first.', true);
    }
    if (!confirm(`Send PO Confirmation to ${q.client_name} (+91 ${q.phone_number})?\n\nThis will send your T&C and bank details via WhatsApp.`)) return;

    setSending(q.id);
    try {
      const msg  = buildConfirmMsg(q);
      const evUrl = 'https://evolution-api-production-59de.up.railway.app/message/sendText/Sakthi';
      const evKey = 'b2bd75f77678fa9a68d872be9b3791e6f6133f0e16f653fc99b8cc37663ad123';

      /* Send to client */
      await fetch(evUrl, {
        method: 'POST',
        headers: { apikey: evKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ number: '91' + q.phone_number, text: msg }),
      });

      /* GOD copy to Manikandan */
      const godMsg =
        `✅ *PO Confirmation Sent*\n\n` +
        `Client: ${q.client_name}\n` +
        `Order: ${q.internal_id || q.quote_number}\n` +
        `Amount: ₹${parseFloat(q.amount_grand_total || 0).toLocaleString('en-IN')}\n\n` +
        `T&C and bank details sent. Waiting for advance payment.`;

      await fetch(evUrl, {
        method: 'POST',
        headers: { apikey: evKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ number: '918925086989', text: godMsg }),
      });

      /* Mark confirmation sent in Supabase */
      await sbFetch(`quotations?id=eq.${q.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ po_confirmation_sent: true, po_confirmation_date: new Date().toISOString() }),
      });

      showToast(`Confirmation sent to ${q.client_name} ✓`);
      reload();
    } catch(e) {
      showToast('Send failed: ' + e.message, true);
    }
    setSending(null);
  };

  const previewMsg = (q) => alert(buildConfirmMsg(q).replace(/\n/g, '\n'));

  return (
    <div>
      {toast && (
        <div style={{
          position: 'fixed', top: 20, right: 20, zIndex: 9999,
          background: toast.err ? 'var(--st-danger-fg)' : 'oklch(0.50 0.15 150)',
          color: '#fff', padding: '10px 18px', borderRadius: 'var(--radius-sm)',
          fontSize: 13, fontWeight: 600, boxShadow: 'var(--shadow-lg)',
        }}>{toast.msg}</div>
      )}

      <div className="page-head">
        <div>
          <div className="page-title">PO Confirmation</div>
          <div className="page-sub">
            After receiving a PO — send your signed T&amp;C acknowledgement to the client.
            They confirm by making the 100% advance payment.
          </div>
        </div>
      </div>

      <div className="metrics" style={{ gridTemplateColumns: 'repeat(3,1fr)', marginBottom: 20 }}>
        <Metric label="POs Received" value={poQuotes.length}
          sub="Awaiting confirmation" accent="blue" icon={<I.Check2 />} />
        <Metric label="Pending Confirmation" value={pendingCount}
          sub={pendingCount ? 'Send T&C to client' : 'All confirmed'}
          accent={pendingCount ? 'amber' : 'slate'} icon={<I.AlertCircle />} />
        <Metric label="Confirmed" value={poQuotes.filter(q => q.po_confirmation_sent).length}
          sub="T&C sent, awaiting payment" accent="green" icon={<I.CheckCircle />} />
      </div>

      {pendingCount > 0 && (
        <div className="alert" style={{ marginBottom: 16 }}>
          <I.AlertTriangle />
          <span>
            {pendingCount} PO{pendingCount > 1 ? 's' : ''} waiting — send your T&amp;C confirmation so the client knows their order is accepted and can make payment
          </span>
        </div>
      )}

      {/* How it works */}
      <div className="panel" style={{ marginBottom: 18 }}>
        <div className="panel-h">
          <div className="panel-h-l">
            <div className="panel-title">How PO Confirmation Works</div>
          </div>
        </div>
        <div className="panel-body">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14 }}>
            {[
              { n:'1', t:'Client sends PO', s:'Via WhatsApp, email, or hard copy', c:'var(--accent)' },
              { n:'2', t:'You send confirmation', s:'Your T&C, delivery timeline, bank details', c:'oklch(0.55 0.14 70)' },
              { n:'3', t:'Client accepts', s:'Makes 100% advance payment', c:'oklch(0.50 0.15 150)' },
              { n:'4', t:'Production begins', s:'Work order created, delivery in 21 days', c:'oklch(0.50 0.14 200)' },
            ].map(step => (
              <div key={step.n} style={{
                background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)',
                padding: '14px 16px', borderLeft: `3px solid ${step.c}`,
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: step.c, marginBottom: 4 }}>STEP {step.n}</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{step.t}</div>
                <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 3 }}>{step.s}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* PO Table */}
      <div className="panel" style={{ padding: 0 }}>
        {poQuotes.length === 0 ? (
          <div className="empty">
            <I.Check2 />
            <div className="et">No POs received yet</div>
            <div className="es">Once a client sends payment and WF-04 detects it, the quote moves to PO Received and appears here.</div>
          </div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Order</th>
                  <th>Product</th>
                  <th>Amount</th>
                  <th>PO Date</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {poQuotes.map(q => {
                  const confirmed = q.po_confirmation_sent;
                  return (
                    <tr key={q.id}
                      style={{ background: !confirmed ? 'color-mix(in oklab, oklch(0.65 0.14 70) 6%, var(--surface))' : undefined }}>
                      <td>
                        <div className="cell-client">
                          <div className="name">{q.client_name}</div>
                          {q.contact_person && <div className="contact">{q.contact_person}</div>}
                        </div>
                      </td>
                      <td>
                        <span style={{ fontFamily: 'var(--mono)', fontSize: 12 }}>
                          {q.internal_id || q.quote_number}
                        </span>
                      </td>
                      <td>
                        <div className="cell-product">{q.product_name || '—'}</div>
                      </td>
                      <td>
                        <span className="amt">{fmtINR(q.amount_grand_total)}</span>
                      </td>
                      <td style={{ color: 'var(--text-2)', fontSize: 12 }}>
                        {fmtDate(q.payment_received_date || q.updated_at)}
                      </td>
                      <td>
                        {confirmed ? (
                          <span className="badge badge-po">
                            ✓ T&amp;C Sent {q.po_confirmation_date ? fmtDate(q.po_confirmation_date) : ''}
                          </span>
                        ) : (
                          <span className="badge badge-follow">⏳ Confirmation Pending</span>
                        )}
                      </td>
                      <td>
                        <div style={{ display: 'flex', gap: 6 }}>
                          <button className="ra-btn btn-sm"
                            onClick={() => previewMsg(q)}
                            title="Preview message">
                            <I.Eye /> Preview
                          </button>
                          {!confirmed && (
                            <button
                              className="ra-btn ra-po btn-sm"
                              disabled={sending === q.id || !q.phone_number}
                              onClick={() => sendConfirmation(q)}
                              title={!q.phone_number ? 'No phone number — edit quote first' : 'Send T&C confirmation'}>
                              {sending === q.id
                                ? <><I.Loader className="spin" /> Sending…</>
                                : <><I.Send /> Send T&amp;C</>}
                            </button>
                          )}
                          {confirmed && (
                            <button className="ra-btn btn-sm"
                              onClick={() => sendConfirmation(q)}
                              title="Resend confirmation">
                              <I.Refresh /> Resend
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};

Object.assign(window, { POConfirmPage });
</script>


<script type="text/babel" data-name="companiesPage">
const FLAG_CFG = {
  Excellent:   { icon: '⭐', cls: 'badge-delivered', label: 'EXCELLENT' },
  Good:        { icon: '✅', cls: 'badge-po',        label: 'GOOD' },
  Neutral:     { icon: '⚪', cls: 'badge-expired',   label: 'NEUTRAL' },
  Bad:         { icon: '⚠️', cls: 'badge-follow',    label: 'BAD' },
  Blacklisted: { icon: '❌', cls: 'badge-open',      label: 'BLACKLISTED' },
};

const CompaniesPage = ({ companies, quotes, invoices, enquiries = [], reload }) => {
  const { useState, useMemo } = React;
  const [expanded, setExpanded] = useState(null);
  const [search, setSearch]     = useState('');
  const [flagFilter, setFlagFilter] = useState('All');
  const [showActive, setShowActive] = useState(true);
  // Edit company notes/flag
  const [editId, setEditId]     = useState(null);
  const [editNotes, setEditNotes] = useState('');
  const [editFlag, setEditFlag] = useState('Neutral');
  // Edit company basic fields
  const [editCoModal, setEditCoModal] = useState(null);
  const [editCoForm, setEditCoForm]   = useState({});
  // Contact management
  const [contactModal, setContactModal] = useState(null); // { companyId, contact|null }
  const [contactForm, setContactForm]   = useState({ name:'', designation:'', phone:'', email:'', is_primary:false });
  const [saving, setSaving]     = useState(false);
  const [addModal, setAddModal] = useState(false);
  const [newCo, setNewCo]       = useState({ company_name:'', industry:'', city:'', state:'Tamil Nadu', client_flag:'Neutral', client_notes:'', is_credit_customer:false, credit_days:0 });
  const [newContacts, setNewContacts] = useState([{ name:'', designation:'', phone:'', email:'', is_primary:true }]);
  const [toast, setToast]       = useState(null);

  const showToast = (msg, err) => { setToast({msg,err}); setTimeout(()=>setToast(null),3000); };

  const addContact = () => setNewContacts(c => [...c, { name:'', designation:'', phone:'', email:'', is_primary:false }]);
  const removeContact = (i) => setNewContacts(c => c.filter((_,idx) => idx !== i));
  const updateContact = (i, field, val) => setNewContacts(c => c.map((ct,idx) => idx===i ? {...ct,[field]:val} : ct));

  const activeCompanies   = useMemo(() => companies.filter(c => c.is_active !== false), [companies]);
  const inactiveCompanies = useMemo(() => companies.filter(c => c.is_active === false), [companies]);

  const displayList = showActive ? activeCompanies : inactiveCompanies;

  const filtered = useMemo(() => {
    let rows = [...displayList];
    if (flagFilter !== 'All') rows = rows.filter(c => c.client_flag === flagFilter);
    if (search) rows = rows.filter(c =>
      (c.company_name||'').toLowerCase().includes(search.toLowerCase()) ||
      (c.city||'').toLowerCase().includes(search.toLowerCase())
    );
    return rows;
  }, [displayList, flagFilter, search]);

  const coQuotes = (cid) => quotes.filter(q => q.company_id === cid);
  const coTotal  = (cid) => coQuotes(cid).filter(q => q.payment_received).reduce((s,q)=>s+parseFloat(q.amount_grand_total||0),0);
  const coEnquiries = (co) => {
    const phones = (Array.isArray(co.contacts) ? co.contacts : []).map(c => c.phone).filter(Boolean);
    return enquiries.filter(e => phones.includes(e.phone_number) || e.company_id === co.id);
  };

  const saveEdit = async () => {
    setSaving(true);
    try {
      await sbFetch(`companies?id=eq.${editId}`, { method:'PATCH', body: JSON.stringify({ client_flag:editFlag, client_notes:editNotes }) });
      showToast('Updated ✓'); setEditId(null); reload();
    } catch(e) { showToast(e.message,true); }
    setSaving(false);
  };

  const saveCoEdit = async () => {
    if (!editCoForm.company_name?.trim()) return showToast('Company name required', true);
    setSaving(true);
    try {
      await sbFetch(`companies?id=eq.${editCoModal.id}`, { method:'PATCH', body: JSON.stringify(editCoForm) });
      showToast('Company updated ✓'); setEditCoModal(null); reload();
    } catch(e) { showToast(e.message,true); }
    setSaving(false);
  };

  const deleteCompany = async (co) => {
    const qs = coQuotes(co.id);
    if (qs.length > 0) {
      alert(`Cannot delete ${co.company_name} — it has ${qs.length} linked quotation${qs.length !== 1 ? 's' : ''}. Archive it instead by editing the rating, or delete the quotations first.`);
      return;
    }
    if (!confirm(`Permanently delete ${co.company_name}? This cannot be undone.`)) return;
    try {
      await sbFetch(`companies?id=eq.${co.id}`, { method:'DELETE' });
      showToast('Deleted ✓'); reload();
    } catch(e) { showToast(e.message, true); }
  };

  const archiveCompany = async (co) => {
    if (!confirm(`Archive ${co.company_name}? It will be moved to the Archived tab. Quotation history is preserved.`)) return;
    try {
      await sbFetch(`companies?id=eq.${co.id}`, { method:'PATCH', body: JSON.stringify({ is_active: false }) });
      showToast(`${co.company_name} archived`); reload();
    } catch(e) { showToast(e.message, true); }
  };

  const unarchiveCompany = async (co) => {
    try {
      await sbFetch(`companies?id=eq.${co.id}`, { method:'PATCH', body: JSON.stringify({ is_active: true }) });
      showToast(`${co.company_name} restored ✓`); reload();
    } catch(e) { showToast(e.message, true); }
  };

  const saveContact = async () => {
    if (!contactForm.name.trim()) return showToast('Contact name required', true);
    const normalizedPhone = contactForm.phone
      ? String(contactForm.phone).replace(/\D/g, '').replace(/^91/, '').slice(-10)
      : '';
    const payload = { ...contactForm, phone: normalizedPhone || contactForm.phone };
    setSaving(true);
    try {
      if (contactModal.contact) {
        await sbFetch(`contacts?id=eq.${contactModal.contact.id}`, { method:'PATCH', body: JSON.stringify(payload) });
        showToast('Contact updated ✓');
      } else {
        await sbFetch('contacts', { method:'POST', body: JSON.stringify({ ...payload, company_id: contactModal.companyId }) });
        showToast('Contact added ✓');
      }
      setContactModal(null);
      setContactForm({ name:'', designation:'', phone:'', email:'', is_primary:false });
      reload();
    } catch(e) { showToast(e.message, true); }
    setSaving(false);
  };

  const deleteContact = async (ct) => {
    if (!confirm(`Delete contact ${ct.name}? This cannot be undone.`)) return;
    try {
      await sbFetch(`contacts?id=eq.${ct.id}`, { method:'DELETE' });
      showToast('Contact deleted'); reload();
    } catch(e) { showToast(e.message, true); }
  };

  const saveNew = async () => {
    if (!newCo.company_name.trim()) return showToast('Company name required',true);
    setSaving(true);
    try {
      const res = await sbFetch('companies', { method:'POST', body: JSON.stringify(newCo) });
      const company = Array.isArray(res) ? res[0] : res;
      const validContacts = newContacts.filter(c => c.name.trim());
      for (const ct of validContacts) {
        const normalizedPhone = ct.phone
