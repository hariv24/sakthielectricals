          ? String(ct.phone).replace(/\D/g, '').replace(/^91/, '').slice(-10)
          : '';
        await sbFetch('contacts', { method:'POST', body: JSON.stringify({ ...ct, phone: normalizedPhone || ct.phone, company_id: company.id }) });
      }
      showToast(`${newCo.company_name} added ✓`);
      setAddModal(false);
      setNewCo({ company_name:'', industry:'', city:'', state:'Tamil Nadu', client_flag:'Neutral', client_notes:'', is_credit_customer:false, credit_days:0 });
      setNewContacts([{ name:'', designation:'', phone:'', email:'', is_primary:true }]);
      reload();
    } catch(e) { showToast(e.message,true); }
    setSaving(false);
  };

  return (
    <div>
      {toast && <div style={{ position:'fixed',top:20,right:20,zIndex:9999,background:toast.err?'var(--st-danger-fg)':'oklch(0.50 0.15 150)',color:'#fff',padding:'10px 18px',borderRadius:'var(--radius-sm)',fontSize:13,fontWeight:600,boxShadow:'var(--shadow-lg)' }}>{toast.msg}</div>}
      <div className="page-head">
        <div>
          <div className="page-title">Clients</div>
          <div className="page-sub">All companies, contacts, order history and ratings</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setAddModal(true)}><I.Plus /> Add Client</button>
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
        <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{ width:200, height:32, fontSize:13 }} />
        {['All','Excellent','Good','Neutral','Bad','Blacklisted'].map(f=>(
          <button key={f} className={`btn btn-sm ${flagFilter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFlagFilter(f)}>{f}</button>
        ))}
        <div style={{ marginLeft:'auto', display:'flex', gap:6 }}>
          <button className={`btn btn-sm ${showActive?'btn-primary':'btn-ghost'}`} onClick={()=>setShowActive(true)}>Active ({activeCompanies.length})</button>
          {inactiveCompanies.length > 0 && <button className={`btn btn-sm ${!showActive?'btn-primary':'btn-ghost'}`} onClick={()=>setShowActive(false)}>Archived ({inactiveCompanies.length})</button>}
        </div>
      </div>
      <div className="panel" style={{ padding:0 }}>
        {filtered.length === 0 ? (
          <div className="empty"><I.Building /><div className="et">No clients yet</div><div className="es">Add a client manually or link a quotation to a company.</div></div>
        ) : filtered.map(co => {
          const f = FLAG_CFG[co.client_flag] || FLAG_CFG.Neutral;
          const qs = coQuotes(co.id);
          const total = coTotal(co.id);
          const contacts = Array.isArray(co.contacts) ? co.contacts : [];
          const isExp = expanded === co.id;
          return (
            <div key={co.id} style={{ borderBottom:'1px solid var(--border)' }}>
              <div style={{ padding:'14px 20px', display:'flex', alignItems:'center', gap:12, cursor:'pointer', background:isExp?'var(--surface-2)':undefined }} onClick={()=>setExpanded(isExp?null:co.id)}>
                <div style={{ width:34, height:34, borderRadius:8, background:'var(--accent-soft)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0 }}>{f.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, fontSize:15 }}>{co.company_name}</div>
                  <div style={{ fontSize:12, color:'var(--text-3)', marginTop:2 }}>
                    {[co.industry, co.city && `${co.city}, ${co.state}`].filter(Boolean).join(' · ')}
                    {co.is_credit_customer && <span style={{ marginLeft:8, color:'var(--accent)', fontWeight:600 }}>Credit {co.credit_days}d</span>}
                  </div>
                </div>
                <div style={{ textAlign:'right', flexShrink:0 }}>
                  <div style={{ fontSize:15, fontWeight:700, fontVariantNumeric:'tabular-nums' }}>{fmtINR(total)}</div>
                  <div style={{ fontSize:11, color:'var(--text-3)' }}>{qs.length} order{qs.length!==1?'s':''}</div>
                </div>
                <span className={`badge ${f.cls}`}>{f.label}</span>
                <I.ChevronDown style={{ width:15,height:15,color:'var(--text-3)',transform:isExp?'rotate(180deg)':undefined,transition:'transform 0.2s',flexShrink:0 }} />
              </div>
              {isExp && (
                <div style={{ background:'var(--surface-2)', borderTop:'1px solid var(--border)', padding:'14px 20px' }}>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
                    <div>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
                        <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-3)' }}>Contacts ({contacts.length})</div>
                        <button className="btn btn-ghost btn-xs" onClick={e=>{ e.stopPropagation(); setContactForm({ name:'', designation:'', phone:'', email:'', is_primary:false }); setContactModal({ companyId: co.id, contact: null }); }}>
                          <I.Plus /> Add
                        </button>
                      </div>
                      {contacts.length === 0 ? <div style={{ fontSize:13,color:'var(--text-3)' }}>None added</div> : contacts.map(ct=>(
                        <div key={ct.id} style={{ display:'flex',alignItems:'center',gap:8,padding:'7px 10px',background:'var(--surface)',borderRadius:'var(--radius-sm)',marginBottom:5,border:'1px solid var(--border)' }}>
                          <div style={{ width:26,height:26,borderRadius:'50%',background:'var(--accent-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--accent)',flexShrink:0 }}>{ct.name.charAt(0)}</div>
                          <div style={{ flex:1,minWidth:0 }}>
                            <div style={{ fontSize:13,fontWeight:600 }}>{ct.name}{ct.is_primary&&<span style={{ marginLeft:6,fontSize:10,color:'var(--accent)',fontWeight:700 }}>PRIMARY</span>}</div>
                            <div style={{ fontSize:11,color:'var(--text-3)' }}>{ct.designation}</div>
                          </div>
                          <div style={{ fontSize:12,fontFamily:'var(--mono)',color:'var(--text-2)' }}>{ct.phone||'—'}</div>
                          <button className="btn btn-ghost btn-xs" onClick={e=>{ e.stopPropagation(); setContactForm({ name:ct.name||'', designation:ct.designation||'', phone:ct.phone||'', email:ct.email||'', is_primary:ct.is_primary||false }); setContactModal({ companyId:co.id, contact:ct }); }} title="Edit contact"><I.Edit /></button>
                          <button className="btn btn-ghost btn-xs" onClick={e=>{ e.stopPropagation(); deleteContact(ct); }} title="Delete contact" style={{ color:'var(--st-danger-fg)' }}><I.Trash /></button>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:8 }}>Notes & Rating</div>
                      {editId===co.id ? (
                        <div>
                          <select className="input" value={editFlag} onChange={e=>setEditFlag(e.target.value)} style={{ marginBottom:6,width:'100%' }}>
                            {['Excellent','Good','Neutral','Bad','Blacklisted'].map(fl=><option key={fl}>{fl}</option>)}
                          </select>
                          <textarea className="input" value={editNotes} onChange={e=>setEditNotes(e.target.value)} rows={3} style={{ width:'100%',resize:'vertical',marginBottom:6 }} placeholder="Notes…" />
                          <div style={{ display:'flex',gap:6 }}>
                            <button className="btn btn-primary btn-sm" onClick={saveEdit} disabled={saving}>{saving?'Saving…':'Save'}</button>
                            <button className="btn btn-ghost btn-sm" onClick={()=>setEditId(null)}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <div>
                          <div style={{ fontSize:13,color:'var(--text-2)',lineHeight:1.6,marginBottom:8 }}>{co.client_notes||<span style={{ color:'var(--text-3)' }}>No notes yet</span>}</div>
                          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                            <button className="btn btn-ghost btn-sm" onClick={()=>{setEditId(co.id);setEditNotes(co.client_notes||'');setEditFlag(co.client_flag||'Neutral')}}><I.Edit /> Edit Notes</button>
                            <button className="btn btn-ghost btn-sm" onClick={e=>{ e.stopPropagation(); setEditCoForm({ company_name:co.company_name||'', industry:co.industry||'', city:co.city||'', state:co.state||'', is_credit_customer:co.is_credit_customer||false, credit_days:co.credit_days||0 }); setEditCoModal(co); }} title="Edit company details"><I.Edit /> Edit Company</button>
                            {co.is_active !== false ? (
                              <button className="btn btn-ghost btn-sm" onClick={e=>{ e.stopPropagation(); archiveCompany(co); }} style={{ color:'oklch(0.55 0.14 70)' }}><I.Package /> Archive</button>
                            ) : (
                              <button className="btn btn-ghost btn-sm" onClick={e=>{ e.stopPropagation(); unarchiveCompany(co); }} style={{ color:'oklch(0.50 0.15 150)' }}><I.Refresh /> Restore</button>
                            )}
                            <button className="btn btn-ghost btn-sm" onClick={e=>{ e.stopPropagation(); deleteCompany(co); }} style={{ color:'var(--st-danger-fg)' }}><I.Trash /> Delete</button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                  {(() => {
                    const enqs = coEnquiries(co);
                    if (enqs.length === 0) return null;
                    const statusColor = { Pending:'var(--st-open-fg)', Quoted:'var(--accent)', Converted:'oklch(0.50 0.15 150)', Closed:'var(--text-3)', Cancelled:'var(--st-danger-fg)' };
                    return (
                      <div style={{ marginBottom:14 }}>
                        <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:8 }}>Enquiries ({enqs.length})</div>
                        {enqs.map(e => (
                          <div key={e.id} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 10px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', marginBottom:4, fontSize:12 }}>
                            <div>
                              <span style={{ fontFamily:'var(--mono)', color:'var(--text-3)', marginRight:6 }}>{e.internal_id}</span>
                              <span style={{ fontWeight:500 }}>{e.product_description?.substring(0,50) || 'No description'}</span>
                            </div>
                            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                              <span style={{ fontSize:11, color:'var(--text-3)' }}>{fmtDate(e.created_at)}</span>
                              <span style={{ fontSize:11, fontWeight:700, color: statusColor[e.status] || 'var(--text-3)' }}>{e.status}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                  {qs.length > 0 && (
                    <div>
                      <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:8 }}>Order History ({qs.length})</div>
                      {qs.map(q => {
                        // Build mini lifecycle pipeline
                        const stages = [
                          { key:'enquiry',    label:'Enquiry',    done: true,                            icon:'📥' },
                          { key:'quoted',     label:'Quoted',     done: !!q.created_at,                  icon:'📄' },
                          { key:'po',         label:'PO',         done: ['PO Received','In Production','Dispatched','Delivered'].includes(q.workflow_status), icon:'✅' },
                          { key:'invoice',    label:'Invoice',    done: !!q.payment_received,             icon:'🧾' },
                          { key:'payment',    label:'Paid',       done: !!q.payment_received,             icon:'💰' },
                          { key:'production', label:'Production', done: ['In Production','Dispatched','Delivered'].includes(q.workflow_status), icon:'🔧' },
                          { key:'dispatch',   label:'Dispatched', done: ['Dispatched','Delivered'].includes(q.workflow_status), icon:'🚚' },
                          { key:'delivered',  label:'Delivered',  done: q.workflow_status === 'Delivered', icon:'📦' },
                        ];
                        const currentIdx = stages.filter(s => s.done).length - 1;
                        return (
                          <div key={q.id} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 12px', marginBottom:8 }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                              <div>
                                <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text-3)' }}>{q.internal_id||q.quote_number}</span>
                                <span style={{ marginLeft:8, fontSize:13, fontWeight:600 }}>{q.product_name||'—'}</span>
                              </div>
                              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                                <span style={{ fontSize:14, fontWeight:700, fontVariantNumeric:'tabular-nums', color:'oklch(0.50 0.14 150)' }}>{fmtINR(q.amount_grand_total)}</span>
                                <Badge status={q.workflow_status} />
                              </div>
                            </div>
                            <div style={{ display:'flex', alignItems:'center', gap:2, overflowX:'auto', paddingBottom:2 }}>
                              {stages.map((s, i) => (
                                <React.Fragment key={s.key}>
                                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:52 }}>
                                    <div style={{
                                      width:24, height:24, borderRadius:'50%', fontSize:11,
                                      display:'flex', alignItems:'center', justifyContent:'center',
                                      background: s.done ? (i === currentIdx ? 'var(--accent)' : 'oklch(0.50 0.15 150)') : 'var(--surface-2)',
                                      border: `2px solid ${s.done ? (i === currentIdx ? 'var(--accent)' : 'oklch(0.50 0.15 150)') : 'var(--border)'}`,
                                      color: s.done ? '#fff' : 'var(--text-4)',
                                    }}>
                                      {s.done ? (i === currentIdx ? s.icon : '✓') : ''}
                                    </div>
                                    <div style={{ fontSize:9, color: s.done ? 'var(--text-2)' : 'var(--text-4)', marginTop:2, textAlign:'center', fontWeight: i === currentIdx ? 700 : 400 }}>
                                      {s.label}
                                    </div>
                                  </div>
                                  {i < stages.length - 1 && (
                                    <div style={{ flex:1, height:2, minWidth:4, background: stages[i+1].done ? 'oklch(0.50 0.15 150)' : 'var(--border)', marginBottom:14 }} />
                                  )}
                                </React.Fragment>
                              ))}
                            </div>
                            <div style={{ fontSize:11, color:'var(--text-3)', marginTop:4 }}>
                              Created {fmtDate(q.created_at)}{q.delivery_confirmed_date ? ` · Delivered ${fmtDate(q.delivery_confirmed_date)}` : q.dispatched_date ? ` · Dispatched ${fmtDate(q.dispatched_date)}` : ''}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Add Client Modal */}
      {addModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setAddModal(false)}>
          <div className="modal" style={{ maxWidth:520 }}>
            <div className="modal-header"><div className="modal-title">Add New Client</div><button className="modal-close" onClick={()=>setAddModal(false)}><I.X /></button></div>
            <div className="modal-body">
              <div className="modal-row">
                <div className="field"><label className="field-label">Company Name *</label><input className="input" value={newCo.company_name} onChange={e=>setNewCo(c=>({...c,company_name:e.target.value}))} placeholder="e.g. Power Grid Corporation" /></div>
                <div className="field"><label className="field-label">Industry</label><input className="input" value={newCo.industry} onChange={e=>setNewCo(c=>({...c,industry:e.target.value}))} placeholder="e.g. Power Transmission" /></div>
              </div>
              <div className="modal-row">
                <div className="field"><label className="field-label">City</label><input className="input" value={newCo.city} onChange={e=>setNewCo(c=>({...c,city:e.target.value}))} placeholder="e.g. Trichy" /></div>
                <div className="field"><label className="field-label">State</label><input className="input" value={newCo.state} onChange={e=>setNewCo(c=>({...c,state:e.target.value}))} /></div>
              </div>
              <div className="modal-row">
                <div className="field"><label className="field-label">Client Rating</label><select className="input" value={newCo.client_flag} onChange={e=>setNewCo(c=>({...c,client_flag:e.target.value}))}>{['Excellent','Good','Neutral','Bad','Blacklisted'].map(f=><option key={f}>{f}</option>)}</select></div>
                <div className="field"><label className="field-label">Credit Customer?</label><select className="input" value={newCo.is_credit_customer?'yes':'no'} onChange={e=>setNewCo(c=>({...c,is_credit_customer:e.target.value==='yes'}))}><option value="no">No — 100% Advance</option><option value="yes">Yes — Credit Terms</option></select></div>
              </div>
              {newCo.is_credit_customer && <div className="field"><label className="field-label">Credit Days</label><input type="number" className="input" value={newCo.credit_days} onChange={e=>setNewCo(c=>({...c,credit_days:parseInt(e.target.value)||0}))} style={{ width:120 }} /></div>}
              <div className="field"><label className="field-label">Notes</label><textarea className="input" rows={2} value={newCo.client_notes} onChange={e=>setNewCo(c=>({...c,client_notes:e.target.value}))} placeholder="Payment behaviour, notes…" /></div>
              <div style={{ marginTop:8 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
                  <label className="field-label" style={{ margin:0 }}>Contacts</label>
                  <button type="button" className="btn btn-ghost btn-sm" onClick={addContact}><I.Plus /> Add Contact</button>
                </div>
                {newContacts.map((ct,i) => (
                  <div key={i} style={{ background:'var(--surface-2)', borderRadius:'var(--radius-sm)', padding:'10px 12px', marginBottom:8, border:'1px solid var(--border)' }}>
                    <div className="modal-row" style={{ marginBottom:6 }}>
                      <div className="field" style={{ marginBottom:0 }}><input className="input" value={ct.name} onChange={e=>updateContact(i,'name',e.target.value)} placeholder="Name *" style={{ fontSize:13 }} /></div>
                      <div className="field" style={{ marginBottom:0 }}><input className="input" value={ct.designation} onChange={e=>updateContact(i,'designation',e.target.value)} placeholder="Designation" style={{ fontSize:13 }} /></div>
                    </div>
                    <div className="modal-row" style={{ marginBottom:0 }}>
                      <div className="field" style={{ marginBottom:0 }}><input className="input" value={ct.phone} onChange={e=>updateContact(i,'phone',e.target.value)} placeholder="Phone" style={{ fontSize:13 }} /></div>
                      <div className="field" style={{ marginBottom:0 }}><input className="input" value={ct.email} onChange={e=>updateContact(i,'email',e.target.value)} placeholder="Email" style={{ fontSize:13 }} /></div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8 }}>
                      <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--text-2)', cursor:'pointer' }}>
                        <input type="checkbox" checked={ct.is_primary} onChange={e=>updateContact(i,'is_primary',e.target.checked)} />
                        Primary contact
                      </label>
                      {i > 0 && <button type="button" className="btn btn-ghost btn-sm" onClick={()=>removeContact(i)} style={{ color:'var(--st-danger-fg)', fontSize:12 }}>Remove</button>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setAddModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveNew} disabled={saving||!newCo.company_name.trim()}>{saving?<><I.Loader className="spin" />Saving…</>:<><I.Plus />Add Client</>}</button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Company Details Modal */}
      {editCoModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditCoModal(null)}>
          <div className="modal" style={{ maxWidth:460 }}>
            <div className="modal-header"><div className="modal-title">Edit Company — {editCoModal.company_name}</div><button className="modal-close" onClick={()=>setEditCoModal(null)}><I.X /></button></div>
            <div className="modal-body">
              <div className="modal-row">
                <div className="field"><label className="field-label">Company Name *</label><input className="input" value={editCoForm.company_name||''} onChange={e=>setEditCoForm(f=>({...f,company_name:e.target.value}))} /></div>
                <div className="field"><label className="field-label">Industry</label><input className="input" value={editCoForm.industry||''} onChange={e=>setEditCoForm(f=>({...f,industry:e.target.value}))} /></div>
              </div>
              <div className="modal-row">
                <div className="field"><label className="field-label">City</label><input className="input" value={editCoForm.city||''} onChange={e=>setEditCoForm(f=>({...f,city:e.target.value}))} /></div>
                <div className="field"><label className="field-label">State</label><input className="input" value={editCoForm.state||''} onChange={e=>setEditCoForm(f=>({...f,state:e.target.value}))} /></div>
              </div>
              <div className="modal-row">
                <div className="field"><label className="field-label">Credit Customer?</label><select className="input" value={editCoForm.is_credit_customer?'yes':'no'} onChange={e=>setEditCoForm(f=>({...f,is_credit_customer:e.target.value==='yes'}))}><option value="no">No — 100% Advance</option><option value="yes">Yes — Credit Terms</option></select></div>
                {editCoForm.is_credit_customer && <div className="field"><label className="field-label">Credit Days</label><input type="number" className="input" value={editCoForm.credit_days||0} onChange={e=>setEditCoForm(f=>({...f,credit_days:parseInt(e.target.value)||0}))} /></div>}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditCoModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveCoEdit} disabled={saving}>{saving?<><I.Loader className="spin" />Saving…</>:<><I.CheckCircle />Save</>}</button>
            </div>
          </div>
        </div>
      )}

      {/* Add / Edit Contact Modal */}
      {contactModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setContactModal(null)}>
          <div className="modal" style={{ maxWidth:440 }}>
            <div className="modal-header">
              <div className="modal-title">{contactModal.contact ? 'Edit Contact' : 'Add Contact'}</div>
              <button className="modal-close" onClick={()=>setContactModal(null)}><I.X /></button>
            </div>
            <div className="modal-body">
              <div className="modal-row">
                <div className="field"><label className="field-label">Name *</label><input className="input" value={contactForm.name} onChange={e=>setContactForm(f=>({...f,name:e.target.value}))} placeholder="Full name" /></div>
                <div className="field"><label className="field-label">Designation</label><input className="input" value={contactForm.designation} onChange={e=>setContactForm(f=>({...f,designation:e.target.value}))} placeholder="e.g. Purchase Manager" /></div>
              </div>
              <div className="modal-row">
                <div className="field"><label className="field-label">Phone</label><input className="input" value={contactForm.phone} onChange={e=>setContactForm(f=>({...f,phone:e.target.value}))} placeholder="10-digit mobile" /></div>
                <div className="field"><label className="field-label">Email</label><input className="input" value={contactForm.email} onChange={e=>setContactForm(f=>({...f,email:e.target.value}))} placeholder="email@company.com" /></div>
              </div>
              <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:'var(--text-2)', cursor:'pointer', marginTop:8 }}>
                <input type="checkbox" checked={contactForm.is_primary} onChange={e=>setContactForm(f=>({...f,is_primary:e.target.checked}))} />

              </label>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setContactModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveContact} disabled={saving||!contactForm.name.trim()}>
                {saving?<><I.Loader className="spin" />Saving…</>:<><I.CheckCircle />{contactModal.contact?'Save Changes':'Add Contact'}</>}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
Object.assign(window, { CompaniesPage });
</script>

<script type="text/babel" data-name="invoicesPage">
const InvoicesPage = ({ invoices, quotes, companies, reload, reloadQuotes }) => {
  const { useState, useMemo } = React;
  const [showModal, setShowModal] = useState(false);
  const [filter, setFilter]       = useState('All');
  const [form, setForm]           = useState({ quotation_id:'', due_date:'', notes:'' });
  const [saving, setSaving]       = useState(false);
  const [sending, setSending]     = useState(null);
  const [toast, setToast]         = useState(null);

  const PORTAL = 'https://sakthipayment.netlify.app';
  const N8N_INV = 'https://n8n-production-b18ce.up.railway.app/webhook/invoice-created';

  const showToast = (msg, err) => { setToast({msg,err}); setTimeout(()=>setToast(null),3500); };

  const filtered = useMemo(()=> {
    if (filter === 'All') return invoices;
    if (filter === 'Overdue') return invoices.filter(i => i.status !== 'Paid' && i.status !== 'Cancelled' && i.due_date && new Date(i.due_date) < new Date());
    return invoices.filter(i=>i.status===filter);
  }, [invoices,filter]);

  const totalCollected   = invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+parseFloat(i.amount_total||0),0);
  const totalOutstanding = invoices.filter(i=>!['Paid','Cancelled'].includes(i.status)).reduce((s,i)=>s+parseFloat(i.amount_total||0),0);

  const invoicedQids = new Set(invoices.map(i=>i.quotation_id).filter(Boolean));
  const eligible = quotes.filter(q => ['PO Received','In Production','Dispatched','Delivered'].includes(q.workflow_status) && !invoicedQids.has(q.id));

  const genInvNum = async () => {
    const rows = await sbFetch('invoices?select=invoice_number&order=created_at.desc&limit=1');
    const last  = Array.isArray(rows) && rows[0]?.invoice_number;
    const n     = last ? (parseInt(last.split('/').pop())||0)+1 : 1;
    return `SE/INV/${String(n).padStart(4,'0')}`;
  };

  const createInvoice = async () => {
    if (!form.quotation_id) return showToast('Select a quotation first', true);
    setSaving(true);
    try {
      const q = quotes.find(x => x.id === form.quotation_id);
      if (!q) throw new Error('Quotation not found');

      const total = parseFloat(q.amount_grand_total || 0);
      const sub   = Math.round(total / 1.18 * 100) / 100;
      const gst   = Math.round((total - sub) * 100) / 100;
      const num   = await genInvNum();

      // Upload Vyapar PDF to Supabase storage if provided
      let pdfUrl = null;
      if (form.invoiceFile) {
        const safeName = num.replace(/\//g, '-') + '-' + Date.now() + '.pdf';
        const upRes = await fetch(
          SUPABASE_URL + '/storage/v1/object/invoice-pdfs/' + safeName,
          {
            method: 'POST',
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/pdf',
              'x-upsert': 'true',
            },
            body: form.invoiceFile,
          }
        );
        if (upRes.ok) {
          pdfUrl = SUPABASE_URL + '/storage/v1/object/public/invoice-pdfs/' + safeName;
        }
      }

      const res = await sbFetch('invoices', {
        method: 'POST',
        body: JSON.stringify({
          invoice_number:  num,
          quotation_id:    q.id,
          company_id:      q.company_id || null,
          amount_subtotal: sub,
          amount_gst:      gst,
          amount_total:    total,
          due_date:        form.due_date || null,
          status:          'Sent',
          notes:           form.notes || null,
          invoice_pdf_url: pdfUrl,
          created_by:      'Manikandan',
        }),
      });
      const inv = Array.isArray(res) ? res[0] : res;

      // Fire WF-13 to send WhatsApp payment link
      try {
        await fetch(N8N_INV, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invoice_id: inv.id }),
        });
      } catch (_) {}

      showToast(num + ' created & WhatsApp sent ✓');
      setShowModal(false);
      setForm({ quotation_id: '', due_date: '', notes: '', invoiceFile: null });
      reload();
      reloadQuotes();
    } catch (e) {
      showToast(e.message, true);
    }
    setSaving(false);
  };

  const resend = async (inv) => {
    setSending(inv.id);
    try { await fetch(N8N_INV,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({invoice_id:inv.id})}); showToast('Resent ✓'); }
    catch(e) { showToast('Failed: '+e.message,true); }
    setSending(null);
  };

  const deleteInvoice = async (inv) => {
    const label = inv.invoice_number || 'this invoice';
    if (inv.status === 'Paid') {
      if (!confirm(`${label} is marked Paid. Deleting it will remove the payment record. Are you sure?`)) return;
    } else {
      if (!confirm(`Delete ${label}? This cannot be undone.`)) return;
    }
    try {
      await sbFetch(`invoices?id=eq.${inv.id}`, { method: 'DELETE' });
      showToast(`${label} deleted`);
      reload();
    } catch(e) { showToast('Delete failed: ' + e.message, true); }
  };

  const sCls = { Paid:'badge-po', Sent:'badge-follow', Overdue:'badge-open', Draft:'badge-expired', Cancelled:'badge-expired' };

  return (
    <div>
      {toast && <div style={{ position:'fixed',top:20,right:20,zIndex:9999,background:toast.err?'var(--st-danger-fg)':'oklch(0.50 0.15 150)',color:'#fff',padding:'10px 18px',borderRadius:'var(--radius-sm)',fontSize:13,fontWeight:600,boxShadow:'var(--shadow-lg)' }}>{toast.msg}</div>}
      <div className="page-head">
        <div><div className="page-title">Invoices</div><div className="page-sub">Create invoices, send payment portal links, track collections</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}><I.Plus /> Create Invoice</button>
      </div>
      <div className="metrics" style={{ gridTemplateColumns:'repeat(3,1fr)', marginBottom:16 }}>
        <Metric label="Total Invoiced" value={fmtINR(totalCollected+totalOutstanding)} sub="All time" accent="blue" icon={<I.ClipList />} />
        <Metric label="Collected" value={fmtINR(totalCollected)} sub="Paid invoices" accent="green" icon={<I.Check2 />} />
        <Metric label="Outstanding" value={fmtINR(totalOutstanding)} sub="Awaiting payment" accent={totalOutstanding>0?'amber':'slate'} icon={<I.Clock />} />
      </div>
      <div style={{ display:'flex', gap:6, marginBottom:12 }}>
        {['All','Sent','Paid','Overdue','Draft'].map(f=><button key={f} className={`btn btn-sm ${filter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f)}>{f === 'Overdue' ? '🔴 Overdue' : f}</button>)}
      </div>
      <div className="panel" style={{ padding:0 }}>
        {filtered.length===0 ? (
          <div className="empty"><I.ClipList /><div className="et">No invoices</div><div className="es">Create an invoice once a PO is received.</div></div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead><tr><th>Invoice</th><th>Client</th><th>Product</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead>
              <tbody>
                {filtered.map(inv => {
                  const co = inv.companies||{}; const qt = inv.quotations||{};
                  const overdue = inv.status!=='Paid' && inv.due_date && new Date(inv.due_date)<new Date();
                  const daysOverdue = overdue ? Math.floor((new Date() - new Date(inv.due_date)) / 86400000) : null;
                  const dueDate = inv.due_date ? new Date(inv.due_date) : null;
                  const daysUntilDue = dueDate && !overdue ? Math.floor((dueDate - new Date()) / 86400000) : null;
                  const dueCls = inv.status === 'Paid' ? { color: 'oklch(0.50 0.15 150)', fontWeight: 600 }
                    : overdue ? { color: 'var(--st-danger-fg)', fontWeight: 700 }
                    : daysUntilDue !== null && daysUntilDue <= 7 ? { color: 'oklch(0.55 0.14 70)', fontWeight: 600 }
                    : { color: 'var(--text-2)' };
                  return (
                    <tr key={inv.id} style={{ background:overdue?'color-mix(in oklab, var(--st-danger-bg) 40%, var(--surface))':undefined }}>
                      <td><div style={{ fontFamily:'var(--mono)',fontSize:12,fontWeight:600 }}>{inv.invoice_number}</div><div style={{ fontSize:11,color:'var(--text-3)',marginTop:2 }}>{fmtDate(inv.created_at)}</div></td>
                      <td><div style={{ fontWeight:600,fontSize:14 }}>{co.company_name||'—'}</div>{qt.contact_person&&<div style={{ fontSize:12,color:'var(--text-3)' }}>{qt.contact_person}</div>}</td>
                      <td style={{ fontSize:13 }}>{qt.product_name||'—'}</td>
                      <td><span className="amt">{fmtINR(inv.amount_total)}</span></td>
                      <td style={{ ...dueCls, fontSize:13 }}>
                        {inv.due_date ? fmtDate(inv.due_date) : '—'}
                        {overdue && <div style={{ fontSize:11,fontWeight:700 }}>🔴 {daysOverdue}d OVERDUE</div>}
                        {daysUntilDue !== null && daysUntilDue <= 7 && <div style={{ fontSize:11,fontWeight:600 }}>Due in {daysUntilDue}d</div>}
                        {inv.status === 'Paid' && <div style={{ fontSize:11 }}>✓ Paid</div>}
                      </td>
                      <td><span className={`badge ${sCls[inv.status]||'badge-expired'}`}>{inv.status==='Paid'?'✓ ':''}{inv.status}</span></td>
                      <td>
                        <div style={{ display:'flex',gap:5 }}>
                          <button className="ra-btn btn-sm" onClick={()=>window.open(`${PORTAL}/?token=${inv.payment_link_token}`,'_blank')}><I.Eye /> Portal</button>
                          {inv.status!=='Paid'&&<button className="ra-btn ra-po btn-sm" disabled={sending===inv.id} onClick={()=>resend(inv)}>{sending===inv.id?<><I.Loader className="spin" />Sending…</>:<><I.Send />Resend</>}</button>}
                          <button className="ra-btn btn-sm" onClick={()=>deleteInvoice(inv)} style={{ color:'var(--st-danger-fg)', borderColor:'var(--st-danger-bd)' }} title="Delete invoice"><I.Trash /></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal" style={{ maxWidth:500 }}>
            <div className="modal-header"><div className="modal-title">Create Invoice</div><button className="modal-close" onClick={()=>setShowModal(false)}><I.X /></button></div>
            <div className="modal-body">
              <div className="field">
                <label className="field-label">Link to Quotation *</label>
                <select className="input" value={form.quotation_id}
                  onChange={e => setForm(f => ({ ...f, quotation_id: e.target.value }))}>
                  <option value="">— Choose a quotation —</option>
                  {eligible.map(q => (
                    <option key={q.id} value={q.id}>
                      {q.internal_id || q.quote_number} · {q.client_name} · {fmtINR(q.amount_grand_total)}
                    </option>
                  ))}
                </select>
                {eligible.length === 0 && (
                  <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 4 }}>
                    No eligible quotations — only PO Received / In Production orders can be invoiced.
                  </div>
                )}
              </div>
              <div className="field">
                <label className="field-label">Upload Invoice PDF (from Vyapar or any billing software)</label>
                <input type="file" accept="application/pdf"
                  onChange={e => setForm(f => ({ ...f, invoiceFile: e.target.files[0] || null }))}
                  style={{ display: 'block', width: '100%', padding: '8px 0', fontSize: 13, color: 'var(--text-2)' }} />
                <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 4 }}>
                  Upload the PDF you generated in Vyapar. It will be stored and linked to the payment portal.
                </div>
              </div>
              <div className="field">
                <label className="field-label">Payment Due Date</label>
                <input type="date" className="input" value={form.due_date}
                  onChange={e => setForm(f => ({ ...f, due_date: e.target.value }))} />
              </div>
              <div className="field">
                <label className="field-label">Notes (optional)</label>
                <textarea className="input" rows={2} value={form.notes}
                  onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
                  placeholder="Any special instructions…" />
              </div>
              <div style={{
                background: 'var(--accent-soft)', border: '1px solid var(--accent-border)',
                borderRadius: 'var(--radius-sm)', padding: '9px 12px', fontSize: 13, color: 'var(--accent)',
              }}>
                On save: invoice record is created, your Vyapar PDF is stored, WhatsApp with payment portal link sent to client, GOD copy to Manikandan.
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={createInvoice} disabled={saving||!form.quotation_id}>{saving?<><I.Loader className="spin" />Creating…</>:<><I.Send />Create & Send</>}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
Object.assign(window, { InvoicesPage });
</script>

<script type="text/babel" data-name="teamPages">
/* ══════════════════════════════════════════════
   STAFF PAGE
   ══════════════════════════════════════════════ */
const StaffPage = ({ staff, enquiries, remarks, reload, reloadRemarks }) => {
  const { useState, useMemo } = React;
  const [remarkModal, setRemarkModal] = useState(null);
  const [addModal, setAddModal]       = useState(false);
  const [editModal, setEditModal]     = useState(null); // staff object to edit
  const [form, setForm] = useState({
    remark_type: 'LateQuotation',
    description: '',
    enquiry_id: '',
  });
  const [staffForm, setStaffForm] = useState({ name:'', role:'', phone:'', email:'', is_active:true });
  const [saving, setSaving] = useState(false);
  const [toast, setToast]   = useState(null);

  const showToast = (msg, err) => {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3000);
  };

  const thisMonth = new Date().toISOString().slice(0, 7);

  const activeStaff   = useMemo(() => staff.filter(s => s.is_active !== false), [staff]);
  const inactiveStaff = useMemo(() => staff.filter(s => s.is_active === false), [staff]);

  const stats = useMemo(() => staff.map(s => {
    const myE  = enquiries.filter(e => e.assigned_to === s.name);
    const resp = myE.filter(e => e.response_time_hours != null);
    const avg  = resp.length
      ? resp.reduce((x, e) => x + parseFloat(e.response_time_hours), 0) / resp.length
      : null;
    const myR = remarks.filter(r => r.staff_name === s.name && r.month_year === thisMonth);
    return { ...s, myE, avg, myR };
  }), [staff, enquiries, remarks, thisMonth]);

  const rColor = (n) =>
    n === 0 ? 'oklch(0.50 0.15 150)'
    : n < 2  ? 'oklch(0.55 0.14 70)'
    : n < 3  ? 'oklch(0.65 0.14 70)'
    :          'oklch(0.55 0.18 25)';

  const issueRemark = async () => {
    if (!form.description.trim()) return showToast('Description required', true);
    setSaving(true);
    try {
      await sbFetch('remarks', {
        method: 'POST',
        body: JSON.stringify({
          staff_name:         remarkModal.name,
          staff_role:         remarkModal.role,
          remark_type:        form.remark_type,
          description:        form.description,
          related_enquiry_id: form.enquiry_id || null,
          month_year:         thisMonth,
        }),
      });
      showToast('Remark issued to ' + remarkModal.name + ' ✓');
      setRemarkModal(null);
      setForm({ remark_type: 'LateQuotation', description: '', enquiry_id: '' });
      reloadRemarks();
    } catch (e) {
      showToast(e.message, true);
    }
    setSaving(false);
  };

  const saveStaff = async () => {
    if (!staffForm.name.trim() || !staffForm.role.trim()) return showToast('Name and role are required', true);
    setSaving(true);
    try {
      if (editModal) {
        await sbFetch(`staff?id=eq.${editModal.id}`, { method: 'PATCH', body: JSON.stringify(staffForm) });
        showToast('Staff updated ✓');
        setEditModal(null);
      } else {
        await sbFetch('staff', { method: 'POST', body: JSON.stringify(staffForm) });
        showToast(staffForm.name + ' added ✓');
        setAddModal(false);
      }
      setStaffForm({ name:'', role:'', phone:'', email:'', is_active:true });
      reload();
    } catch(e) { showToast(e.message, true); }
    setSaving(false);
  };

  const openEdit = (s) => {
    setStaffForm({ name: s.name||'', role: s.role||'', phone: s.phone||'', email: s.email||'', is_active: s.is_active !== false });
    setEditModal(s);
  };

  const deactivate = async (s) => {
    if (!confirm(`Deactivate ${s.name}? They will no longer appear in assignment dropdowns. Remarks history is preserved.`)) return;
    try {
      await sbFetch(`staff?id=eq.${s.id}`, { method:'PATCH', body: JSON.stringify({ is_active: false }) });
      showToast(s.name + ' deactivated');
      reload();
    } catch(e) { showToast(e.message, true); }
  };

  const reactivate = async (s) => {
    try {
      await sbFetch(`staff?id=eq.${s.id}`, { method:'PATCH', body: JSON.stringify({ is_active: true }) });
      showToast(s.name + ' reactivated ✓');
      reload();
    } catch(e) { showToast(e.message, true); }
  };

  const StaffFormFields = () => (
    <>
      <div className="modal-row">
        <div className="field">
          <label className="field-label">Name *</label>
          <input className="input" value={staffForm.name} onChange={e=>setStaffForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Vijay" />
        </div>
        <div className="field">
          <label className="field-label">Role *</label>
          <input className="input" value={staffForm.role} onChange={e=>setStaffForm(f=>({...f,role:e.target.value}))} placeholder="e.g. QuotationPrep" />
        </div>
      </div>
      <div className="modal-row">
        <div className="field">
          <label className="field-label">Phone</label>
          <input className="input" value={staffForm.phone} onChange={e=>setStaffForm(f=>({...f,phone:e.target.value}))} placeholder="10-digit mobile" />
        </div>
        <div className="field">
          <label className="field-label">Email</label>
          <input className="input" value={staffForm.email} onChange={e=>setStaffForm(f=>({...f,email:e.target.value}))} placeholder="work email" />
        </div>
      </div>
      <div className="field" style={{ marginTop:8 }}>
        <label style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13, fontWeight:500, color:'var(--text-2)' }}>
          <input type="checkbox" checked={staffForm.is_active} onChange={e=>setStaffForm(f=>({...f,is_active:e.target.checked}))} />
          Active staff member
        </label>
      </div>
    </>
  );

  return (
    <div>
      {toast && (
        <div style={{
          position: 'fixed', top: 20, right: 20, zIndex: 9999,
          background: toast.err ? 'var(--st-danger-fg)' : 'oklch(0.50 0.15 150)',
          color: '#fff', padding: '10px 18px', borderRadius: 'var(--radius-sm)',
          fontSize: 13, fontWeight: 600, boxShadow: 'var(--shadow-lg)',
        }}>{toast.msg}</div>
      )}

      <div className="page-head">
        <div>
          <div className="page-title">Staff</div>
          <div className="page-sub">Response times and accountability — {thisMonth}</div>
        </div>
        <button className="btn btn-primary" onClick={()=>{ setStaffForm({ name:'', role:'', phone:'', email:'', is_active:true }); setAddModal(true); }}>
          <I.Plus /> Add Staff
        </button>
      </div>

      {activeStaff.length === 0 ? (
        <div className="panel">
          <div className="empty">
            <I.User />
            <div className="et">No active staff</div>
            <div className="es">Add staff members to track accountability and response times.</div>
          </div>
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 14 }}>
          {stats.filter(s => s.is_active !== false).map(s => {
            const rc = s.myR.length;
            const rc_color = rColor(rc);
            return (
              <div key={s.id} className="panel">
                <div className="panel-h">
                  <div className="panel-h-l">
                    <div style={{
                      width: 38, height: 38, borderRadius: 10,
                      background: 'var(--accent-soft)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 16, fontWeight: 700, color: 'var(--accent)',
                    }}>
                      {s.name ? s.name.charAt(0) : '?'}
                    </div>
                    <div>
                      <div className="panel-title">{s.name}</div>
                      <span className="panel-tag">{s.role}</span>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:5 }}>
                    <button className="btn btn-ghost btn-xs" onClick={() => openEdit(s)} title="Edit"><I.Edit /></button>
                    <button className="btn btn-ghost btn-xs" onClick={() => deactivate(s)} title="Deactivate" style={{ color:'var(--st-danger-fg)' }}><I.X /></button>
                  </div>
                </div>
                <div className="panel-body">
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 12 }}>
                    <div style={{ textAlign: 'center', padding: '8px 4px', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)' }}>
                      <div style={{ fontSize: 22, fontWeight: 700 }}>{s.myE.length}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>Enquiries</div>
                    </div>
                    <div style={{ textAlign: 'center', padding: '8px 4px', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)' }}>
                      <div style={{
                        fontSize: 22, fontWeight: 700,
                        color: s.avg == null ? 'var(--text-3)'
                          : s.avg < 4  ? 'oklch(0.50 0.15 150)'
                          : s.avg < 8  ? 'oklch(0.55 0.14 70)'
                          :              'oklch(0.55 0.18 25)',
                      }}>
                        {s.avg != null ? s.avg.toFixed(1) + 'h' : '—'}
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>Avg Response</div>
                    </div>
                    <div style={{
                      textAlign: 'center', padding: '8px 4px', borderRadius: 'var(--radius-sm)',
                      background: rc > 0 ? 'color-mix(in oklab, ' + rc_color + ' 12%, var(--surface-2))' : 'var(--surface-2)',
                      border: rc > 0 ? '1px solid color-mix(in oklab, ' + rc_color + ' 30%, transparent)' : undefined,
                    }}>
                      <div style={{ fontSize: 22, fontWeight: 700, color: rc_color }}>{rc}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>Remarks</div>
                    </div>
                  </div>

                  <div style={{
                    marginBottom: 10, padding: '7px 10px', borderRadius: 'var(--radius-sm)',
                    background: rc === 0 ? 'var(--st-delivered-bg)' : rc < 3 ? 'var(--st-follow-bg)' : 'var(--st-danger-bg)',
                    border: '1px solid ' + (rc === 0 ? 'var(--st-delivered-bd)' : rc < 3 ? 'var(--st-follow-bd)' : 'var(--st-danger-bd)'),
                    fontSize: 12, fontWeight: 600,
                    color: rc === 0 ? 'var(--st-delivered-fg)' : rc < 3 ? 'var(--st-follow-fg)' : 'var(--st-danger-fg)',
                  }}>
                    {rc === 0 && '✓ No remarks — incentive intact'}
                    {rc === 1 && '⚠ 1 remark — 1 more withholds incentive'}
                    {rc === 2 && '⚠ 2 remarks — incentive withheld this month'}
                    {rc >= 3  && '❌ 3+ remarks — salary deduction applies'}
                  </div>

                  <button className="btn btn-ghost btn-sm" style={{ width: '100%' }}
                    onClick={() => setRemarkModal(s)}>
                    <I.AlertCircle /> Issue Remark
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Deactivated staff section */}
      {inactiveStaff.length > 0 && (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>
            Deactivated Staff ({inactiveStaff.length})
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {inactiveStaff.map(s => (
              <div key={s.id} className="panel" style={{ opacity:0.6 }}>
                <div className="panel-h" style={{ padding:'10px 16px' }}>
                  <div className="panel-h-l">
                    <div style={{ width:30,height:30,borderRadius:8,background:'var(--surface-3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'var(--text-3)' }}>
                      {s.name ? s.name.charAt(0) : '?'}
                    </div>
                    <div>
                      <div style={{ fontWeight:600, fontSize:13, color:'var(--text-2)' }}>{s.name}</div>
                      <div style={{ fontSize:11,color:'var(--text-3)' }}>{s.role} · Deactivated</div>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:5 }}>
                    <button className="btn btn-ghost btn-xs" onClick={() => openEdit(s)}><I.Edit /></button>
                    <button className="btn btn-ghost btn-xs" onClick={() => reactivate(s)} style={{ color:'oklch(0.50 0.15 150)' }}>Reactivate</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Add Staff Modal */}
      {addModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setAddModal(false)}>
          <div className="modal" style={{ maxWidth:460 }}>
            <div className="modal-h">
              <div className="modal-t">Add Staff Member</div>
              <button className="modal-x" onClick={()=>setAddModal(false)}><I.X /></button>
            </div>
            <div className="modal-body">
              <StaffFormFields />
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setAddModal(false)}>Cancel</button>
              <button className="btn btn-primary" disabled={saving||!staffForm.name.trim()||!staffForm.role.trim()} onClick={saveStaff}>
                {saving?<><I.Loader className="spin" />Saving…</>:<><I.Plus />Add Staff</>}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Staff Modal */}
      {editModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
          <div className="modal" style={{ maxWidth:460 }}>
            <div className="modal-h">
              <div className="modal-t">Edit Staff — {editModal.name}</div>
              <button className="modal-x" onClick={()=>setEditModal(null)}><I.X /></button>
            </div>
            <div className="modal-body">
              <StaffFormFields />
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditModal(null)}>Cancel</button>
              <button className="btn btn-primary" disabled={saving} onClick={saveStaff}>
                {saving?<><I.Loader className="spin" />Saving…</>:<><I.CheckCircle />Save Changes</>}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Issue Remark Modal */}
      {remarkModal && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setRemarkModal(null)}>
          <div className="modal" style={{ maxWidth: 480 }}>
            <div className="modal-header">
              <div className="modal-title">Issue Remark — {remarkModal.name}</div>
              <button className="modal-close" onClick={() => setRemarkModal(null)}><I.X /></button>
            </div>
            <div className="modal-body">
              <div className="field">
                <label className="field-label">Type *</label>
                <select className="input" value={form.remark_type}
                  onChange={e => setForm(f => ({ ...f, remark_type: e.target.value }))}>
                  <option value="LateQuotation">Late Quotation</option>
                  <option value="LateWorkOrder">Late Work Order</option>
                  <option value="MissedFollowUp">Missed Follow-Up</option>
                  <option value="LateDelivery">Late Delivery</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div className="field">
                <label className="field-label">Link to Enquiry (optional)</label>
                <select className="input" value={form.enquiry_id}
                  onChange={e => setForm(f => ({ ...f, enquiry_id: e.target.value }))}>
                  <option value="">— No linked enquiry —</option>
                  {enquiries
                    .filter(e => e.assigned_to === remarkModal.name)
                    .slice(0, 20)
                    .map(e => (
                      <option key={e.id} value={e.id}>
                        {e.internal_id} · {e.client_name}
                        {e.response_time_hours
                          ? ' · ' + parseFloat(e.response_time_hours).toFixed(1) + 'h'
                          : ''}
                      </option>
                    ))}
                </select>
              </div>
              <div className="field">
                <label className="field-label">Description *</label>
                <textarea className="input" rows={4} value={form.description}
                  onChange={e => setForm(f => ({ ...f, description: e.target.value }))}
                  placeholder="What happened and what was the impact. Example: ENQ-0004 arrived at 9:00 AM. Quotation not sent until 3:30 PM — 6.5 hours. Benchmark is 4 hours." />
              </div>
              <div style={{
                fontSize: 12, fontWeight: 500,
                color: 'var(--st-danger-fg)',
                background: 'var(--st-danger-bg)',
                padding: '7px 10px', borderRadius: 'var(--radius-sm)',
                border: '1px solid var(--st-danger-bd)',
              }}>
                This remark is permanent and counts toward {remarkModal.name}'s monthly total.
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setRemarkModal(null)}>Cancel</button>
              <button className="btn btn-primary"
                onClick={issueRemark}
                disabled={saving || !form.description.trim()}>
                {saving
                  ? <><I.Loader className="spin" /> Saving…</>
                  : <><I.AlertCircle /> Issue Remark</>}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════
   REMARKS PAGE
   ══════════════════════════════════════════════ */
const RemarksPage = ({ remarks, enquiries, quotes }) => {
  const { useState, useMemo } = React;
  const [staffFilter, setStaffFilter] = useState('All');
  const [monthFilter, setMonthFilter] = useState('All');

  const staffNames = useMemo(() => {
    const names = Array.from(new Set(remarks.map(r => r.staff_name).filter(Boolean)));
    return ['All', ...names.sort()];
  }, [remarks]);

  const months = useMemo(() => {
    const ms = Array.from(new Set(remarks.map(r => r.month_year).filter(Boolean)));
    return ['All', ...ms.sort().reverse()];
  }, [remarks]);

  const filtered = useMemo(() => {
    let rows = [...remarks];
    if (staffFilter !== 'All') rows = rows.filter(r => r.staff_name === staffFilter);
    if (monthFilter !== 'All') rows = rows.filter(r => r.month_year === monthFilter);
    return rows;
  }, [remarks, staffFilter, monthFilter]);

  const TYPE_CLS = {
    LateQuotation:  'badge-follow',
    LateWorkOrder:  'badge-open',
    MissedFollowUp: 'badge-open',
    LateDelivery:   'badge-follow',
    Other:          'badge-expired',
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Remarks Ledger</div>
          <div className="page-sub">Permanent accountability record — all remarks issued to staff</div>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
        {staffNames.map(s => (
          <button key={s}
            className={'btn btn-sm ' + (staffFilter === s ? 'btn-primary' : 'btn-ghost')}
            onClick={() => setStaffFilter(s)}>
            {s}
          </button>
        ))}
        {months.map(m => (
          <button key={m}
            className={'btn btn-sm ' + (monthFilter === m ? 'btn-primary' : 'btn-ghost')}
            onClick={() => setMonthFilter(m)}>
            {m}
          </button>
        ))}
      </div>

      <div className="panel" style={{ padding: 0 }}>
        {filtered.length === 0 ? (
          <div className="empty">
            <I.AlertCircle />
            <div className="et">No remarks recorded</div>
            <div className="es">Remarks are issued from the Staff page with evidence linked to enquiries.</div>
          </div>
        ) : (
          <div className="tbl-wrap">
            <table className="q-table">
              <thead>
                <tr>
                  <th>Staff</th>
                  <th>Type</th>
                  <th>Description</th>
                  <th>Evidence</th>
                  <th>Month</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const enq = r.related_enquiry_id
                    ? enquiries.find(e => e.id === r.related_enquiry_id)
                    : null;
                  return (
                    <tr key={r.id}>
                      <td>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{r.staff_name}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-3)' }}>{r.staff_role}</div>
                      </td>
                      <td>
                        <span className={'badge ' + (TYPE_CLS[r.remark_type] || 'badge-expired')}>
                          {(r.remark_type || '').replace(/([A-Z])/g, ' $1').trim()}
                        </span>
                      </td>
                      <td style={{ maxWidth: 280 }}>
                        <div style={{ fontSize: 13, lineHeight: 1.5, color: 'var(--text-2)' }}>
                          {r.description}
                        </div>
                      </td>
                      <td>
                        {enq ? (
                          <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--accent)' }}>
                            {enq.internal_id}
                            <br />
                            <span style={{ color: 'var(--text-3)', fontFamily: 'var(--font)' }}>
                              {enq.client_name}
                            </span>
                          </div>
                        ) : (
                          <span style={{ color: 'var(--text-3)' }}>—</span>
                        )}
                      </td>
                      <td style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-3)' }}>
                        {r.month_year}
                      </td>
                      <td style={{ fontSize: 12, color: 'var(--text-3)' }}>
                        {fmtDate(r.issued_at)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};

Object.assign(window, { StaffPage, RemarksPage });
</script>
</body>
</html>
